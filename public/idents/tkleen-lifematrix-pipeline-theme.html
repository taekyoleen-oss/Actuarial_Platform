<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tkLeen — Life Matrix Flow Pipeline Ident (Light/Dark)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  /* ── 테마 토큰: 기본 = 라이트(화이트) ───────────── */
  :root, [data-theme="light"] {
    --bg: #FFFFFF;
    --bg-grad: radial-gradient(1200px 700px at 50% 30%, #FFFFFF 0%, #F5F7FA 75%);
    --text: #0A0A0A;
    --text-soft: rgba(10,10,10,0.62);
    --accent: #4A90C2;
    --accent-strong: #2E6E9E;     /* 화이트 위 대비 보강용 진한 스카이 */
    --navy: #1B2845;
    --box-fill: #FFFFFF;
    --box-stroke: rgba(10,10,10,0.30);
    --box-active-fill: #EEF5FB;
    --box-active-stroke: #4A90C2;
    --box-done-stroke: rgba(74,144,194,0.85);
    --box-done-fill: #F7FAFD;
    --link-idle: rgba(10,10,10,0.20);
    --val-color: #2E6E9E;
    --dot-idle: rgba(10,10,10,0.22);
    --dot-done: #2FA876;
    --result-fill: rgba(74,144,194,0.07);
    --result-num: #0A0A0A;
    --btn-border: rgba(10,10,10,0.18);
    --glow-color: rgba(74,144,194,0.35);
    --glow-strong: rgba(74,144,194,0.5);
  }
  [data-theme="dark"] {
    --bg: #10182B;
    --bg-grad: radial-gradient(1200px 700px at 50% 30%, #1B2845 0%, #10182B 70%);
    --text: #FAFAF7;
    --text-soft: rgba(250,250,247,0.62);
    --accent: #6FB3E0;
    --accent-strong: #6FB3E0;
    --navy: #1B2845;
    --box-fill: rgba(250,250,247,0.045);
    --box-stroke: rgba(250,250,247,0.28);
    --box-active-fill: rgba(74,144,194,0.14);
    --box-active-stroke: #6FB3E0;
    --box-done-stroke: rgba(111,179,224,0.75);
    --box-done-fill: rgba(74,144,194,0.07);
    --link-idle: rgba(250,250,247,0.18);
    --val-color: #6FB3E0;
    --dot-idle: rgba(250,250,247,0.25);
    --dot-done: #5BD6A0;
    --result-fill: rgba(74,144,194,0.10);
    --result-num: #FAFAF7;
    --btn-border: rgba(250,250,247,0.25);
    --glow-color: rgba(111,179,224,0.4);
    --glow-strong: rgba(111,179,224,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    /* 투명 배경 — 임베드한 카드의 파란 파스텔 배경이 비치도록 (2026-06-14) */
    background: transparent;
    color: var(--text);
    font-family: 'Pretendard', 'Inter', sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.5s, color 0.5s;
  }
  .scene {
    position: relative;
    width: min(1100px, 97vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-strong);
  }
  .headline {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(22px, 3.4vw, 32px);
    color: var(--text);
    margin-bottom: 4px;
  }
  .headline em { font-style: normal; color: var(--accent-strong); font-weight: 400; }

  .diagram { width: 100%; }

  /* ── 모듈 카드 ───────────── */
  .node { opacity: 0; transform: translateY(12px); transform-box: fill-box; }
  .node.go { animation: nodeIn 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
  @keyframes nodeIn { to { opacity: 1; transform: translateY(0); } }

  .node rect.box {
    fill: var(--box-fill);
    stroke: var(--box-stroke);
    stroke-width: 1;
    transition: stroke 0.35s, fill 0.35s;
  }
  .node.active rect.box {
    stroke: var(--box-active-stroke);
    stroke-width: 1.8;
    fill: var(--box-active-fill);
    filter: drop-shadow(0 0 7px var(--glow-color));
  }
  .node.done rect.box {
    stroke: var(--box-done-stroke);
    stroke-width: 1.2;
    fill: var(--box-done-fill);
  }
  .node text.title {
    font-family: 'Pretendard', sans-serif;
    font-size: 12px;
    font-weight: 600;
    fill: var(--text);
  }
  .node text.meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.12em;
    fill: var(--text);
    opacity: 0.45;
  }
  .node text.val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    fill: var(--val-color);
    opacity: 0;
    transition: opacity 0.45s;
  }
  .node text.val.show { opacity: 1; }
  .node text.noout {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    font-style: italic;
    fill: var(--text);
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .node.done text.noout, .node.active text.noout { opacity: 0; }

  .progress { fill: var(--accent); }
  .status-dot { fill: var(--dot-idle); transition: fill 0.4s; }
  .node.done .status-dot { fill: var(--dot-done); }
  .node.active .status-dot { fill: var(--accent); }

  /* ── 연결선 ───────────── */
  .link {
    fill: none;
    stroke: var(--link-idle);
    stroke-width: 1.2;
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    transition: stroke 0.5s, stroke-width 0.5s;
  }
  .link.go { animation: drawLink 0.8s ease-out forwards; }
  @keyframes drawLink { to { stroke-dashoffset: 0; } }
  .link.lit {
    stroke: url(#linkGrad);
    stroke-width: 2;
    stroke-dasharray: 7 7;
    stroke-dashoffset: 0;
    animation: marchFlow 0.7s linear infinite;
  }
  @keyframes marchFlow { to { stroke-dashoffset: -14; } }

  .pulse-dot { opacity: 0; }

  /* ── 최종 결과 카드 ───────────── */
  .result-card { opacity: 0; transform: scale(0.86); transform-box: fill-box; transform-origin: center; }
  .result-card.go { animation: resultIn 0.8s cubic-bezier(0.18, 1.2, 0.3, 1) forwards; }
  @keyframes resultIn { to { opacity: 1; transform: scale(1); } }
  .result-card rect.rbox {
    fill: var(--result-fill);
    stroke: var(--accent);
    stroke-width: 1.6;
  }
  .result-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 40px;
    font-weight: 500;
    fill: var(--result-num);
  }
  .result-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    fill: var(--accent-strong);
  }
  .result-title {
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    font-weight: 600;
    fill: var(--text);
  }
  .result-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    fill: var(--text);
    opacity: 0;
    transition: opacity 0.6s;
  }
  .result-sub.show { opacity: 0.65; }
  .result-card.breathing { animation: breathe 3.2s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { filter: drop-shadow(0 0 3px var(--glow-color)); }
    50% { filter: drop-shadow(0 0 18px var(--glow-strong)); }
  }

  .burst-ring { fill: none; opacity: 0; }
  .sparkle { stroke-width: 1.6; stroke-linecap: round; opacity: 0; }

  .principle {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    letter-spacing: 0.01em;
  }
  .principle.go { animation: fade65 0.9s ease forwards; }
  @keyframes fade65 { to { opacity: 0.65; } }
  .principle b { color: var(--accent-strong); font-weight: 600; }

  .ctrl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--btn-border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s;
  }
  .ctrl:hover { border-color: var(--accent); color: var(--accent-strong); }
  .ctrl:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .replay { position: absolute; bottom: -50px; right: 0; }
  .theme-toggle { position: absolute; top: -8px; right: 0; padding: 8px 14px; }

  .concept-note {
    position: absolute;
    bottom: -50px; left: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.35;
    line-height: 1.8;
  }

  @media (prefers-reduced-motion: reduce) {
    .node, .link, .principle, .result-card {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      stroke-dashoffset: 0 !important;
    }
    .link.lit { animation: none !important; stroke-dasharray: none; }
    .result-card.breathing { animation: none !important; }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="eyebrow">Life Matrix Flow · Full Pipeline Run</div>
  <div class="headline">13개 모듈이 연결되어, <em>보험료가 자동으로 산출</em>됩니다</div>

  <svg class="diagram" id="svg" viewBox="0 0 1100 560"
    aria-label="계약 정보 정의부터 위험률 로딩, 생존자·사망자 계산, 계산기수, 순보험료, 영업보험료, 준비금까지 13개 모듈이 순서대로 점등되며 최종 월납 보험료가 산출되는 파이프라인 애니메이션">
    <defs>
      <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop id="grad0" offset="0%"/>
        <stop id="grad1" offset="50%"/>
        <stop id="grad2" offset="100%"/>
      </linearGradient>
    </defs>
    <g id="links"></g>
    <g id="nodes"></g>
    <g id="pulses"></g>
    <g id="fx"></g>
  </svg>

  <div class="principle" id="principle">
    <b>기초 정보 → 위험률 → 생존·사망 → 계산기수 → 순보험료 → 영업보험료 → 준비금</b> — 전 과정이 한 번의 실행으로 완료됩니다
  </div>

  <button class="ctrl theme-toggle" id="themeBtn" type="button" aria-label="라이트/다크 모드 전환">☾ Dark</button>
  <div class="concept-note">Concept 05 · Light/Dark<br>Full Pipeline → Premium Output</div>
  <button class="ctrl replay" id="replayBtn" type="button">전체 실행 ↻</button>
</div>

<script>
(function () {
  const ns = 'http://www.w3.org/2000/svg';
  const $ = id => document.getElementById(id);
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ── 테마 팔레트 (SVG/JS 동적 색상용) ───────────── */
  const PALETTES = {
    light: {
      pulseCore: '#1B2845',                       // 화이트 배경 위 진한 본체
      pulseTail: '#4A90C2',
      gradStops: ['#4A90C2', '#2E6E9E', '#1B2845'],
      ring: '#4A90C2',
      sparkle: '#2E6E9E',
    },
    dark: {
      pulseCore: '#FAFAF7',
      pulseTail: '#6FB3E0',
      gradStops: ['#4A90C2', '#6FB3E0', '#FAFAF7'],
      ring: '#6FB3E0',
      sparkle: '#FAFAF7',
    },
  };
  let theme = 'light';                            // 기본: 화이트 라이트 모드
  const pal = () => PALETTES[theme];

  function applyTheme(t) {
    theme = t;
    document.documentElement.setAttribute('data-theme', t);
    pal().gradStops.forEach((c, i) => $('grad' + i).setAttribute('stop-color', c));
    $('themeBtn').textContent = t === 'light' ? '☾ Dark' : '☀ Light';
  }

  /* ── 모듈 구성 (3행 스네이크) ───────────── */
  const W = 158, H = 60;
  const ROW1 = 95, ROW2 = 265, ROW3 = 435;
  const chain = [
    { title: 'Define Policy Info',     meta: 'INPUT',    val: '40세 · 남 · 20년',   x: 18,  y: ROW1 },
    { title: 'Load Risk Rates',        meta: 'DATA',     val: '경험생명표 로딩 ✓',   x: 196, y: ROW1 },
    { title: 'Age Gender Matching',    meta: 'MATCH',    val: 'M / 40 매칭 완료',    x: 374, y: ROW1 },
    { title: 'Select Rates',           meta: 'FILTER',   val: 'qₓ 240행 선택',      x: 552, y: ROW1 },
    { title: 'Rate Modifier',          meta: 'FACTOR',   val: '적용계수 ×1.00',      x: 730, y: ROW1 },
    { title: 'Survivors Calculator',   meta: 'lx',       val: 'l₄₀ = 100,000',     x: 908, y: ROW1 },
    { title: 'Claims Calculator',      meta: 'dx',       val: 'dₓ 산출 완료',        x: 18,  y: ROW2 },
    { title: 'Nx Mx Calculator',       meta: 'COMMUT',   val: 'Nₓ · Mₓ 생성',       x: 196, y: ROW2 },
    { title: 'NNx MMx Calculator',     meta: 'COMMUT-2', val: 'NNₓ · MMₓ 생성',     x: 374, y: ROW2 },
    { title: 'Additional Variables',   meta: 'VARS',     val: '추가변수 5개 정의',    x: 552, y: ROW2 },
    { title: 'Net Premium Calculator', meta: 'P = A/ä',  val: 'P = 317,190원/년',   x: 730, y: ROW2 },
    { title: 'Gross Premium Calc',     meta: 'LOADING',  val: 'GP = 29,150원/월',   x: 18,  y: ROW3 },
    { title: 'Reserve Calculator',     meta: 'tV',       val: '₁₀V = 1,243,000원', x: 196, y: ROW3 },
  ];
  const RESULT = { x: 470, y: ROW3 - 62, w: 612, h: 128 };
  const PREMIUM = 29150;

  let links = [], timers = [], loopId = null;
  const later = (fn, ms) => timers.push(setTimeout(fn, ms));

  function bezier(x1, y1, x2, y2) {
    if (Math.abs(y1 - y2) < 5) {
      const mx = (x1 + x2) / 2;
      return `M ${x1},${y1} C ${mx},${y1} ${mx},${y2} ${x2},${y2}`;
    }
    return `M ${x1},${y1} C ${x1 + 90},${y1 + 55} ${x2 - 110},${y2 - 55} ${x2},${y2}`;
  }

  function build() {
    $('links').innerHTML = ''; $('nodes').innerHTML = '';
    $('pulses').innerHTML = ''; $('fx').innerHTML = '';
    links = [];

    for (let i = 0; i < chain.length - 1; i++) {
      addLink(chain[i].x + W, chain[i].y, chain[i+1].x, chain[i+1].y, 'L' + i);
    }
    addLink(chain[chain.length-1].x + W, chain[chain.length-1].y,
            RESULT.x, RESULT.y + RESULT.h / 2, 'L' + (chain.length - 1));

    function addLink(x1, y1, x2, y2, id) {
      const p = document.createElementNS(ns, 'path');
      p.setAttribute('d', bezier(x1, y1, x2, y2));
      p.setAttribute('class', 'link');
      p.setAttribute('id', id);
      $('links').appendChild(p);
      links.push(p);
    }

    chain.forEach((d, i) => {
      const g = document.createElementNS(ns, 'g');
      g.setAttribute('class', 'node');
      g.setAttribute('id', 'N' + i);
      g.innerHTML =
        `<rect class="box" x="${d.x}" y="${d.y - H/2}" width="${W}" height="${H}" rx="9"/>` +
        `<circle class="status-dot" cx="${d.x + W - 13}" cy="${d.y - H/2 + 13}" r="3.5"/>` +
        `<text class="meta" x="${d.x + 11}" y="${d.y - H/2 + 15}">${d.meta}</text>` +
        `<text class="title" x="${d.x + 11}" y="${d.y - H/2 + 31}">${d.title}</text>` +
        `<text class="noout" x="${d.x + 11}" y="${d.y - H/2 + 49}">No Output</text>` +
        `<text class="val" id="V${i}" x="${d.x + 11}" y="${d.y - H/2 + 49}">${d.val}</text>` +
        `<rect class="progress" id="P${i}" x="${d.x}" y="${d.y + H/2 - 3}" width="0" height="3" rx="1.5"/>`;
      $('nodes').appendChild(g);
    });

    const r = RESULT;
    const g = document.createElementNS(ns, 'g');
    g.setAttribute('class', 'result-card');
    g.setAttribute('id', 'resultCard');
    g.innerHTML =
      `<rect class="rbox" x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" rx="14"/>` +
      `<text class="result-label" x="${r.x + 24}" y="${r.y + 30}">PIPELINE COMPLETE · 산출 결과</text>` +
      `<text class="result-title" x="${r.x + 24}" y="${r.y + 56}">월납 영업보험료</text>` +
      `<text class="result-num" id="resNum" x="${r.x + 24}" y="${r.y + 102}">0</text>` +
      `<text class="result-num" x="${r.x + 24 + 232}" y="${r.y + 102}" style="font-size:20px;opacity:0.7;">원</text>` +
      `<text class="result-sub" id="resSub1" x="${r.x + r.w - 24}" y="${r.y + 62}" text-anchor="end">순보험료  317,190원/년</text>` +
      `<text class="result-sub" id="resSub2" x="${r.x + r.w - 24}" y="${r.y + 82}" text-anchor="end">준비금(10년) 1,243,000원</text>` +
      `<text class="result-sub" id="resSub3" x="${r.x + r.w - 24}" y="${r.y + 102}" text-anchor="end">가입금액 1억 · i 2.5%</text>`;
    $('nodes').appendChild(g);
  }

  /* ── 이펙트 (테마 색상은 발사 시점에 결정) ───────────── */
  function sendPulse(pathEl, dur) {
    const len = pathEl.getTotalLength();
    const p = pal();
    const dots = [];
    for (let k = 0; k < 4; k++) {
      const dot = document.createElementNS(ns, 'circle');
      dot.setAttribute('r', k === 0 ? 5 : 4 - k);
      dot.setAttribute('fill', k === 0 ? p.pulseCore : p.pulseTail);
      dot.setAttribute('class', 'pulse-dot');
      if (k === 0) dot.style.filter = `drop-shadow(0 0 4px ${p.pulseTail})`;
      $('pulses').appendChild(dot);
      dots.push({ el: dot, lag: k * 0.045 });
    }
    const start = performance.now();
    (function frame(now) {
      const u = Math.min((now - start) / dur, 1);
      dots.forEach(d => {
        const v = Math.max(0, Math.min(u - d.lag, 1));
        const pt = pathEl.getPointAtLength(len * v);
        d.el.setAttribute('cx', pt.x); d.el.setAttribute('cy', pt.y);
        d.el.style.opacity = (v <= 0 || u >= 1) ? 0 : (0.95 - d.lag * 4);
      });
      if (u < 1) requestAnimationFrame(frame);
      else dots.forEach(d => d.el.remove());
    })(start);
  }

  function fillProgress(i, dur) {
    const bar = $('P' + i);
    const start = performance.now();
    (function frame(now) {
      const u = Math.max(0, Math.min((now - start) / dur, 1));
      bar.setAttribute('width', W * u);
      if (u < 1) requestAnimationFrame(frame);
      else setTimeout(() => bar.setAttribute('width', 0), 350);
    })(start);
  }

  function countUp(el, target, dur) {
    const start = performance.now();
    (function frame(now) {
      const u = Math.min((now - start) / dur, 1);
      const e = 1 - Math.pow(1 - u, 3);
      el.textContent = Math.round(target * e).toLocaleString('ko-KR');
      if (u < 1) requestAnimationFrame(frame);
    })(start);
  }

  function burst(cx, cy) {
    const p = pal();
    for (let k = 0; k < 3; k++) {
      const ring = document.createElementNS(ns, 'circle');
      ring.setAttribute('cx', cx); ring.setAttribute('cy', cy);
      ring.setAttribute('class', 'burst-ring');
      ring.setAttribute('stroke', p.ring);
      $('fx').appendChild(ring);
      const start = performance.now() + k * 180;
      (function frame(now) {
        const u = (now - start) / 1100;
        if (u < 0) { requestAnimationFrame(frame); return; }
        if (u >= 1) { ring.remove(); return; }
        ring.setAttribute('r', 20 + 200 * u);
        ring.setAttribute('stroke-width', 2.5 * (1 - u));
        ring.style.opacity = 0.55 * (1 - u);
        requestAnimationFrame(frame);
      })(performance.now());
    }
    for (let k = 0; k < 8; k++) {
      const ang = (Math.PI * 2 * k) / 8 + Math.random() * 0.4;
      const sp = document.createElementNS(ns, 'line');
      sp.setAttribute('class', 'sparkle');
      sp.setAttribute('stroke', p.sparkle);
      $('fx').appendChild(sp);
      const start = performance.now();
      (function frame(now) {
        const u = (now - start) / 800;
        if (u >= 1) { sp.remove(); return; }
        const d1 = 30 + 130 * u, d2 = d1 + 14 * (1 - u);
        sp.setAttribute('x1', cx + Math.cos(ang) * d1);
        sp.setAttribute('y1', cy + Math.sin(ang) * d1);
        sp.setAttribute('x2', cx + Math.cos(ang) * d2);
        sp.setAttribute('y2', cy + Math.sin(ang) * d2);
        sp.style.opacity = 0.85 * (1 - u);
        requestAnimationFrame(frame);
      })(start);
    }
  }

  function reset() {
    timers.forEach(clearTimeout); timers = [];
    if (loopId) { clearInterval(loopId); loopId = null; }
    $('principle').classList.remove('go');
  }

  function play() {
    reset();
    build();

    if (reduceMotion) {
      chain.forEach((d, i) => {
        $('N' + i).classList.add('go', 'done');
        $('V' + i).classList.add('show');
      });
      links.forEach(l => l.classList.add('go'));
      $('resultCard').classList.add('go', 'breathing');
      $('resNum').textContent = PREMIUM.toLocaleString('ko-KR');
      ['resSub1','resSub2','resSub3'].forEach(id => $(id).classList.add('show'));
      $('principle').classList.add('go');
      return;
    }

    chain.forEach((d, i) => later(() => $('N' + i).classList.add('go'), 100 + i * 90));
    links.forEach((l, i) => later(() => l.classList.add('go'), 900 + i * 80));

    const STEP = 620, t0 = 2300;
    chain.forEach((d, i) => {
      later(() => {
        const node = $('N' + i);
        node.classList.add('active');
        fillProgress(i, 430);
        setTimeout(() => {
          $('V' + i).classList.add('show');
          node.classList.remove('active');
          node.classList.add('done');
          if (i < links.length) {
            links[i].classList.add('lit');
            sendPulse(links[i], i === 5 || i === 10 || i === 12 ? 800 : 520);
          }
        }, 460);
      }, t0 + i * STEP);
    });

    const tEnd = t0 + chain.length * STEP + 500;
    later(() => {
      $('resultCard').classList.add('go');
      burst(RESULT.x + RESULT.w / 2, RESULT.y + RESULT.h / 2);
      countUp($('resNum'), PREMIUM, 1700);
    }, tEnd);
    later(() => {
      ['resSub1','resSub2','resSub3'].forEach((id, i) =>
        setTimeout(() => $(id).classList.add('show'), i * 200));
      $('resultCard').classList.add('breathing');
    }, tEnd + 1500);
    later(() => $('principle').classList.add('go'), tEnd + 2200);

    later(() => {
      loopId = setInterval(() => {
        links.forEach((l, i) => setTimeout(() => sendPulse(l, 500), i * 300));
      }, links.length * 300 + 1400);
    }, tEnd + 2600);
  }

  $('themeBtn').addEventListener('click', () =>
    applyTheme(theme === 'light' ? 'dark' : 'light'));
  $('replayBtn').addEventListener('click', play);

  applyTheme('light');   // 기본: 화이트 라이트 모드
  play();
})();
</script>
</body>
</html>
