<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보험상품 심사 사례 | 금융청 감독국 보험과</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF7; --surface:#FFFFFF; --ink:#1A2238; --muted:#5A6275;
    --hair:#E3E0D8; --hair-soft:#EDEAE2; --seal:#B23A2E; --seal-soft:#F4E7E4;
    --case-tint:#F1F3F8; --case-edge:#D5DCEA;
    --serif:"Pretendard","Malgun Gothic","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--serif); font-weight:400; line-height:1.72;
    font-size:16px; -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .wrap{max-width:880px; margin:0 auto; padding:0 28px;}

  /* ---- top bar ---- */
  .topbar{
    position:sticky; top:0; z-index:20; background:rgba(251,250,247,.92);
    backdrop-filter:saturate(1.1) blur(8px);
    border-bottom:1px solid var(--hair);
  }
  .topbar .wrap{display:flex; align-items:center; justify-content:space-between; height:58px;}
  .brand{display:flex; align-items:center; gap:11px; font-weight:700; letter-spacing:-.01em;}
  .brand .seal{
    width:26px; height:26px; border-radius:5px; background:var(--seal);
    color:#fff; display:grid; place-items:center; font-size:13px; font-weight:800;
    flex:none; box-shadow:0 1px 0 rgba(0,0,0,.08);
  }
  .brand small{display:block; font-size:11px; font-weight:500; color:var(--muted); letter-spacing:.02em; margin-top:1px;}
  .navlinks{display:flex; gap:4px;}
  .navlinks a{
    font-size:13.5px; font-weight:600; color:var(--muted); text-decoration:none;
    padding:7px 13px; border-radius:7px; transition:color .15s, background .15s;
  }
  .navlinks a:hover{color:var(--ink); background:var(--hair-soft);}
  .navlinks a.active{color:var(--ink); background:#fff; box-shadow:inset 0 0 0 1px var(--hair);}

  /* ---- hero ---- */
  .hero{padding:62px 0 40px; border-bottom:1px solid var(--hair);}
  .eyebrow{
    font-size:12.5px; font-weight:700; letter-spacing:.16em; color:var(--seal);
    text-transform:uppercase;
  }
  .hero h1{
    font-size:clamp(30px,5.4vw,46px); line-height:1.16; font-weight:800;
    letter-spacing:-.025em; margin:14px 0 0;
  }
  .hero .lede{
    margin:20px 0 0; max-width:62ch; font-size:16.5px; color:var(--muted); line-height:1.74;
  }
  .hero .meta{
    margin-top:26px; display:flex; flex-wrap:wrap; gap:10px 22px; align-items:center;
    font-size:13.5px; color:var(--muted);
  }
  .hero .meta b{color:var(--ink); font-weight:600;}
  .hero .meta .dot{width:3px; height:3px; border-radius:50%; background:var(--hair); display:inline-block;}

  /* ---- month rail (연월) ---- */
  .monthnav{
    position:sticky; top:58px; z-index:15; background:var(--paper);
    border-bottom:1px solid var(--hair); padding:14px 0;
  }
  .monthnav .wrap{display:flex; align-items:center; gap:14px; overflow-x:auto;}
  .monthnav .label{font-size:12px; font-weight:700; letter-spacing:.08em; color:var(--muted); flex:none;}
  .month-pill{
    flex:none; border:1px solid var(--hair); background:#fff; color:var(--muted);
    border-radius:999px; padding:7px 16px; font-size:14px; font-weight:600;
    cursor:pointer; transition:.15s; white-space:nowrap;
  }
  .month-pill[aria-current="true"]{
    background:var(--ink); color:#fff; border-color:var(--ink);
  }
  .month-pill .n{font-weight:500; opacity:.7; font-size:12.5px; margin-left:7px;}
  .month-pill[aria-current="true"] .n{opacity:.85;}

  /* ---- month section ---- */
  .month{padding:46px 0 8px;}
  .month-head{margin-bottom:8px;}
  .month-head h2{font-size:26px; font-weight:800; letter-spacing:-.02em; margin:0;}
  .month-head .sub{font-size:14px; color:var(--muted); margin-top:6px;}

  /* ---- field group (분야) ---- */
  .field{margin-top:38px;}
  .field-head{
    display:flex; align-items:baseline; gap:12px; padding-bottom:11px;
    border-bottom:2px solid var(--ink); margin-bottom:8px;
  }
  .field-head .fnum{
    font-size:13px; font-weight:800; color:var(--seal); font-variant-numeric:tabular-nums;
  }
  .field-head h3{font-size:18px; font-weight:700; letter-spacing:-.01em; margin:0;}

  /* ---- case card ---- */
  .case{
    background:var(--surface); border:1px solid var(--hair);
    border-radius:12px; padding:26px 28px 24px; margin-top:18px;
    transition:border-color .18s, box-shadow .18s;
  }
  .case:hover{border-color:var(--case-edge); box-shadow:0 6px 22px -16px rgba(26,34,56,.45);}
  .case-top{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:13px;}
  .chip{
    font-size:11.5px; font-weight:700; letter-spacing:.02em;
    padding:4px 10px; border-radius:6px; background:var(--case-tint);
    color:#2c3a63; border:1px solid var(--case-edge);
  }
  .law{
    font-size:12.5px; color:var(--muted); font-weight:500;
    border-left:1px solid var(--hair); padding-left:10px; margin-left:2px;
  }
  .case h4{
    font-size:20px; font-weight:800; letter-spacing:-.02em; line-height:1.4;
    margin:2px 0 20px;
  }

  /* signature: 사례 → 조치 flow */
  .flow{position:relative; padding-left:30px;}
  .flow::before{
    content:""; position:absolute; left:9px; top:8px; bottom:30px;
    width:2px; background:linear-gradient(var(--case-edge), var(--seal));
  }
  .step{position:relative; margin-bottom:22px;}
  .step:last-child{margin-bottom:4px;}
  .step .node{
    position:absolute; left:-30px; top:2px; width:20px; height:20px; border-radius:50%;
    background:#fff; border:2px solid var(--case-edge); display:grid; place-items:center;
  }
  .step .node i{width:7px; height:7px; border-radius:50%; background:var(--case-edge);}
  .step.act .node{border-color:var(--seal);}
  .step.act .node i{background:var(--seal);}
  .step .tag{
    display:inline-block; font-size:12px; font-weight:800; letter-spacing:.1em;
    color:var(--muted); margin-bottom:6px;
  }
  .step.act .tag{
    color:var(--seal); background:var(--seal-soft);
    padding:3px 10px; border-radius:5px; letter-spacing:.06em;
  }
  .step p{margin:0; font-size:15.5px; line-height:1.74;}
  .step.act p{font-weight:500;}

  /* expandable 심사 배경 */
  .more{margin-top:18px; border-top:1px dashed var(--hair); padding-top:4px;}
  .more summary{
    list-style:none; cursor:pointer; padding:11px 0 3px;
    font-size:13.5px; font-weight:700; color:var(--ink);
    display:flex; align-items:center; gap:8px;
  }
  .more summary::-webkit-details-marker{display:none;}
  .more summary .caret{transition:transform .2s; color:var(--muted); font-size:12px;}
  .more[open] summary .caret{transform:rotate(90deg);}
  .more .body{padding:6px 0 8px; color:#33405e;}
  .more ol{margin:6px 0 0; padding-left:4px; counter-reset:r; list-style:none;}
  .more ol li{
    position:relative; padding:6px 0 6px 34px; font-size:14.5px; line-height:1.7;
    border-bottom:1px solid var(--hair-soft);
  }
  .more ol li:last-child{border-bottom:none;}
  .more ol li::before{
    counter-increment:r; content:counter(r);
    position:absolute; left:0; top:7px; width:22px; height:22px; border-radius:6px;
    background:var(--case-tint); color:#2c3a63; font-size:12px; font-weight:700;
    display:grid; place-items:center; border:1px solid var(--case-edge);
  }
  .more p.note{font-size:14px; color:var(--muted); margin:10px 0 0;}

  .ref{
    margin-top:16px; font-size:13px; color:var(--muted);
    background:var(--paper); border-radius:8px; padding:10px 14px;
    border:1px solid var(--hair-soft);
  }
  .ref b{color:var(--ink); font-weight:600;}

  /* footer */
  footer{margin-top:70px; border-top:1px solid var(--hair); padding:34px 0 60px;}
  footer .wrap{display:flex; flex-wrap:wrap; gap:18px 40px; justify-content:space-between;}
  footer .src{font-size:13px; color:var(--muted); max-width:60ch; line-height:1.7;}
  footer .src b{color:var(--ink); font-weight:600;}
  .disc{font-size:12px; color:var(--muted); margin-top:16px; line-height:1.65;}

  @media (max-width:600px){
    .wrap{padding:0 18px;}
    .case{padding:22px 18px;}
    .navlinks a{padding:6px 9px;}
    .hero{padding:44px 0 32px;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
<style>
  /* ===== 검색 + 마스터-디테일 큰 화면 (표현 보강) ===== */
  html, body { height: 100%; }
  body { overflow: hidden; }
  .searchbar { position: sticky; top: 0; z-index: 30; background: var(--surface); border-bottom: 1px solid var(--hair); }
  .searchbar .wrap { display: flex; align-items: center; gap: 16px; height: 62px; max-width: 1180px; }
  .search-wrap { position: relative; flex: 1; max-width: 580px; }
  .search-wrap input { width: 100%; height: 44px; border: 1px solid var(--hair); border-radius: 11px; padding: 0 40px 0 15px; font-size: 15px; font-family: inherit; background: var(--paper); color: var(--ink); }
  .search-wrap input::placeholder { color: #9aa0ad; }
  .search-wrap input:focus { outline: none; border-color: var(--seal); box-shadow: 0 0 0 3px var(--seal-soft); background: #fff; }
  #clear { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); border: 0; background: transparent; cursor: pointer; font-size: 14px; color: var(--muted); padding: 6px 8px; line-height: 1; }
  #clear:hover { color: var(--ink); }
  .count { font-size: 13.5px; color: var(--muted); font-weight: 700; white-space: nowrap; }

  .cb { display: grid; grid-template-columns: 356px 1fr; height: calc(100vh - 58px - 62px); max-width: 1180px; margin: 0 auto; }
  .cb-list { border-right: 1px solid var(--hair); overflow-y: auto; background: var(--paper); }
  .list { padding: 4px 0 48px; }
  .grp-month { position: sticky; top: 0; z-index: 2; background: var(--paper); font-size: 11.5px; font-weight: 800; letter-spacing: .09em; color: var(--seal); padding: 15px 18px 7px; border-bottom: 1px solid var(--hair-soft); }
  .grp-field { font-size: 12px; font-weight: 700; color: var(--muted); padding: 11px 18px 3px; }
  .row { display: flex; gap: 9px; align-items: flex-start; width: 100%; text-align: left; border: 0; background: transparent; cursor: pointer; padding: 9px 18px; border-left: 3px solid transparent; font-family: inherit; }
  .row:hover { background: var(--hair-soft); }
  .row.is-active { background: #fff; border-left-color: var(--seal); }
  .row-chip { flex: none; font-size: 10px; font-weight: 800; color: var(--seal); background: var(--seal-soft); border-radius: 4px; padding: 2px 6px; margin-top: 2px; white-space: nowrap; }
  .row-title { font-size: 14px; line-height: 1.5; color: var(--ink); font-weight: 600; }
  .row.is-active .row-title { color: var(--seal); }
  .empty { padding: 48px 22px; text-align: center; color: var(--muted); font-size: 14px; }

  .cb-detail { overflow-y: auto; background: var(--paper); }
  .detail { max-width: 780px; margin: 0 auto; padding: 42px 44px 96px; }
  .back { display: none; }
  .d-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 13px; }
  .d-meta .chip { font-size: 12px; font-weight: 800; color: var(--seal); background: var(--seal-soft); border-radius: 6px; padding: 4px 10px; }
  .d-meta .law { font-size: 12.5px; color: var(--muted); font-weight: 600; }
  .d-context { font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: .01em; margin-bottom: 6px; }
  .d-title { font-size: clamp(24px, 3.2vw, 33px); font-weight: 800; letter-spacing: -.022em; line-height: 1.3; margin: 2px 0 28px; color: var(--ink); }
  .d-flow { display: grid; gap: 18px; }
  .d-step { background: var(--surface); border: 1px solid var(--hair); border-radius: 15px; padding: 24px 26px; }
  .d-step.act { background: var(--case-tint); border-color: var(--case-edge); }
  .d-tag { font-size: 12.5px; font-weight: 800; letter-spacing: .03em; color: var(--seal); margin-bottom: 11px; }
  .d-step.act .d-tag { color: #2d4a8a; }
  .d-step p { margin: 0; font-size: 16.5px; line-height: 1.86; color: var(--ink); }
  .d-bg { margin-top: 18px; border: 1px dashed var(--case-edge); border-radius: 15px; padding: 22px 26px; background: #fff; }
  .d-bg-h { font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 11px; }
  .d-bg-b ol { margin: 0 0 0 18px; padding: 0; }
  .d-bg-b li { font-size: 15px; line-height: 1.82; margin: 5px 0; color: #33405e; }
  .d-bg-b p { font-size: 15px; line-height: 1.8; color: #33405e; margin: 9px 0 0; }
  .d-bg-b .note { color: var(--muted); font-size: 13.5px; }
  mark { background: #FCEFA1; color: inherit; padding: 0 1px; border-radius: 2px; }

  @media (max-width: 900px) {
    .cb { grid-template-columns: 1fr; height: calc(100vh - 58px - 62px); }
    .cb-detail { display: none; }
    body.show-detail .cb-list { display: none; }
    body.show-detail .cb-detail { display: block; }
    .back { display: inline-flex; align-items: center; gap: 6px; margin: 16px 0 -10px 22px; border: 1px solid var(--hair); background: #fff; border-radius: 9px; padding: 8px 14px; font-size: 13.5px; font-weight: 700; color: var(--ink); cursor: pointer; font-family: inherit; }
    .detail { padding: 16px 22px 80px; }
    .searchbar .wrap { gap: 10px; }
  }
</style>

/* ---------- render ---------- */
const esc = s => (s==null?'':String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

const sortedMonths = [...DATA].sort((a,b)=> b.year-a.year || b.month-a.month);
let ITEMS = [];
sortedMonths.forEach(m=>{
  m.fields.forEach(f=>{
    f.cases.forEach(c=>{
      ITEMS.push({ id: ITEMS.length, ym: m.ym, monthLabel: m.label, fieldTitle: f.title, c });
    });
  });
});
ITEMS.forEach(it=>{
  const c = it.c;
  let parts = [it.monthLabel, it.fieldTitle, c.chip, c.law, c.title, c.case, c.act];
  if(c.bg){ parts.push(c.bg.title); if(c.bg.para) parts.push(c.bg.para); if(c.bg.note) parts.push(c.bg.note); if(c.bg.list) parts.push(c.bg.list.join(' ')); }
  it.blob = parts.join(' ').toLowerCase();
});

let current = ITEMS.length ? 0 : -1;
let query = "";
const mq = window.matchMedia('(max-width: 900px)');

function hl(text){
  const q = query.trim();
  const safe = esc(text);
  if(!q) return safe;
  try{
    const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi');
    return safe.replace(re,'<mark>$1</mark>');
  }catch(e){ return safe; }
}

function detailHTML(it){
  const c = it.c;
  let bg = "";
  if(c.bg){
    let inner = "";
    if(c.bg.list) inner += "<ol>" + c.bg.list.map(t=>`<li>${esc(t)}</li>`).join("") + "</ol>";
    if(c.bg.para) inner += `<p>${esc(c.bg.para)}</p>`;
    if(c.bg.note) inner += `<p class="note">※ ${esc(c.bg.note)}</p>`;
    bg = `<div class="d-bg"><div class="d-bg-h">심사 배경 — ${esc(c.bg.title)}</div><div class="d-bg-b">${inner}</div></div>`;
  }
  return `<div class="d-meta"><span class="chip">${esc(c.chip)}</span><span class="law">${esc(c.law)}</span></div>
    <div class="d-context">${esc(it.monthLabel)} · ${esc(it.fieldTitle)}</div>
    <h2 class="d-title">《${hl(c.title)}》</h2>
    <div class="d-flow">
      <div class="d-step"><div class="d-tag">사례 — 신청 내용</div><p>${hl(c.case)}</p></div>
      <div class="d-step act"><div class="d-tag">조치 — 심사 결과</div><p>${hl(c.act)}</p></div>
    </div>
    ${bg}`;
}

const listEl = document.getElementById('list');
const detailEl = document.getElementById('detail');
const countEl = document.getElementById('count');

function renderList(){
  const q = query.trim().toLowerCase();
  const filtered = ITEMS.filter(it=> !q || it.blob.includes(q));
  if(filtered.length === 0){
    listEl.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
  } else {
    let html = "", lastYm = null, lastField = null;
    filtered.forEach(it=>{
      if(it.ym !== lastYm){ html += `<div class="grp-month">${esc(it.monthLabel)}</div>`; lastYm = it.ym; lastField = null; }
      if(it.fieldTitle !== lastField){ html += `<div class="grp-field">${esc(it.fieldTitle)}</div>`; lastField = it.fieldTitle; }
      const active = it.id === current ? ' is-active' : '';
      html += `<button class="row${active}" data-id="${it.id}" type="button"><span class="row-chip">${esc(it.c.chip)}</span><span class="row-title">${esc(it.c.title)}</span></button>`;
    });
    listEl.innerHTML = html;
  }
  countEl.textContent = q ? `검색 결과 ${filtered.length}건` : `전체 ${ITEMS.length}건`;
  if(filtered.length && !filtered.some(it=>it.id===current)){ select(filtered[0].id, false); }
  else { renderDetail(current); }
}

function renderDetail(id){
  const it = ITEMS.find(x=>x.id===id);
  detailEl.innerHTML = it ? detailHTML(it) : "";
}

function select(id, toDetail){
  current = id;
  renderDetail(id);
  document.querySelector('.cb-detail').scrollTop = 0;
  [...listEl.querySelectorAll('.row')].forEach(r=> r.classList.toggle('is-active', +r.dataset.id === id));
  if(toDetail && mq.matches){
    // 모바일: 목록 → 상세 진입 시 히스토리 항목을 쌓아 브라우저 뒤로가기로 목록 복귀
    if(!document.body.classList.contains('show-detail')){
      history.pushState({fsa:'detail'}, '');
    }
    document.body.classList.add('show-detail');
  }
}

function goList(){ document.body.classList.remove('show-detail'); }

listEl.addEventListener('click', e=>{
  const b = e.target.closest('.row');
  if(b) select(+b.dataset.id, true);
});
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', ()=>{ query = searchEl.value; renderList(); });
document.getElementById('clear').addEventListener('click', ()=>{ searchEl.value=''; query=''; renderList(); searchEl.focus(); });
// 브라우저 뒤로가기(popstate): 상세 화면이면 목록으로 복귀(카드는 유지). 목록 상태면 기본 동작(카드 밖으로).
window.addEventListener('popstate', ()=>{
  if(document.body.classList.contains('show-detail')) goList();
});
// '목록으로' 버튼도 히스토리와 동기화 — 쌓인 상세 항목이 있으면 뒤로가기로 처리
document.getElementById('back').addEventListener('click', ()=>{
  if(history.state && history.state.fsa === 'detail') history.back();
  else goList();
});

renderList();
if(current >= 0) select(current, false);
document.body.classList.remove('show-detail');
</script>
</body>
</html>
