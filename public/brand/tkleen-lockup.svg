  <text x="319" y="108" font-family="Georgia, 'Times New Roman', serif" font-weight="300" font-size="56" fill="#0A0A0A" letter-spacing="-1.5">een</text>
  <!-- Tagline -->
  <text x="225" y="138" font-family="'Courier New', monospace" font-size="11" fill="#6B6B68" letter-spacing="2.5">AI WORKFLOWS · INSURANCE &amp; FINANCE</text>
