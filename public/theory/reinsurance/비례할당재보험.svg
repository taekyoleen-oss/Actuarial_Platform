<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 비례할당 재보험: 전체 포트폴리오 파이에서 일정 지분 q를 출재 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 포트폴리오 파이 -->
  <circle cx="210" cy="160" r="72" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <!-- 출재 지분 q (Sky 부채꼴) -->
  <path d="M 210 160 L 210 88 A 72 72 0 0 1 272.4 124 Z" fill="#4A90C2" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <text x="232" y="120" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#FFFFFF">q</text>
  <text x="166" y="196" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">1−q</text>
  <!-- 지분을 받아가는 캐릭터 -->
  <g transform="translate(340 120)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <path d="M 290 106 C 304 100 312 102 320 108" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".4"/>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
