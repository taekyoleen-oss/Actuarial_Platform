<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 초과손해액특약: 보유 라인을 넘는 가입금액 초과분을 비례로 나누는 서플러스 구조 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 막대그래프: 위험 A(소형), B(중형), C(대형) -->
  <!-- 위험 A: 보유 라인 이하 → 전부 보유 -->
  <rect x="90" y="188" width="60" height="52" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" rx="3"/>
  <!-- 위험 B: 라인+초과분 -->
  <rect x="200" y="148" width="60" height="52" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" rx="3"/>
  <rect x="200" y="100" width="60" height="46" fill="#4A90C2" stroke="#171A20" stroke-width="2.5" rx="3"/>
  <!-- 위험 C: 라인+큰초과분 -->
  <rect x="310" y="168" width="60" height="72" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" rx="3"/>
  <rect x="310" y="68" width="60" height="98" fill="#4A90C2" stroke="#171A20" stroke-width="2.5" rx="3"/>
  <!-- 보유 라인 수평선 -->
  <line x1="70" y1="200" x2="420" y2="200" stroke="#171A20" stroke-width="2.5" stroke-dasharray="8 5" stroke-linecap="round"/>
  <!-- 라인 라벨 -->
  <text x="74" y="196" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">L</text>
  <!-- 수직축 -->
  <line x1="76" y1="52" x2="76" y2="250" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 71 61 L 76 52 L 81 61" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 범례 텍스트 -->
  <text x="92" y="262" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" opacity=".45">A</text>
  <text x="222" y="262" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" opacity=".45">B</text>
  <text x="332" y="262" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" opacity=".45">C</text>
  <!-- α_R 기호 -->
  <text x="320" y="122" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#FFFFFF" opacity=".9">α</text>
  <!-- 캐릭터: 초과분에서 놀라는 모습 -->
  <g transform="translate(396 72)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 17 -11 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#4A90C2"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
