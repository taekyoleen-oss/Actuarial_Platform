<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 재보험의 형태: 하나의 재보험(Sky)이 비례형·비비례형 두 갈래로 나뉘는 분류 트리 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 루트 노드 (재보험, Sky) -->
  <rect x="190" y="72" width="100" height="44" rx="8" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
  <!-- 분기선 -->
  <g fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round">
    <path d="M 240 116 L 240 140 L 165 140 L 165 164"/>
    <path d="M 240 140 L 315 140 L 315 164"/>
  </g>
  <!-- 비례형 노드: 균등 분할 미니 글리프 -->
  <rect x="116" y="164" width="98" height="56" rx="8" fill="#EEF4FF" stroke="#171A20" stroke-width="2.5"/>
  <g stroke="#171A20" stroke-width="2">
    <rect x="136" y="178" width="58" height="28" fill="#FFFFFF"/>
    <line x1="165" y1="178" x2="165" y2="206"/>
  </g>
  <!-- 비비례형 노드: 레이어 미니 글리프 -->
  <rect x="266" y="164" width="98" height="56" rx="8" fill="#FFF7ED" stroke="#171A20" stroke-width="2.5"/>
  <g stroke="#171A20" stroke-width="2">
    <rect x="286" y="192" width="58" height="14" fill="#FFFFFF"/>
    <rect x="286" y="178" width="58" height="14" fill="#EAF2F9"/>
  </g>
  <!-- 분류를 안내하는 캐릭터 -->
  <g transform="translate(240 252)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
