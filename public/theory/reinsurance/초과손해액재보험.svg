<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 초과손해액 재보험: 한도 M을 넘는 큰 클레임의 윗부분만 재보험(Sky)이 인수 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <line x1="84" y1="238" x2="400" y2="238" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 개별 클레임 막대 -->
  <g stroke="#171A20" stroke-width="2.5">
    <rect x="140" y="178" width="40" height="60" fill="#EAF2F9"/>
    <rect x="205" y="158" width="40" height="80" fill="#EAF2F9"/>
    <rect x="270" y="186" width="40" height="52" fill="#EAF2F9"/>
    <rect x="335" y="130" width="40" height="108" fill="#EAF2F9"/>
    <rect x="335" y="78" width="40" height="52" fill="#4A90C2"/>
  </g>
  <!-- 클레임당 한도 M -->
  <line x1="96" y1="130" x2="392" y2="130" stroke="#171A20" stroke-width="2.5" stroke-dasharray="7 6" opacity=".55"/>
  <text x="398" y="134" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">M</text>
  <!-- 한도 아래에서 안심하는 캐릭터 -->
  <g transform="translate(105 223)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <path d="M -6.5 -2.5 Q -4.5 -4.5 -2.5 -2.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
    <path d="M 2.5 -2.5 Q 4.5 -4.5 6.5 -2.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
