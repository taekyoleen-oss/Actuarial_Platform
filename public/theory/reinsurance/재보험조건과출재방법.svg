<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 재보험 조건과 출재 방법: 원수사·재보험사가 주고받는 계약 문서 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 문서 1 (출재 청약) -->
  <path d="M 120 90 L 190 90 L 220 120 L 220 210 L 120 210 Z" fill="#FFFFFF" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 190 90 L 190 120 L 220 120 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <g stroke="#171A20" stroke-width="2.5" stroke-linecap="round" opacity=".25">
    <line x1="136" y1="134" x2="204" y2="134"/>
    <line x1="136" y1="156" x2="204" y2="156"/>
    <line x1="136" y1="178" x2="186" y2="178"/>
  </g>
  <!-- 문서 2 (인수 확인, 체크) -->
  <path d="M 260 110 L 330 110 L 360 140 L 360 230 L 260 230 Z" fill="#FFFFFF" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 330 110 L 330 140 L 360 140 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <g stroke="#171A20" stroke-width="2.5" stroke-linecap="round" opacity=".25">
    <line x1="276" y1="154" x2="344" y2="154"/>
    <line x1="276" y1="176" x2="344" y2="176"/>
  </g>
  <path d="M 290 200 l 7 8 l 13 -15" fill="none" stroke="#4A90C2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 양방향 교환 화살표 -->
  <g stroke="#171A20" stroke-width="2.5" stroke-linecap="round" opacity=".5">
    <line x1="228" y1="150" x2="250" y2="150"/>
    <line x1="252" y1="170" x2="230" y2="170"/>
  </g>
  <path d="M 248 145 L 256 150 L 248 155 Z" fill="#171A20" opacity=".5"/>
  <path d="M 232 165 L 224 170 L 232 175 Z" fill="#171A20" opacity=".5"/>
  <!-- 중개 캐릭터 -->
  <g transform="translate(240 86)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
