<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 금융재보험: 들쭉날쭉한 손익(점선)을 시간에 걸쳐 평탄하게(Sky) -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <path d="M 72 70 L 72 238 L 420 238" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 변동 손익 (점선) -->
  <path d="M 80 162 L 122 104 L 164 204 L 206 116 L 248 196 L 290 124 L 332 184 L 374 138"
        fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 6" opacity=".45"/>
  <!-- 평탄화된 결과 (Sky) -->
  <path d="M 80 160 C 180 154 300 150 408 148" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 자금 동전 -->
  <circle cx="382" cy="100" r="13" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
  <circle cx="382" cy="100" r="4.5" fill="#FFFFFF"/>
  <text x="398" y="258" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t →</text>
  <!-- 평탄해져 안심한 캐릭터 -->
  <g transform="translate(110 223)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <path d="M -6.5 -2.5 Q -4.5 -4.5 -2.5 -2.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
    <path d="M 2.5 -2.5 Q 4.5 -4.5 6.5 -2.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
