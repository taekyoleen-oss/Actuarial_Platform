<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 공동보험: 하나의 위험(Sky 바)을 여러 보험사가 나란히 분담 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 하나의 위험 -->
  <rect x="140" y="84" width="200" height="10" rx="5" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
  <g stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".4">
    <line x1="165" y1="94" x2="165" y2="108"/>
    <line x1="215" y1="94" x2="215" y2="108"/>
    <line x1="265" y1="94" x2="265" y2="108"/>
    <line x1="315" y1="94" x2="315" y2="108"/>
  </g>
  <!-- 4사 균등 분담 -->
  <rect x="140" y="108" width="200" height="116" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <rect x="141.5" y="109.5" width="48.5" height="113" fill="#EEF4FF"/>
  <rect x="190" y="109.5" width="50" height="113" fill="#ECFDF5"/>
  <rect x="240" y="109.5" width="50" height="113" fill="#FFF7ED"/>
  <rect x="290" y="109.5" width="48.5" height="113" fill="#F5F3FF"/>
  <g stroke="#171A20" stroke-width="2.5">
    <line x1="190" y1="108" x2="190" y2="224"/>
    <line x1="240" y1="108" x2="240" y2="224"/>
    <line x1="290" y1="108" x2="290" y2="224"/>
  </g>
  <!-- 각 분담사 캐릭터 -->
  <g transform="translate(165 166)">
    <circle r="11" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
    <circle cx="-4" cy="-2" r="1.6" fill="#171A20"/><circle cx="4" cy="-2" r="1.6" fill="#171A20"/>
    <path d="M -4 3.5 Q 0 7 4 3.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(215 166)">
    <circle r="11" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
    <path d="M -5.5 -2 Q -4 -3.7 -2.5 -2" fill="none" stroke="#171A20" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 2.5 -2 Q 4 -3.7 5.5 -2" fill="none" stroke="#171A20" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M -4 3.5 Q 0 7 4 3.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(265 166)">
    <circle r="11" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
    <circle cx="-4" cy="-2" r="1.6" fill="#171A20"/><circle cx="4" cy="-2" r="1.6" fill="#171A20"/>
    <path d="M -3.5 4 L 3.5 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(315 166)">
    <circle r="11" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
    <circle cx="-4" cy="-2" r="1.6" fill="#171A20"/>
    <path d="M 2 -2 L 6 -2" fill="none" stroke="#171A20" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M -4 3.5 Q 0 7 4 3.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
