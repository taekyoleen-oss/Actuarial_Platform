<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 워킹커버: 저층 재보험 계층이 매년 들어오는 손해를 흡수하는 층 구조 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 재보험 층 구조 (좌측) -->
  <!-- 상위층 (High layer) - 활성화 안됨 -->
  <rect x="80" y="60" width="180" height="50" fill="#FAFAF7" stroke="#171A20" stroke-width="2" rx="3" opacity=".5"/>
  <text x="120" y="89" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".35">High XL</text>
  <!-- 워킹커버층 (Working Cover, Sky) -->
  <rect x="80" y="112" width="180" height="60" fill="#4A90C2" stroke="#171A20" stroke-width="2.5" rx="3"/>
  <text x="96" y="138" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#FFFFFF" opacity=".9">Working</text>
  <text x="105" y="154" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#FFFFFF" opacity=".9">Cover</text>
  <!-- 보유층 (Retention) -->
  <rect x="80" y="174" width="180" height="50" fill="#EAF2F9" stroke="#171A20" stroke-width="2" rx="3"/>
  <text x="105" y="202" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">Retention</text>
  <!-- 좌측 화살표 라벨: 손해 규모 -->
  <line x1="66" y1="60" x2="66" y2="224" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 61 69 L 66 60 L 71 69" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="44" y="148" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">Loss</text>
  <!-- 우측: 매년 손해가 들어오는 모습, 작은 사고 화살표들 -->
  <line x1="310" y1="110" x2="262" y2="140" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
  <path d="M 305 125 L 310 110 L 298 120" fill="none" stroke="#4A90C2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="340" y1="148" x2="262" y2="148" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
  <path d="M 330 143 L 340 148 L 330 153" fill="none" stroke="#4A90C2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 캐릭터: 땀방울 (매년 들어오는 손해 걱정) -->
  <g transform="translate(370 110)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 17 -11 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#4A90C2"/>
  </g>
  <!-- 캐릭터: 미소 (워킹커버가 흡수) -->
  <g transform="translate(400 170)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
