<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 실효: 보험료 미납으로 계약이 효력을 잃고 이탈 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 유지율 감소 곡선(Sky) -->
<path d="M 84 88 Q 180 150 250 178 T 392 210" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="92" y="80" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">유지율</text>
<text x="396" y="252" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">경과기간</text>
<!-- 이탈하는 계약(떨어지는 사람) -->
<g transform="translate(250 200)"><circle r="12" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4" cy="-2" r="1.6" fill="#171A20"/><circle cx="4" cy="-2" r="1.6" fill="#171A20"/><path d="M -4 5 Q 0 1.5 4 5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<path d="M 268 206 L 300 224" stroke="#171A20" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="4 4"/>
<path d="M 300 224 l -9 -1 l 4 8 z" fill="#171A20"/>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
