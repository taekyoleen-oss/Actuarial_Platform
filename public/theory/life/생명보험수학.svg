<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 생명보험수학: 수지상등(보험료 현가 = 급부 현가)의 저울 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="240" y1="92" x2="240" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="186" y1="232" x2="294" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="150" y1="100" x2="330" y2="100" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<circle cx="240" cy="100" r="5" fill="#4A90C2"/>
<!-- 왼쪽: 보험료 현가 -->
<path d="M 124 100 Q 150 144 176 100 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<text x="150" y="130" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".6">P ä</text>
