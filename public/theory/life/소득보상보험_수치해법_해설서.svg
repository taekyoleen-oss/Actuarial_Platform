<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 소득보상보험의 수치해법: 연속 곡선을 구분구적(이산화)으로 근사 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <path d="M 80 86 L 80 238 L 412 238" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 구분구적 막대 (이산 근사) -->
  <g fill="#EAF2F9" stroke="#171A20" stroke-width="2">
    <rect x="104" y="166" width="30" height="72"/>
    <rect x="140" y="142" width="30" height="96"/>
    <rect x="176" y="128" width="30" height="110"/>
    <rect x="212" y="124" width="30" height="114"/>
    <rect x="248" y="130" width="30" height="108"/>
    <rect x="284" y="144" width="30" height="94"/>
  </g>
  <rect x="320" y="162" width="30" height="76" fill="#4A90C2" stroke="#171A20" stroke-width="2"/>
  <!-- 연속 곡선 -->
  <path d="M 88 192 C 150 122 240 108 300 142 C 344 166 380 192 406 206"
        fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <text x="92" y="106" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">Σ</text>
  <!-- 마지막 칸을 들고 오는 캐릭터 -->
  <g transform="translate(382 217)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <rect x="-30" y="-6" width="13" height="13" fill="#4A90C2" stroke="#171A20" stroke-width="2"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
