<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 질병보험: 병상에서 회복 중인 환자(이마 수건)와 체온계 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 지면 -->
  <line x1="92" y1="238" x2="400" y2="238" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 침대 -->
  <line x1="122" y1="142" x2="122" y2="238" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="368" y1="170" x2="368" y2="238" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <rect x="122" y="192" width="246" height="22" rx="6" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <!-- 베개 -->
  <rect x="132" y="176" width="54" height="18" rx="7" fill="#EEF4FF" stroke="#171A20" stroke-width="2.5"/>
  <!-- 환자 (이마 수건 + 일자 입) -->
  <g transform="translate(159 162)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <rect x="-12" y="-14" width="24" height="8" rx="3" fill="#EAF2F9" stroke="#171A20" stroke-width="2"/>
    <circle cx="-4.5" cy="0" r="1.8" fill="#171A20"/><circle cx="4.5" cy="0" r="1.8" fill="#171A20"/>
    <path d="M -4.5 6 L 4.5 6" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 이불 (Sky) -->
  <path d="M 192 178 Q 196 170 204 170 L 352 170 Q 360 170 360 178 L 360 192 L 192 192 Z"
        fill="#4A90C2" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <!-- 체온계 -->
  <line x1="330" y1="96" x2="330" y2="138" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <g stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".45">
    <line x1="330" y1="104" x2="337" y2="104"/>
    <line x1="330" y1="114" x2="337" y2="114"/>
    <line x1="330" y1="124" x2="337" y2="124"/>
  </g>
  <circle cx="330" cy="146" r="7" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
