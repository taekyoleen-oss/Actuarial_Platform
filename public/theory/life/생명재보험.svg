<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 생명재보험: 생명보험 위험의 일부를 재보험사로 출재 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 보험사 건물 -->
<rect x="92" y="148" width="64" height="70" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<text x="124" y="238" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">원수사</text>
<!-- 재보험사 건물 -->
<rect x="324" y="130" width="64" height="88" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<text x="356" y="238" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">재보험사</text>
<!-- 출재 화살표(위험 일부, Sky) -->
<path d="M 160 166 L 320 156" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<path d="M 320 156 l -10 -4 l 2 10 z" fill="#4A90C2"/>
<text x="240" y="142" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">위험 출재</text>
<!-- 보험료 일부 반대방향 -->
<path d="M 320 188 L 160 196" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5 4"/>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
