<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 프레일티(취약성): 개인별 위험 배수 Z로 기준 위험률을 곱함 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 기준 위험률(Ink) -->
<path d="M 84 210 Q 220 200 360 150" fill="none" stroke="#171A20" stroke-width="2.5" stroke-opacity=".5" stroke-linecap="round"/>
<text x="300" y="170" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".45">기준 h(x)</text>
<!-- 취약(Z>1, Sky 위로) -->
<path d="M 84 200 Q 200 170 340 84" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="300" y="92" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">Z·h(x)</text>
<!-- 건강(Z<1, 아래) -->
<path d="M 84 218 Q 240 214 372 196" fill="none" stroke="#171A20" stroke-width="2.5" stroke-opacity=".35" stroke-linecap="round"/>
<g transform="translate(150 178)"><circle r="12" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4" cy="-2" r="1.6" fill="#171A20"/><circle cx="4" cy="-2" r="1.6" fill="#171A20"/><path d="M -4 5 Q 0 1.5 4 5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/><path d="M 16 -10 q 3 4 0 6 q -3 -2 0 -6" fill="#4A90C2"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
