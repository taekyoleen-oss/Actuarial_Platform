<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 생명보험의 옵션과 보증: 시장이 나빠도 떠받치는 최저보증 바닥 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 적립금(변동) -->
<path d="M 84 150 Q 140 110 190 150 T 300 168 T 392 120" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-opacity=".55"/>
<!-- 최저보증 바닥(Sky) -->
<line x1="84" y1="184" x2="392" y2="184" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="92" y="176" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">최저보증(floor)</text>
<!-- 떨어지려다 바닥에 받쳐지는 화살표 -->
<path d="M 256 168 L 256 182" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<path d="M 256 182 l -4 -8 l 8 0 z" fill="#171A20"/>
<g transform="translate(330 100)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
