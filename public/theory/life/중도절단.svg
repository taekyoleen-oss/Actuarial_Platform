<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 중도절단: 관측이 끝나 사건을 못 본 자료(오른쪽 절단) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="100" y1="232" x2="100" y2="72" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 관측 종료선 -->
<line x1="330" y1="80" x2="330" y2="232" stroke="#4A90C2" stroke-width="4" stroke-dasharray="6 5" stroke-linecap="round"/>
<text x="330" y="72" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#4A90C2">관측종료</text>
<!-- 사건 관측됨(●) -->
<line x1="100" y1="108" x2="248" y2="108" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<circle cx="248" cy="108" r="6" fill="#171A20"/>
<line x1="100" y1="150" x2="190" y2="150" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<circle cx="190" cy="150" r="6" fill="#171A20"/>
<!-- 절단(→ 화살표, 사건 못 봄) -->
<line x1="100" y1="192" x2="330" y2="192" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-opacity=".55"/>
<path d="M 330 192 l -10 -5 l 0 10 z" fill="#4A90C2"/>
<text x="346" y="196" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#4A90C2">절단</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
