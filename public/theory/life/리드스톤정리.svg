<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 리드스톤 정리: 기초율을 강화하면 책임준비금이 더 빨리 쌓임 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 강화된 기초율 준비금(Sky, 더 가파름) -->
<path d="M 84 220 Q 200 150 360 88" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="300" y="100" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#4A90C2">강화 기초율</text>
<!-- 기준 준비금(Ink, 완만) -->
<path d="M 84 224 Q 220 184 372 132" fill="none" stroke="#171A20" stroke-width="2.5" stroke-opacity=".5" stroke-linecap="round"/>
<text x="300" y="160" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".45">기준</text>
<text x="92" y="84" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".6">V_t</text>
<g transform="translate(170 168)"><circle r="12" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4" cy="-2" r="1.6" fill="#171A20"/><circle cx="4" cy="-2" r="1.6" fill="#171A20"/><path d="M -4 4 Q 0 8 4 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
