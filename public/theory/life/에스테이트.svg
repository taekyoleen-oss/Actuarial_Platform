<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 에스테이트: 자산이 부채를 초과하는 공동 잉여(고아 자산)를 나눠 갖는 장면 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 원 (기금 풀) -->
  <circle cx="240" cy="148" r="88" fill="#EAF2F9" stroke="#4A90C2" stroke-width="5"/>
  <!-- 원 안 수식 기호 -->
  <text x="213" y="155" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#171A20" opacity=".55">A − L</text>
  <!-- 상단 라벨 -->
  <text x="207" y="44" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">Estate</text>
  <!-- 라벨 연결선 -->
  <line x1="240" y1="60" x2="240" y2="90" stroke="#171A20" stroke-width="2" stroke-dasharray="5 4" opacity=".4"/>
  <!-- 캐릭터 3명: 상호회사 계약자들이 잉여를 바라보는 장면 -->
  <g transform="translate(136 232)">
    <circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(240 252)">
    <circle r="13" fill="#ECFDF5" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <g transform="translate(344 232)">
    <circle r="13" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
