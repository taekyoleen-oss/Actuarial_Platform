<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 평균잔여수명: 특정 연령에서 앞으로 더 살 기대여명 e_x -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="200" x2="408" y2="200" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 현재 연령 위치 -->
<line x1="160" y1="186" x2="160" y2="214" stroke="#171A20" stroke-width="3"/>
<text x="160" y="232" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">x</text>
<!-- 잔여수명 화살표(Sky) -->
<line x1="160" y1="200" x2="356" y2="200" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<path d="M 356 200 l -12 -6 l 0 12 z" fill="#4A90C2"/>
<text x="258" y="186" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#4A90C2">e_x (기대여명)</text>
<!-- 사람 -->
<g transform="translate(160 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20" stroke="#171A20" stroke-width="2.2" stroke-linejoin="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
