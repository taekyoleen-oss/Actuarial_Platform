<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 수익성 검증: 보유연도별 이익 시그니처(초기 손실→후기 이익) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="160" x2="408" y2="160" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="72" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 초기 음(-) 막대 -->
<rect x="104" y="160" width="34" height="46" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<rect x="146" y="160" width="34" height="24" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<!-- 후기 양(+) 막대(Sky) -->
<rect x="194" y="128" width="34" height="32" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<rect x="236" y="112" width="34" height="48" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<rect x="278" y="100" width="34" height="60" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<rect x="320" y="116" width="34" height="44" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<text x="120" y="200" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".5">초기손실</text>
<text x="296" y="92" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#4A90C2">이익</text>
<text x="396" y="180" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">연도</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
