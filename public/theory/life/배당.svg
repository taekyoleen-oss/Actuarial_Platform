<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 배당: 잉여금이 장벽 수준에 닿으면 초과분을 쏟아내는 수도꼭지 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <path d="M 72 52 L 72 240 L 430 240" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 잉여금 상승 곡선 -->
  <path d="M 88 220 C 140 210 190 180 230 148 L 230 148" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 장벽 수평선 (b) -->
  <line x1="72" y1="148" x2="420" y2="148" stroke="#171A20" stroke-width="2" stroke-dasharray="8 5" opacity=".5"/>
  <!-- b 라벨 -->
  <text x="54" y="152" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">b</text>
  <!-- t 라벨 -->
  <text x="408" y="258" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t →</text>
  <!-- 장벽 이후 수평 구간 (장벽 전략: 초과분 즉시 배당) -->
  <path d="M 230 148 L 380 148" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 초과분 하강 화살표 (배당 지급) - Sky Pastel 면 영역 -->
  <path d="M 230 148 L 230 240 L 88 240 L 88 220 C 140 210 190 180 230 148 Z" fill="#EAF2F9" opacity=".6"/>
  <!-- 캐릭터 1: 잉여 쌓이는 구간 (미소) -->
  <g transform="translate(170 160)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 캐릭터 2: 장벽 도달 후 (손 들어 배당 받기) -->
  <g transform="translate(310 120)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <!-- 수식 기호 -->
  <text x="82" y="46" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">R(t)</text>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
