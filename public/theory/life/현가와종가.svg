<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 현가와 종가: 할인(←)과 적립(→)으로 시점 간 가치 환산 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="180" x2="408" y2="180" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 시점 눈금 -->
<g stroke="#171A20" stroke-width="2.5"><line x1="120" y1="172" x2="120" y2="188"/><line x1="360" y1="172" x2="360" y2="188"/></g>
<text x="120" y="206" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">현재</text>
<text x="360" y="206" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">미래</text>
<!-- 적립(→ Sky) -->
<path d="M 130 150 Q 240 116 350 150" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<path d="M 350 150 l -10 -6 l 0 11 z" fill="#4A90C2"/>
<text x="240" y="116" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">적립 ×(1+i)^n</text>
<!-- 할인(← Ink) -->
<path d="M 350 210 Q 240 244 130 210" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<path d="M 130 210 l 10 -6 l 0 11 z" fill="#171A20"/>
<text x="240" y="240" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">할인 ×v^n</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
