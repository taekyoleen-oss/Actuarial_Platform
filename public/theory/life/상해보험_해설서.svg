<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 상해보험: 사고를 덮는 큰 반창고, 다친 얼굴에서 회복한 얼굴로 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 지면 -->
  <line x1="84" y1="232" x2="396" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 큰 반창고 (보장) -->
  <g transform="rotate(-22 240 138)">
    <rect x="158" y="111" width="164" height="54" rx="27" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
    <rect x="212" y="119" width="56" height="38" rx="6" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
    <g fill="#FFFFFF">
      <circle cx="182" cy="130" r="2.2"/><circle cx="196" cy="138" r="2.2"/><circle cx="182" cy="146" r="2.2"/>
      <circle cx="298" cy="130" r="2.2"/><circle cx="284" cy="138" r="2.2"/><circle cx="298" cy="146" r="2.2"/>
    </g>
  </g>
  <!-- 다친 캐릭터 (혹 + 어질 별) -->
  <g transform="translate(128 217)">
    <circle r="13" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/>
    <circle cx="6" cy="-13" r="4" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -4.5 5.5 L 4.5 5.5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <g stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".35">
      <path d="M -22 -16 L -16 -16 M -19 -19 L -19 -13"/>
      <path d="M -14 -26 L -9 -26 M -11.5 -28.5 L -11.5 -23.5"/>
    </g>
  </g>
  <!-- 회복한 캐릭터 -->
  <g transform="translate(352 217)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <path d="M -6.5 -2.5 Q -4.5 -4.5 -2.5 -2.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
    <path d="M 2.5 -2.5 Q 4.5 -4.5 6.5 -2.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
