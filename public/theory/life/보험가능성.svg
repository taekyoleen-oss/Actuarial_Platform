<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 보험가능성: 어떤 위험이 보험으로 인수 가능한지 판정 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 판정 기준 체크리스트 카드 -->
<rect x="150" y="92" width="120" height="120" rx="8" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
<g stroke="#4A90C2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
<path d="M 166 118 l 8 8 l 14 -16"/><path d="M 166 150 l 8 8 l 14 -16"/></g>
<line x1="198" y1="122" x2="252" y2="122" stroke="#171A20" stroke-width="2.5" stroke-opacity=".4"/>
<line x1="198" y1="154" x2="252" y2="154" stroke="#171A20" stroke-width="2.5" stroke-opacity=".4"/>
<!-- 마지막 항목 X(인수 불가) -->
<g stroke="#171A20" stroke-width="3.5" stroke-linecap="round" stroke-opacity=".5"><line x1="166" y1="178" x2="180" y2="192"/><line x1="180" y1="178" x2="166" y2="192"/></g>
<line x1="198" y1="186" x2="252" y2="186" stroke="#171A20" stroke-width="2.5" stroke-opacity=".4"/>
<text x="210" y="232" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">인수 가능성 판정</text>
<g transform="translate(322 130)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
