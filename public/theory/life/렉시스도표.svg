<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 렉시스 도표: 연령(세로)·달력시간(가로)을 잇는 45도 생애선 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="110" y1="232" x2="392" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="110" y1="232" x2="110" y2="72" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="100" y="82" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">연령</text>
<text x="392" y="252" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">달력시간</text>
<!-- 격자 -->
<g stroke="#171A20" stroke-width="1.5" stroke-opacity=".25"><line x1="180" y1="232" x2="180" y2="90"/><line x1="250" y1="232" x2="250" y2="90"/><line x1="320" y1="232" x2="320" y2="90"/><line x1="110" y1="180" x2="392" y2="180"/><line x1="110" y1="128" x2="392" y2="128"/></g>
<!-- 45도 생애선(Sky) -->
<line x1="118" y1="224" x2="300" y2="92" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<line x1="180" y1="224" x2="340" y2="108" stroke="#4A90C2" stroke-width="3" stroke-opacity=".5" stroke-linecap="round"/>
<!-- 사건 점 -->
<circle cx="300" cy="92" r="6" fill="#171A20"/>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
