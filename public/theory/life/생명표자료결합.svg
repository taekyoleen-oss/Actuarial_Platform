<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 생명표 자료의 결합: 여러 자료원을 하나의 생명표로 통합 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 두 자료원 -->
<rect x="96" y="96" width="60" height="48" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/>
<rect x="96" y="172" width="60" height="48" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/>
<g stroke="#171A20" stroke-width="2" stroke-opacity=".4"><line x1="106" y1="112" x2="146" y2="112"/><line x1="106" y1="124" x2="146" y2="124"/><line x1="106" y1="188" x2="146" y2="188"/><line x1="106" y1="200" x2="146" y2="200"/></g>
<!-- 결합 화살표 -->
<path d="M 162 120 L 240 150" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<path d="M 162 196 L 240 162" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<!-- 통합 생명표(Sky 강조) -->
<rect x="244" y="120" width="80" height="72" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
<rect x="244" y="120" width="80" height="18" fill="#4A90C2" fill-opacity=".3"/>
<g stroke="#171A20" stroke-width="2" stroke-opacity=".4"><line x1="256" y1="152" x2="312" y2="152"/><line x1="256" y1="166" x2="312" y2="166"/><line x1="256" y1="180" x2="312" y2="180"/></g>
<text x="284" y="208" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">통합 생명표</text>
<g transform="translate(372 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
