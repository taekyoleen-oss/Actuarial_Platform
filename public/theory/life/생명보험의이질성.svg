<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 생명보험의 이질성: 같은 연령이라도 위험이 다른 여러 집단 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 위험 낮은 집단 -->
<path d="M 84 222 Q 240 214 392 150" fill="none" stroke="#ECFDF5" stroke-width="0"/>
<path d="M 84 222 Q 260 214 380 140" fill="none" stroke="#171A20" stroke-width="2.5" stroke-opacity=".4" stroke-linecap="round"/>
<!-- 평균(Sky) -->
<path d="M 84 222 Q 240 210 392 108" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- 위험 높은 집단 -->
<path d="M 84 222 Q 220 206 360 76" fill="none" stroke="#171A20" stroke-width="2.5" stroke-opacity=".4" stroke-linecap="round"/>
<text x="300" y="120" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">평균</text>
<!-- 세 얼굴(다른 위험군) -->
<g transform="translate(150 188)"><circle r="11" fill="#ECFDF5" stroke="#171A20" stroke-width="3"/><circle cx="-3.6" cy="-2" r="1.5" fill="#171A20"/><circle cx="3.6" cy="-2" r="1.5" fill="#171A20"/><path d="M -4 4 Q 0 7.5 4 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<g transform="translate(220 168)"><circle r="11" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-3.6" cy="-2" r="1.5" fill="#171A20"/><circle cx="3.6" cy="-2" r="1.5" fill="#171A20"/><path d="M -4 4 Q 0 7.5 4 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<g transform="translate(290 146)"><circle r="11" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/><circle cx="-3.6" cy="-2" r="1.5" fill="#171A20"/><circle cx="3.6" cy="-2" r="1.5" fill="#171A20"/><path d="M -4 5 Q 0 1.5 4 5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
