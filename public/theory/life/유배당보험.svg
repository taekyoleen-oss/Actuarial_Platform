<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 유배당보험: 잉여를 계약자에게 배당으로 환원 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 잉여금 통 -->
<path d="M 176 110 L 304 110 L 290 176 L 190 176 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
<text x="240" y="150" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">잉여금</text>
<!-- 배당 동전 떨어짐(Sky) -->
<g fill="#4A90C2"><circle cx="170" cy="206" r="8"/><circle cx="240" cy="216" r="8"/><circle cx="310" cy="206" r="8"/></g>
<path d="M 200 176 L 176 196" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"/>
<path d="M 240 176 L 240 198" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"/>
<path d="M 280 176 L 304 196" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"/>
<!-- 받는 계약자 -->
<g transform="translate(360 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20" stroke="#171A20" stroke-width="2.2" stroke-linejoin="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
