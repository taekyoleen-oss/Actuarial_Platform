<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 분리법: 런오프 삼각형의 지급 패턴(μ)과 인플레이션(λ)을 두 축으로 분리하는 장면 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="80" y1="240" x2="380" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="240" x2="80" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 축 라벨 -->
  <text x="390" y="245" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">j</text>
  <text x="72" y="52" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">λ</text>
  <!-- 삼각형 격자(런오프 삼각형 표현) -->
  <!-- 행 1 -->
  <rect x="100" y="80" width="48" height="40" fill="#EAF2F9" stroke="#171A20" stroke-width="1.5"/>
  <rect x="148" y="80" width="48" height="40" fill="#EAF2F9" stroke="#171A20" stroke-width="1.5"/>
  <rect x="196" y="80" width="48" height="40" fill="#EAF2F9" stroke="#171A20" stroke-width="1.5"/>
  <!-- 행 2 -->
  <rect x="100" y="120" width="48" height="40" fill="#EAF2F9" stroke="#171A20" stroke-width="1.5"/>
  <rect x="148" y="120" width="48" height="40" fill="#EAF2F9" stroke="#171A20" stroke-width="1.5"/>
  <!-- 행 3 (삼각형) -->
  <rect x="100" y="160" width="48" height="40" fill="#EAF2F9" stroke="#171A20" stroke-width="1.5"/>
  <!-- 대각선(λ 방향) Sky 강조 -->
  <line x1="100" y1="80" x2="244" y2="80" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="196" y2="120" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- μ 라벨 -->
  <text x="260" y="105" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">μ×λ</text>
  <!-- 캐릭터 -->
  <g transform="translate(340 195)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
