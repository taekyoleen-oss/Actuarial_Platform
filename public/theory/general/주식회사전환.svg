<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 주식회사 전환: 상호회사(회원)가 주식회사(주주)로 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 왼쪽: 상호회사(회원 원) -->
<circle cx="148" cy="150" r="46" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<g fill="#171A20"><circle cx="148" cy="128" r="5"/><circle cx="130" cy="158" r="5"/><circle cx="166" cy="158" r="5"/></g>
<text x="148" y="214" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">상호회사</text>
<!-- 화살표 -->
<path d="M 206 150 L 270 150" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<path d="M 270 150 l -9 -5 l 0 10 z" fill="#171A20"/>
<!-- 오른쪽: 주식회사(주식 증서, Sky) -->
<rect x="296" y="116" width="68" height="68" fill="#4A90C2" fill-opacity=".25" stroke="#171A20" stroke-width="3"/>
<text x="330" y="146" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">주식</text>
<line x1="310" y1="158" x2="350" y2="158" stroke="#171A20" stroke-width="2" stroke-opacity=".5"/>
<line x1="310" y1="170" x2="350" y2="170" stroke="#171A20" stroke-width="2" stroke-opacity=".5"/>
<text x="330" y="214" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">주식회사</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
