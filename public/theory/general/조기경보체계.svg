<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 조기경보체계: 재무지표 게이지가 위험구간에 들면 경보 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 게이지 반원 -->
<path d="M 150 200 A 90 90 0 0 1 330 200" fill="none" stroke="#171A20" stroke-width="3"/>
<path d="M 150 200 A 90 90 0 0 1 198 124" fill="none" stroke="#EAF2F9" stroke-width="10"/>
<path d="M 282 124 A 90 90 0 0 1 330 200" fill="none" stroke="#4A90C2" stroke-width="10"/>
<!-- 바늘(위험구간 가리킴) -->
<line x1="240" y1="200" x2="300" y2="146" stroke="#171A20" stroke-width="4" stroke-linecap="round"/>
<circle cx="240" cy="200" r="7" fill="#171A20"/>
<!-- 경보 신호 -->
<circle cx="240" cy="96" r="12" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
<g stroke="#171A20" stroke-width="2.5" stroke-linecap="round"><line x1="240" y1="76" x2="240" y2="68"/><line x1="262" y1="84" x2="268" y2="78"/><line x1="218" y1="84" x2="212" y2="78"/></g>
<text x="240" y="232" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">재무건전성 지표</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
