<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 전문직윤리: 저울(공정)을 들고 서 있는 계리사(선임계리사 제도·독립성) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 저울 막대(가로, Sky) -->
  <line x1="155" y1="115" x2="325" y2="115" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 저울 기둥 -->
  <line x1="240" y1="115" x2="240" y2="220" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 왼쪽 접시 줄 -->
  <line x1="175" y1="115" x2="175" y2="155" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <line x1="195" y1="115" x2="195" y2="155" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <!-- 왼쪽 접시(균형) -->
  <path d="M 160 158 Q 185 165 210 158" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 오른쪽 접시 줄 -->
  <line x1="285" y1="115" x2="285" y2="155" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <line x1="305" y1="115" x2="305" y2="155" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <!-- 오른쪽 접시(균형) -->
  <path d="M 270 158 Q 295 165 320 158" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 저울 기저 -->
  <rect x="215" y="218" width="50" height="12" rx="3" fill="#171A20"/>
  <!-- 원칙 기호들 -->
  <text x="170" y="152" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">E</text>
  <text x="282" y="152" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">I</text>
  <!-- 중앙 캐릭터(계리사) 위쪽에 저울 받침 -->
  <g transform="translate(240 258)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <!-- 손 올리기 -->
    <line x1="0" y1="-13" x2="0" y2="-38" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 측면 캐릭터들(고용주·계약자) -->
  <g transform="translate(95 200)">
    <circle r="11" fill="#EEF4FF" stroke="#171A20" stroke-width="2.5"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#171A20"/>
    <circle cx="4" cy="-2" r="1.5" fill="#171A20"/>
    <path d="M -4 4 L 4 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(385 200)">
    <circle r="11" fill="#FFF7ED" stroke="#171A20" stroke-width="2.5"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#171A20"/>
    <circle cx="4" cy="-2" r="1.5" fill="#171A20"/>
    <path d="M -4 4 L 4 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
