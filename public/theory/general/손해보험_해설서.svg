<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 손해보험: 재산(집·자동차)을 지키는 큰 방패 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 지면 -->
  <line x1="100" y1="252" x2="396" y2="252" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 방패 (보장) -->
  <path d="M 240 56 L 326 82 L 326 154 C 326 204 290 236 240 252 C 190 236 154 204 154 154 L 154 82 Z"
        fill="#4A90C2" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <!-- 집 -->
  <path d="M 182 152 L 211 128 L 240 152 Z" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="189" y="152" width="44" height="38" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
  <rect x="204" y="168" width="14" height="22" fill="#EAF2F9" stroke="#171A20" stroke-width="2"/>
  <!-- 자동차 -->
  <path d="M 250 178 Q 254 164 268 164 L 286 164 Q 298 164 304 176" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <rect x="244" y="176" width="66" height="16" rx="6" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
  <circle cx="262" cy="194" r="7" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
  <circle cx="292" cy="194" r="7" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
  <!-- 안심한 캐릭터 -->
  <g transform="translate(364 237)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <path d="M -6.5 -2.5 Q -4.5 -4.5 -2.5 -2.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
    <path d="M 2.5 -2.5 Q 4.5 -4.5 6.5 -2.5" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
