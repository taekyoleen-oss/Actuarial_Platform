<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 영업보험 규제완화: 요율·약관 규제 장벽을 낮춰 자율 경쟁 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 들어올려지는 차단봉(게이트) -->
<rect x="120" y="200" width="24" height="32" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<line x1="132" y1="200" x2="300" y2="120" stroke="#4A90C2" stroke-width="6" stroke-linecap="round"/>
<g stroke="#4A90C2" stroke-width="6"><line x1="160" y1="186" x2="172" y2="180"/><line x1="200" y1="167" x2="212" y2="161"/><line x1="240" y1="148" x2="252" y2="142"/></g>
<!-- 위로 열림 화살표 -->
<path d="M 320 132 L 320 100" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<path d="M 320 100 l -5 9 l 10 0 z" fill="#171A20"/>
<text x="320" y="92" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".6">자율</text>
<!-- 통과하는 사람 -->
<g transform="translate(220 208)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20" stroke="#171A20" stroke-width="2.2" stroke-linejoin="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
