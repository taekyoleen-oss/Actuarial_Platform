<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 회계: 자산=부채+자본 등식과 IFRS17 대차대조표 구조 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 대차대조표 표 외곽 -->
  <rect x="90" y="70" width="300" height="180" rx="5" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <!-- 헤더 바 (Sky) -->
  <rect x="90" y="70" width="300" height="26" rx="5" fill="#4A90C2"/>
  <!-- 세로 중앙 구분선 -->
  <line x1="240" y1="96" x2="240" y2="250" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 가로 중간 줄 -->
  <line x1="90" y1="165" x2="390" y2="165" stroke="#171A20" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="90" y1="195" x2="390" y2="195" stroke="#EAF2F9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="90" y1="220" x2="390" y2="220" stroke="#EAF2F9" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 왼쪽: 자산 레이블 -->
  <text x="100" y="118" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".55">A</text>
  <!-- 등식 기호 -->
  <text x="220" y="185" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#4A90C2" fill-opacity=".9">=</text>
  <!-- 오른쪽: 부채+자본 레이블 -->
  <text x="255" y="140" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">L</text>
  <text x="255" y="210" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">E</text>
  <!-- CSM 표시 (IFRS17 연결) -->
  <text x="260" y="165" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".4">CSM</text>
  <!-- 캐릭터 -->
  <g transform="translate(415 195)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
