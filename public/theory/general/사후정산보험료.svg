<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 사후정산보험료: 실손경험이 나온 뒤 저울로 보험료를 재조정하는 장면 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 저울 기둥 -->
  <line x1="240" y1="230" x2="240" y2="110" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 저울 가로대 (Sky 강조) -->
  <line x1="130" y1="110" x2="350" y2="110" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 왼쪽 접시 줄 -->
  <line x1="155" y1="110" x2="155" y2="155" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <line x1="175" y1="110" x2="175" y2="155" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <!-- 왼쪽 접시(무거운 쪽 - 손해 많음) -->
  <path d="M 140 158 Q 165 168 190 158" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 오른쪽 접시 줄 -->
  <line x1="305" y1="110" x2="305" y2="145" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <line x1="325" y1="110" x2="325" y2="145" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <!-- 오른쪽 접시(가벼운 쪽) -->
  <path d="M 290" y1="148 Q 315 155 340 148" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 290 148 Q 315 155 340 148" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 손실 기호 왼쪽 -->
  <text x="154" y="152" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".55">L</text>
  <!-- 보험료 기호 오른쪽 -->
  <text x="305" y="143" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".55">P</text>
  <!-- 저울 기저 -->
  <rect x="215" y="228" width="50" height="12" rx="3" fill="#171A20"/>
  <!-- 캐릭터 왼쪽 -->
  <g transform="translate(100 195)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 캐릭터 오른쪽 -->
  <g transform="translate(380 195)">
    <circle r="13" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
