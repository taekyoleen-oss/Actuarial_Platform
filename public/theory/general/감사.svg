</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 장부 -->
<rect x="150" y="96" width="120" height="150" rx="6" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
<line x1="168" y1="124" x2="252" y2="124" stroke="#171A20" stroke-width="2.5" stroke-opacity=".5"/>
<line x1="168" y1="146" x2="252" y2="146" stroke="#171A20" stroke-width="2.5" stroke-opacity=".5"/>
<line x1="168" y1="168" x2="234" y2="168" stroke="#171A20" stroke-width="2.5" stroke-opacity=".5"/>
<!-- 체크 -->
<path d="M 176 196 l 12 12 l 22 -26" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
