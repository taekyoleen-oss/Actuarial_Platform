<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 묶음판매: 여러 보장을 하나로 묶어 판매(번들) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 세 보장 상자 -->
<rect x="166" y="120" width="50" height="50" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<rect x="224" y="120" width="50" height="50" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<rect x="195" y="172" width="50" height="50" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<!-- 묶는 끈(Sky) -->
<path d="M 150 146 Q 220 100 290 146 Q 300 196 220 232 Q 150 196 150 146 Z" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linejoin="round"/>
<!-- 리본 매듭 -->
<path d="M 220 100 q -12 -10 -2 -20 M 220 100 q 12 -10 2 -20" fill="none" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
<g transform="translate(330 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20" stroke="#171A20" stroke-width="2.2" stroke-linejoin="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
