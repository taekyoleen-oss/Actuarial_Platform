<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 파레토요율: 파레토 두꺼운 꼬리 곡선 위에 손해 분포와 초과층 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="70" y1="235" x2="410" y2="235" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="235" x2="70" y2="55" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 축 라벨 -->
  <text x="415" y="240" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">x</text>
  <text x="58" y="50" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">f</text>
  <!-- 파레토 분포 곡선(두꺼운 꼬리) - Sky -->
  <path d="M 85 80 Q 110 82 140 110 Q 180 145 230 175 Q 290 205 380 225" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 곡선 아래 면 -->
  <path d="M 85 80 Q 110 82 140 110 Q 180 145 230 175 Q 290 205 380 225 L 380 235 L 85 235 Z" fill="#EAF2F9" fill-opacity=".7"/>
  <!-- 초과손해 기준선 -->
  <line x1="200" y1="235" x2="200" y2="165" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 4"/>
  <!-- 기준선 위 초과층 -->
  <text x="210" y="150" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">XS</text>
  <!-- d 기호 -->
  <text x="195" y="250" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">d</text>
  <!-- 캐릭터 -->
  <g transform="translate(355 195)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
