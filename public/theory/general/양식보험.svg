<g transform="translate(280 208) scale(.8)"><path d="M -14 0 Q 0 -10 14 0 Q 0 10 -14 0 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/><path d="M 14 0 l 10 -6 l 0 12 z" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/><circle cx="-6" cy="-1" r="1.6" fill="#171A20"/></g>
