<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 물(양식장) -->
<path d="M 96 196 q 24 -16 48 0 t 48 0 t 48 0 t 48 0 t 48 0" fill="none" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
<path d="M 96 214 q 24 -16 48 0 t 48 0 t 48 0 t 48 0 t 48 0" fill="none" stroke="#4A90C2" stroke-width="3" stroke-opacity=".5" stroke-linecap="round"/>
