<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 캡티브(자가전속보험): 모기업 빌딩이 세운, 우산을 쓴 자회사 보험사 빌딩 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 지면 -->
  <line x1="80" y1="232" x2="400" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 모기업 빌딩 (얼굴 있는 큰 건물) -->
  <rect x="122" y="90" width="92" height="142" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <circle cx="156" cy="114" r="2" fill="#171A20"/><circle cx="180" cy="114" r="2" fill="#171A20"/>
  <path d="M 161 122 Q 168 127 175 122" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  <g fill="#EAF2F9" stroke="#171A20" stroke-width="2">
    <rect x="138" y="142" width="16" height="16"/><rect x="160" y="142" width="16" height="16"/><rect x="182" y="142" width="16" height="16"/>
    <rect x="138" y="168" width="16" height="16"/><rect x="160" y="168" width="16" height="16"/><rect x="182" y="168" width="16" height="16"/>
  </g>
  <rect x="156" y="204" width="24" height="28" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
  <!-- 출자·위험 이전 연결 (동전) -->
  <line x1="214" y1="186" x2="270" y2="186" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 8"/>
  <circle cx="242" cy="186" r="8" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
  <circle cx="242" cy="186" r="3" fill="#4A90C2"/>
  <!-- 캡티브 빌딩 (우산을 쓴 작은 건물) -->
  <path d="M 254 148 A 44 44 0 0 1 342 148 Z" fill="#4A90C2" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <line x1="298" y1="104" x2="298" y2="97" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="298" y1="148" x2="298" y2="160" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <rect x="270" y="160" width="56" height="72" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/>
  <circle cx="290" cy="180" r="2" fill="#171A20"/><circle cx="306" cy="180" r="2" fill="#171A20"/>
  <path d="M 293 188 Q 298 192 303 188" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  <rect x="288" y="208" width="20" height="24" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
