<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 연차보고서: 대차대조표 표를 들고 감독기관에 제출하는 계리사 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 결산서/보고서 문서 -->
  <rect x="155" y="75" width="130" height="165" rx="5" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <!-- 문서 헤더 바 (Sky) -->
  <rect x="155" y="75" width="130" height="22" rx="5" fill="#4A90C2"/>
  <!-- 표 라인들 -->
  <line x1="175" y1="115" x2="265" y2="115" stroke="#171A20" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="175" y1="130" x2="265" y2="130" stroke="#171A20" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="175" y1="145" x2="265" y2="145" stroke="#171A20" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="175" y1="160" x2="265" y2="160" stroke="#171A20" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 세로 구분선 -->
  <line x1="215" y1="107" x2="215" y2="210" stroke="#171A20" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 작은 숫자 표현 -->
  <text x="178" y="128" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">A</text>
  <text x="225" y="128" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">L</text>
  <line x1="175" y1="176" x2="265" y2="176" stroke="#EAF2F9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="175" y1="190" x2="265" y2="190" stroke="#EAF2F9" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 캐릭터(계리사) 들고 서 있음 -->
  <g transform="translate(340 190)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <!-- 손 -->
    <line x1="-13" y1="5" x2="-28" y2="5" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 제출 화살표 -->
  <path d="M 290 155 L 320 155" stroke="#4A90C2" stroke-width="4" stroke-linecap="round" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 Z" fill="#4A90C2"/></marker></defs>
  <!-- tkLeen pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
