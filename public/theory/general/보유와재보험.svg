<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 보유와 재보험: 보유한도 M 위로는 재보험(Sky), 아래는 보유(파스텔) -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <line x1="90" y1="238" x2="390" y2="238" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 손해 막대: 보유분(파스텔) -->
  <g fill="#EAF2F9" stroke="#171A20" stroke-width="2.5">
    <rect x="120" y="148" width="54" height="90"/>
    <rect x="210" y="148" width="54" height="90"/>
    <rect x="300" y="148" width="54" height="90"/>
  </g>
  <!-- 출재분 (Sky) -->
  <g fill="#4A90C2" stroke="#171A20" stroke-width="2.5">
    <rect x="210" y="88" width="54" height="60"/>
    <rect x="300" y="48" width="54" height="100"/>
  </g>
  <!-- 보유한도 M -->
  <line x1="96" y1="148" x2="384" y2="148" stroke="#171A20" stroke-width="2.5" stroke-dasharray="7 6" opacity=".55"/>
  <text x="390" y="152" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">M</text>
  <!-- 한도를 지키는 캐릭터 -->
  <g transform="translate(192 223)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
