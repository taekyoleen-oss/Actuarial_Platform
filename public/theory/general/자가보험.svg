<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 자가보험: 외부 우산 없이 스스로 방패를 든 캐릭터(위험 자체 보유) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 방패(자가보험 상징) - Sky -->
  <path d="M 210 75 L 270 75 L 290 130 L 240 175 L 190 130 Z" fill="#EAF2F9" stroke="#4A90C2" stroke-width="5" stroke-linejoin="round"/>
  <!-- 방패 중심 기호 -->
  <text x="225" y="135" font-family="ui-monospace,Consolas,monospace" font-size="18" fill="#171A20" fill-opacity=".55">$</text>
  <!-- 빗방울들 (외부 위험) - Ink -->
  <path d="M 130 85 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#171A20" fill-opacity=".3"/>
  <path d="M 150 65 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#171A20" fill-opacity=".3"/>
  <path d="M 120 110 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#171A20" fill-opacity=".3"/>
  <path d="M 340 90 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#171A20" fill-opacity=".3"/>
  <path d="M 360 70 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#171A20" fill-opacity=".3"/>
  <path d="M 355 115 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#171A20" fill-opacity=".3"/>
  <!-- 캐릭터 -->
  <g transform="translate(240 215)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <!-- 방패 받침 팔 -->
    <line x1="0" y1="-13" x2="0" y2="-38" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- tkLeen pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
