<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위험분류(요율측면): 위험을 동질 요율셀로 분류 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 분류 셀 격자 -->
<g stroke="#171A20" stroke-width="2.5" fill="#FFFFFF">
<rect x="150" y="100" width="56" height="44"/><rect x="206" y="100" width="56" height="44"/><rect x="262" y="100" width="56" height="44"/>
<rect x="150" y="144" width="56" height="44"/><rect x="206" y="144" width="56" height="44"/><rect x="262" y="144" width="56" height="44"/>
</g>
<!-- 저위험(파스텔)·고위험(Sky) 셀 -->
<rect x="150" y="100" width="56" height="44" fill="#ECFDF5"/>
<rect x="262" y="144" width="56" height="44" fill="#4A90C2" fill-opacity=".35"/>
<text x="178" y="126" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">저</text>
<text x="290" y="170" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">고</text>
<!-- 분류하는 사람 -->
<g transform="translate(360 120)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<text x="234" y="216" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".5">동질 요율셀</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
