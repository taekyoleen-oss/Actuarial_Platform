<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 손해사정비(ALAE): 보험금에 직접 결부되는 사정·조사 비용 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 보험금 블록(큰) -->
<rect x="130" y="120" width="120" height="100" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<text x="190" y="174" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".6">손해액</text>
<!-- ALAE 블록(작게 붙음, Sky) -->
<rect x="250" y="160" width="60" height="60" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
<text x="280" y="194" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#FFFFFF">ALAE</text>
<!-- 결부 표시(클립) -->
<path d="M 248 150 q 14 -2 14 12 v 20" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<g transform="translate(348 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
