<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 연속시간 미시모형: 개별 클레임의 연속 진전 경로로 준비금 산정 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 개별 클레임 진전 경로(연속) -->
<path d="M 96 210 Q 150 196 190 158 T 280 120" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<path d="M 110 222 Q 170 210 220 192 T 330 168" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-opacity=".5"/>
<path d="M 130 224 Q 200 218 260 206 T 372 196" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-opacity=".35"/>
<!-- 발생·보고·지급 이벤트 점 -->
<g fill="#171A20"><circle cx="96" cy="210" r="4"/><circle cx="190" cy="158" r="4"/><circle cx="280" cy="120" r="4"/></g>
<text x="120" y="120" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">개별 클레임 i(t)</text>
<text x="396" y="250" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
