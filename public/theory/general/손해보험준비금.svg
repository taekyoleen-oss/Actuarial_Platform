<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 손해보험 준비금: 진전삼각형으로 미래지급을 추정·적립 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 진전삼각형 -->
<g stroke="#171A20" stroke-width="2.5" fill="#EAF2F9">
<rect x="118" y="104" width="46" height="30"/><rect x="166" y="104" width="46" height="30"/><rect x="214" y="104" width="46" height="30"/><rect x="262" y="104" width="46" height="30"/>
<rect x="118" y="136" width="46" height="30"/><rect x="166" y="136" width="46" height="30"/><rect x="214" y="136" width="46" height="30"/>
<rect x="118" y="168" width="46" height="30"/><rect x="166" y="168" width="46" height="30"/>
<rect x="118" y="200" width="46" height="30"/>
</g>
<!-- 채워야 할 미래(Sky 점선) -->
<g stroke="#4A90C2" stroke-width="2.5" stroke-dasharray="4 4" fill="none">
<rect x="262" y="136" width="46" height="30"/><rect x="214" y="168" width="46" height="30"/><rect x="262" y="168" width="46" height="30"/><rect x="166" y="200" width="46" height="30"/><rect x="214" y="200" width="46" height="30"/><rect x="262" y="200" width="46" height="30"/>
</g>
<text x="330" y="190" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">미래지급 적립</text>
<g transform="translate(352 152)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
