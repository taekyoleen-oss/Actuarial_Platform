<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 재조달가액: 낡은 물건(시가)과 새 물건(재조달가액)을 비교하는 두 캐릭터 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 왼쪽: 낡은 건물(시가) -->
  <rect x="80" y="130" width="120" height="110" rx="3" fill="#FAFAF7" stroke="#171A20" stroke-width="2.5"/>
  <!-- 지붕 -->
  <path d="M 72 130 L 140 80 L 208 130 Z" fill="#FAFAF7" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 균열선(낡음) -->
  <path d="M 120 145 L 125 165 L 118 180" fill="none" stroke="#171A20" stroke-width="1.5" stroke-linecap="round"/>
  <!-- ACV 기호 -->
  <text x="110" y="210" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">ACV</text>
  <!-- 화살표(Sky) 중간 -->
  <path d="M 220 155 L 270 155" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <path d="M 260 148 L 270 155 L 260 162" fill="none" stroke="#4A90C2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 오른쪽: 새 건물(재조달가액) -->
  <rect x="285" y="115" width="120" height="125" rx="3" fill="#EAF2F9" stroke="#4A90C2" stroke-width="2.5"/>
  <!-- 지붕 새것 -->
  <path d="M 277 115 L 345 65 L 413 115 Z" fill="#EAF2F9" stroke="#4A90C2" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- RV 기호 -->
  <text x="320" y="215" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">RV</text>
  <!-- 캐릭터 -->
  <g transform="translate(140 255)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(345 255)">
    <circle r="13" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
