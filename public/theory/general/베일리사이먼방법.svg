<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 베일리–사이먼 방법: 행·열(2요인) 요율표를 반복 보정해 균형 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 2차원 요율표 격자 -->
<g stroke="#171A20" stroke-width="2.5">
<rect x="150" y="100" width="140" height="120" fill="#FFFFFF"/>
<line x1="150" y1="140" x2="290" y2="140"/><line x1="150" y1="180" x2="290" y2="180"/>
<line x1="197" y1="100" x2="197" y2="220"/><line x1="244" y1="100" x2="244" y2="220"/>
</g>
<!-- 한 셀 강조(Sky) -->
<rect x="197" y="140" width="47" height="40" fill="#4A90C2" fill-opacity=".4" stroke="#4A90C2" stroke-width="2.5"/>
<!-- 행·열 보정 화살표 -->
<path d="M 300 160 q 22 0 22 -56" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
<path d="M 322 104 l -5 8 l 9 -1 z" fill="#171A20"/>
<path d="M 220 232 q 0 -6 -56 -6" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
<text x="306" y="128" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">행·열 반복보정</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
