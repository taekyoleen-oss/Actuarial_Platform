<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 보험증권: 계약서를 사이에 두고 악수하는 두 사람(보험사↔계약자) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 계약서 문서 -->
  <rect x="190" y="95" width="100" height="130" rx="5" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <line x1="207" y1="120" x2="273" y2="120" stroke="#4A90C2" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="207" y1="138" x2="273" y2="138" stroke="#171A20" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="207" y1="153" x2="273" y2="153" stroke="#171A20" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="207" y1="168" x2="273" y2="168" stroke="#171A20" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 인장/도장 원 -->
  <circle cx="240" cy="198" r="14" fill="#EAF2F9" stroke="#4A90C2" stroke-width="2.5"/>
  <!-- 캐릭터 왼쪽(계약자) -->
  <g transform="translate(138 175)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <!-- 오른손 뻗기 -->
    <line x1="13" y1="5" x2="28" y2="5" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 악수 손 -->
  <path d="M 166 180 Q 180 178 190 180" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 캐릭터 오른쪽(보험사) -->
  <g transform="translate(342 175)">
    <circle r="13" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <!-- 왼손 뻗기 -->
    <line x1="-13" y1="5" x2="-28" y2="5" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 악수 -->
  <path d="M 314 180 Q 330 178 342 180" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 강조 연결선 -->
  <path d="M 290 160 L 310 160" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- tkLeen pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
