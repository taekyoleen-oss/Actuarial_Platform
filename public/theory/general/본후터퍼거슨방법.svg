<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 본후터–퍼거슨: 기대손해율과 진전실적을 가중결합한 준비금 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 실현 진전(Ink) -->
<path d="M 84 196 Q 150 156 210 140" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="96" y="186" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">기보고 실적</text>
<!-- 기대손해율 기반 미래(Sky 점선) -->
<path d="M 210 140 Q 290 124 384 102" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-dasharray="3 6"/>
<text x="278" y="118" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">기대손해율 × 미진전</text>
<!-- 결합점 -->
<circle cx="210" cy="140" r="6" fill="#171A20"/>
<line x1="210" y1="140" x2="210" y2="232" stroke="#171A20" stroke-width="2" stroke-dasharray="4 4" stroke-opacity=".5"/>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
