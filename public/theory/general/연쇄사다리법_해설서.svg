<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 연쇄사다리법: 런오프 트라이앵글의 미관측 칸을 사다리로 채워 나가는 장면 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 런오프 트라이앵글: 관측(파스텔) -->
  <g fill="#EAF2F9" stroke="#171A20" stroke-width="2">
    <rect x="88" y="70" width="26" height="26"/><rect x="118" y="70" width="26" height="26"/><rect x="148" y="70" width="26" height="26"/><rect x="178" y="70" width="26" height="26"/><rect x="208" y="70" width="26" height="26"/>
    <rect x="88" y="100" width="26" height="26"/><rect x="118" y="100" width="26" height="26"/><rect x="148" y="100" width="26" height="26"/><rect x="178" y="100" width="26" height="26"/>
    <rect x="88" y="130" width="26" height="26"/><rect x="118" y="130" width="26" height="26"/><rect x="148" y="130" width="26" height="26"/>
    <rect x="88" y="160" width="26" height="26"/><rect x="118" y="160" width="26" height="26"/>
    <rect x="88" y="190" width="26" height="26"/>
  </g>
  <!-- 방금 예측해 채운 대각선 칸(Sky) -->
  <g fill="#4A90C2" stroke="#171A20" stroke-width="2">
    <rect x="208" y="100" width="26" height="26"/>
    <rect x="178" y="130" width="26" height="26"/>
    <rect x="148" y="160" width="26" height="26"/>
    <rect x="118" y="190" width="26" height="26"/>
  </g>
  <!-- 아직 비어 있는 미래 칸(점선) -->
  <g fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="4 4" opacity=".3">
    <rect x="208" y="130" width="26" height="26"/>
    <rect x="178" y="160" width="26" height="26"/><rect x="208" y="160" width="26" height="26"/>
    <rect x="148" y="190" width="26" height="26"/><rect x="178" y="190" width="26" height="26"/><rect x="208" y="190" width="26" height="26"/>
  </g>
  <text x="246" y="64" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">f_j</text>
  <!-- 사다리 + 칸을 들고 오르는 캐릭터 -->
  <g stroke="#171A20" stroke-width="3" stroke-linecap="round">
    <line x1="300" y1="232" x2="300" y2="92"/>
    <line x1="326" y1="232" x2="326" y2="92"/>
    <line x1="300" y1="112" x2="326" y2="112"/>
    <line x1="300" y1="142" x2="326" y2="142"/>
    <line x1="300" y1="172" x2="326" y2="172"/>
    <line x1="300" y1="202" x2="326" y2="202"/>
  </g>
  <line x1="240" y1="232" x2="380" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <g transform="translate(313 126)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <rect x="16" y="-8" width="14" height="14" fill="#4A90C2" stroke="#171A20" stroke-width="2"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
