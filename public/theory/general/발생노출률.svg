<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 발생/노출률: 노출단위당 사고 발생 비율 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 노출 막대(전체 위험노출) -->
<rect x="96" y="150" width="288" height="40" rx="6" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<text x="100" y="214" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">노출 E (분모)</text>
<!-- 발생 사고 표시(Sky 점, 분자) -->
<g fill="#4A90C2"><circle cx="136" cy="170" r="6"/><circle cx="208" cy="170" r="6"/><circle cx="300" cy="170" r="6"/></g>
<!-- 비율 라벨 -->
<text x="240" y="116" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#4A90C2">rate = 발생 / 노출</text>
<line x1="240" y1="124" x2="240" y2="150" stroke="#171A20" stroke-width="2" stroke-opacity=".4"/>
<g transform="translate(360 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
