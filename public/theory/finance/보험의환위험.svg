<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 보험의환위험: 두 통화 사이 환율 변동 곡선 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 환율 변동 곡선 -->
<path d="M 80 220 C 120 180 160 240 200 170 C 240 100 280 200 320 140 C 360 80 380 160 400 120" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 곡선 아래 면 -->
<path d="M 80 220 C 120 180 160 240 200 170 C 240 100 280 200 320 140 C 360 80 380 160 400 120 L 400 230 L 80 230 Z" fill="#EAF2F9" opacity=".6"/>
<!-- 축 -->
<line x1="70" y1="230" x2="420" y2="230" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<line x1="70" y1="60" x2="70" y2="240" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<!-- 왼쪽 캐릭터 (₩) -->
<g transform="translate(110 200)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- 오른쪽 캐릭터 ($) -->
<g transform="translate(370 100)"><circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- 통화 기호 -->
<text x="88" y="198" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".55">₩</text>
<text x="356" y="95" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".55">$</text>
<text x="85" y="75" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">FX</text>
<!-- tkLeen 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
