<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 시장균형: 수요/공급 곡선 교차 균형점 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 축 -->
<line x1="90" y1="60" x2="90" y2="250" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<line x1="80" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<!-- 수요곡선 (우하향) -->
<path d="M 110 90 Q 240 160 390 230" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- 공급곡선 (우상향) -->
<path d="M 110 230 Q 240 160 390 90" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 교차점 강조 -->
<circle cx="250" cy="160" r="9" fill="#4A90C2" stroke="#FAFAF7" stroke-width="2.5"/>
<!-- 점선 (균형가격/균형량) -->
<line x1="90" y1="160" x2="250" y2="160" stroke="#171A20" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round"/>
<line x1="250" y1="160" x2="250" y2="240" stroke="#171A20" stroke-width="2" stroke-dasharray="5,4" stroke-linecap="round"/>
<!-- 축 레이블 -->
<text x="75" y="58" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">P</text>
<text x="425" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">Q</text>
<text x="106" y="86" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2" fill-opacity=".8">D</text>
<text x="106" y="226" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".6">S</text>
<!-- 캐릭터 (균형점 옆) -->
<g transform="translate(288 148)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/></g>
<!-- tkLeen 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
