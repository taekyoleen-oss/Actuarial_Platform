<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 확률적 투자모형: 여러 시나리오 경로가 갈라지는 ESG 시뮬레이션 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="80" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="80" y1="240" x2="80" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="424" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
<text x="62" y="62" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">r</text>
<!-- 여러 경로 (Sky 중심 + 회색 보조) -->
<path d="M 100 180 Q 180 130 260 80 Q 330 48 400 60" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<path d="M 100 180 Q 200 170 280 150 Q 350 140 400 145" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" fill-opacity=".4"/>
<path d="M 100 180 Q 180 200 270 220 Q 340 230 400 215" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" fill-opacity=".4"/>
<path d="M 100 180 Q 200 190 300 195 Q 360 190 400 190" fill="none" stroke="#171A20" stroke-width="1.5" stroke-dasharray="5 4" stroke-linecap="round"/>
<!-- 출발점 -->
<circle cx="100" cy="180" r="7" fill="#FAFAF7" stroke="#171A20" stroke-width="2.5"/>
<!-- 라벨 -->
<text x="404" y="58" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">ω₁</text>
<text x="404" y="143" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">ω₂</text>
<text x="404" y="213" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">ω₃</text>
<!-- 캐릭터 -->
<g transform="translate(430 175)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
