<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 파생증권: 기초자산 가격과 파생증권 가치의 함수 관계 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="72" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="240" x2="72" y2="52" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="424" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">S</text>
<text x="60" y="52" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">V</text>
<!-- 콜옵션 페이오프 (hockey stick) -->
<path d="M 100 230 L 220 230 L 400 90" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 파생증권 가치곡선 (Sky) -->
<path d="M 100 236 Q 220 210 400 82" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- 행사가 라벨 -->
<line x1="220" y1="240" x2="220" y2="232" stroke="#171A20" stroke-width="2.5"/>
<text x="216" y="256" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">K</text>
<!-- V(S,t) 라벨 -->
<text x="340" y="105" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">V(S,t)</text>
<!-- 면적 표시 (Sky Pastel) -->
<path d="M 220 230 L 400 90 L 400 230 Z" fill="#EAF2F9" fill-opacity="0.5"/>
<!-- 캐릭터 2명 -->
<g transform="translate(150 214)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g transform="translate(300 158)"><circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
