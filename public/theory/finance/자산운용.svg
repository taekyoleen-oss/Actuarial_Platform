<line x1="208" y1="150" x2="282" y2="150" stroke="#171A20" stroke-width="2.5"/>
<line x1="208" y1="150" x2="170" y2="214" stroke="#171A20" stroke-width="2.5"/>
<text x="300" y="120" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">채권</text>
<text x="300" y="186" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">주식·대체</text>
