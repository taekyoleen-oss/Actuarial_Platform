<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 자산운용: 자산배분 원형(채권·주식·대체)과 운용자 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 배분 원형 차트 -->
<circle cx="208" cy="150" r="74" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
<!-- 큰 슬라이스(채권, Sky) -->
<path d="M 208 150 L 208 76 A 74 74 0 0 1 282 150 Z" fill="#4A90C2"/>
<!-- 슬라이스(주식, 파스텔) -->
<path d="M 208 150 L 282 150 A 74 74 0 0 1 170 214 Z" fill="#EAF2F9"/>
