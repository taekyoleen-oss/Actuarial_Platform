<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 재무: 미래 현금흐름 할인하여 현재가치로 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 타임라인 -->
<line x1="80" y1="180" x2="420" y2="180" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<!-- 현재 표시 -->
<circle cx="80" cy="180" r="6" fill="#4A90C2" stroke="#FAFAF7" stroke-width="2"/>
<text x="72" y="200" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".6">t=0</text>
<!-- 미래 현금흐름 수직선 -->
<line x1="180" y1="130" x2="180" y2="180" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
<line x1="260" y1="110" x2="260" y2="180" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
<line x1="340" y1="95" x2="340" y2="180" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
<rect x="162" y="108" width="36" height="24" fill="#EAF2F9" stroke="#171A20" stroke-width="2"/>
<rect x="242" y="88" width="36" height="24" fill="#EAF2F9" stroke="#171A20" stroke-width="2"/>
<rect x="322" y="73" width="36" height="24" fill="#EAF2F9" stroke="#171A20" stroke-width="2"/>
<text x="180" y="124" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".7">C₁</text>
<text x="260" y="104" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".7">C₂</text>
<text x="340" y="89" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".7">Cₙ</text>
<!-- 할인 화살표 (역방향, Sky) -->
<path d="M 320 210 C 260 230 180 220 100 210" fill="none" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
<polygon points="96,203 90,215 104,212" fill="#4A90C2"/>
<!-- PV 레이블 -->
<text x="85" y="240" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#4A90C2" fill-opacity=".9">PV</text>
<text x="280" y="228" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".5">discount</text>
<!-- 캐릭터 -->
<g transform="translate(80 160)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/></g>
<!-- tkLeen 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
