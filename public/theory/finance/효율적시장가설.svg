<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 효율적 시장가설: 새 정보가 가격에 즉각 반영되는 랜덤워크 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="80" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="80" y1="240" x2="80" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="424" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
<text x="62" y="64" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">P</text>
<!-- 랜덤워크 가격 경로 (Sky) -->
<path d="M 100 180 L 130 160 L 155 175 L 185 145 L 215 162 L 245 130 L 275 148 L 305 120 L 335 138 L 365 108 L 395 125" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 뉴스 이벤트 수직점프 표시 -->
<line x1="245" y1="148" x2="245" y2="240" stroke="#171A20" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="236" y="258" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".55">news</text>
<!-- 가격 즉각 반영 화살표 -->
<line x1="245" y1="162" x2="245" y2="136" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="241" y1="140" x2="245" y2="130" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="249" y1="140" x2="245" y2="130" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<!-- E[P] 수평 기준선 -->
<line x1="100" y1="168" x2="400" y2="168" stroke="#171A20" stroke-width="1.5" stroke-dasharray="8 5" stroke-linecap="round"/>
<text x="402" y="172" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".55">E[P]</text>
<!-- 캐릭터 -->
<g transform="translate(430 200)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
