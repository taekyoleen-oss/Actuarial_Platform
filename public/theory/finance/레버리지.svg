<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 레버리지: 부채(지렛대)로 자산 수익률을 증폭시키는 지렛대 원리 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 지렛대 막대 (기울어짐) Sky -->
  <line x1="100" y1="220" x2="390" y2="130" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 받침점 -->
  <polygon points="200,185 230,185 215,215" fill="#171A20" fill-opacity=".25"/>
  <circle cx="215" cy="185" r="6" fill="#171A20" fill-opacity=".4"/>
  <!-- 왼쪽 힘(작은 투자) -->
  <rect x="85" y="195" width="30" height="30" rx="4" fill="#EAF2F9" stroke="#4A90C2" stroke-width="2"/>
  <text x="100" y="214" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#4A90C2">E</text>
  <!-- 오른쪽 결과(큰 자산) -->
  <rect x="350" y="100" width="48" height="48" rx="4" fill="#4A90C2" fill-opacity=".25" stroke="#4A90C2" stroke-width="2.5"/>
  <text x="374" y="129" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#4A90C2">A</text>
  <!-- 부채 라벨 -->
  <text x="215" y="245" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".5">D</text>
  <!-- 캐릭터: 지렛대 들기 -->
  <g transform="translate(118 200)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <!-- 땀방울 -->
    <path d="M 17 -11 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#4A90C2"/>
    <path d="M -5 5 L 5 5" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 수익률 라벨 -->
  <text x="100" y="175" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">r_E↑↑</text>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
