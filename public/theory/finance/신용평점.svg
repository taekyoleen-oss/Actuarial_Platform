<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 신용평점: 점수 축의 승인 기준선(cutoff)으로 분류 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 점수 게이지 막대 -->
<rect x="84" y="150" width="312" height="26" rx="13" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<rect x="84" y="150" width="150" height="26" rx="13" fill="#4A90C2" fill-opacity=".35"/>
<!-- cutoff 선 -->
<line x1="234" y1="128" x2="234" y2="198" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="234" y="120" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">cutoff</text>
<text x="100" y="210" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">low</text>
<text x="372" y="210" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">high score</text>
<!-- 거절(왼쪽) / 승인(오른쪽) 얼굴 -->
<g transform="translate(150 110)"><circle r="13" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 5 Q 0 1.5 5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g transform="translate(320 110)"><circle r="13" fill="#ECFDF5" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20" stroke="#171A20" stroke-width="2.2" stroke-linejoin="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
