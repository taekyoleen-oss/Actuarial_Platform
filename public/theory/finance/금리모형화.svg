<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 금리모형화: 단기금리가 확률 경로를 따라 퍼져나가는 이자율 과정 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="72" y1="230" x2="420" y2="230" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="230" x2="72" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 중심 금리 경로 Sky -->
  <path d="M 90 175 Q 180 145 290 120 Q 360 108 400 115" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 상방 확산 경로 -->
  <path d="M 90 175 Q 200 130 320 90 Q 375 78 400 82" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 5" stroke-opacity=".45"/>
  <!-- 하방 확산 경로 -->
  <path d="M 90 175 Q 200 162 320 155 Q 375 152 400 155" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 5" stroke-opacity=".45"/>
  <!-- 확산 면 채움 -->
  <path d="M 90 175 Q 200 130 320 90 Q 375 78 400 82 L 400 155 Q 375 152 320 155 Q 200 162 90 175 Z" fill="#EAF2F9" fill-opacity=".55"/>
  <!-- 캐릭터 -->
  <g transform="translate(155 145)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 라벨 -->
  <text x="56" y="64" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">r</text>
  <text x="408" y="247" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
  <text x="405" y="112" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">r(t)</text>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
