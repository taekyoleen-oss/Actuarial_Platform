<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 균형이론: 수요·공급 곡선이 교차하는 시장균형점 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="72" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="240" x2="72" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 수요 곡선(우하향) Sky -->
  <path d="M 100 90 Q 220 155 390 210" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 공급 곡선(우상향) Ink -->
  <path d="M 100 210 Q 220 155 390 90" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 5"/>
  <!-- 균형점 -->
  <circle cx="245" cy="155" r="7" fill="#4A90C2"/>
  <circle cx="245" cy="155" r="4" fill="#FFFFFF"/>
  <!-- 균형 점선 -->
  <line x1="245" y1="155" x2="245" y2="240" stroke="#171A20" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity=".4"/>
  <line x1="72" y1="155" x2="245" y2="155" stroke="#171A20" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity=".4"/>
  <!-- 캐릭터: 균형점 옆 -->
  <g transform="translate(272 138)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 라벨 -->
  <text x="392" y="204" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">D</text>
  <text x="392" y="88" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">S</text>
  <text x="408" y="257" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">Q</text>
  <text x="52" y="64" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">P</text>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
