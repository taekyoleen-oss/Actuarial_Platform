<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 재해파생상품: 재해지수가 트리거 임계선을 넘으면 보수 지급 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 트리거 임계선 -->
<line x1="72" y1="128" x2="408" y2="128" stroke="#4A90C2" stroke-width="3" stroke-dasharray="7 5" stroke-linecap="round"/>
<text x="402" y="120" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">trigger</text>
<!-- 재해지수(급등하여 임계 돌파) -->
<path d="M 84 208 L 140 200 L 190 206 L 240 188 L 286 150 L 320 96 L 360 110" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 돌파 영역 강조 -->
<circle cx="320" cy="96" r="7" fill="#4A90C2"/>
<text x="150" y="226" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">재해지수</text>
<!-- 놀란 사람 -->
<g transform="translate(360 84)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><ellipse cx="0" cy="6" rx="2.6" ry="3.2" fill="#171A20"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
