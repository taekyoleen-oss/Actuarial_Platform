<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 자산부채 모형화(ALM): 시간에 따라 함께 움직이는 자산·부채 현금흐름 매칭 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="70" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 자산 곡선(Sky) -->
<path d="M 84 168 Q 200 110 384 124" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="120" y="150" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">자산 A</text>
<!-- 부채 곡선(Ink) 거의 평행 -->
<path d="M 84 190 Q 200 134 384 148" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 5"/>
<text x="300" y="180" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">부채 L</text>
<!-- 매칭 갭 표시 -->
<line x1="240" y1="122" x2="240" y2="146" stroke="#171A20" stroke-width="2" stroke-opacity=".5"/>
<text x="396" y="250" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">만기 t</text>
<g transform="translate(110 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
