<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 비협조게임이론: 두 경쟁자가 내시균형 전략을 독립적으로 선택 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 게임 매트릭스 (2×2) -->
<rect x="160" y="88" width="160" height="124" rx="4" fill="#FAFAF7" stroke="#171A20" stroke-width="2.5"/>
<line x1="240" y1="88" x2="240" y2="212" stroke="#171A20" stroke-width="2"/>
<line x1="160" y1="150" x2="320" y2="150" stroke="#171A20" stroke-width="2"/>
<!-- 보수 값 -->
<text x="200" y="126" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">(3,3)</text>
<text x="280" y="126" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".7">(0,5)</text>
<text x="200" y="188" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".7">(5,0)</text>
<text x="280" y="188" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">(1,1)</text>
<!-- 내시균형 표시 -->
<rect x="248" y="158" width="64" height="46" rx="3" fill="none" stroke="#4A90C2" stroke-width="2.5" stroke-dasharray="5 3"/>
<text x="280" y="215" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#4A90C2">NE</text>
<!-- 플레이어 라벨 -->
<text x="200" y="80" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">C</text>
<text x="280" y="80" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">D</text>
<text x="148" y="126" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">C</text>
<text x="148" y="188" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">D</text>
<!-- 캐릭터 2명 (경쟁) -->
<g transform="translate(90 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g transform="translate(390 150)"><circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- 화살표 → 매트릭스 -->
<line x1="103" y1="150" x2="156" y2="150" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="150" y1="145" x2="156" y2="150" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="150" y1="155" x2="156" y2="150" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="377" y1="150" x2="324" y2="150" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="330" y1="145" x2="324" y2="150" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="330" y1="155" x2="324" y2="150" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
