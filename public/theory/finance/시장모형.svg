<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 시장모형: LIBOR 금리 곡선 + 블랙 공식 캡릿 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 축 -->
<line x1="80" y1="60" x2="80" y2="250" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<line x1="70" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<!-- 이산 선도 LIBOR 막대 -->
<rect x="110" y="140" width="40" height="100" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<rect x="170" y="120" width="40" height="120" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<rect x="230" y="100" width="40" height="140" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<rect x="290" y="85" width="40" height="155" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<rect x="350" y="72" width="40" height="168" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<!-- 금리 곡선 (핵심) -->
<path d="M 130 140 L 190 120 L 250 100 L 310 85 L 370 72" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 축 레이블 -->
<text x="66" y="58" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">r</text>
<text x="424" y="244" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">T</text>
<!-- 수식 기호 -->
<text x="100" y="276" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">L(t,T)</text>
<!-- 캐릭터 -->
<g transform="translate(430 100)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/></g>
<!-- tkLeen 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
