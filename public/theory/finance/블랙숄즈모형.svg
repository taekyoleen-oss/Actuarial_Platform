<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 블랙–숄즈 모형: 옵션 만기손익(꺾인 선)과 그 위의 옵션가치 곡선 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="222" x2="408" y2="222" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="222" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 행사가 K -->
<line x1="224" y1="222" x2="224" y2="214" stroke="#171A20" stroke-width="2.5"/>
<text x="224" y="240" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">K</text>
<!-- 만기 손익(hockey stick) -->
<path d="M 96 200 L 224 200 L 368 84" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 옵션 가치곡선(Sky, 평활) -->
<path d="M 96 208 Q 224 188 368 76" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="300" y="120" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">C(S,t)</text>
<text x="384" y="100" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">S</text>
<g transform="translate(132 184)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
