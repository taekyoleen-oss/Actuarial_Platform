<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 윌키투자모형: 물가→채권→주가 연결 폭포형 구조 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 폭포형 VAR: 물가(Q) 최상단 -->
<rect x="180" y="50" width="120" height="44" fill="#4A90C2" stroke="#171A20" stroke-width="3" rx="4"/>
<text x="240" y="77" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#FFFFFF">Q (물가)</text>
<!-- 화살표 -->
<line x1="200" y1="94" x2="150" y2="118" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<polygon points="145,128 148,112 158,120" fill="#171A20"/>
<line x1="280" y1="94" x2="330" y2="118" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<polygon points="335,128 332,112 322,120" fill="#171A20"/>
<!-- 채권(C) 왼쪽 -->
<rect x="80" y="128" width="120" height="44" fill="#EAF2F9" stroke="#171A20" stroke-width="3" rx="4"/>
<text x="140" y="155" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20">C (채권)</text>
<!-- 주가(E) 오른쪽 -->
<rect x="280" y="128" width="120" height="44" fill="#EAF2F9" stroke="#171A20" stroke-width="3" rx="4"/>
<text x="340" y="155" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20">E (주가)</text>
<!-- 아래로 화살표 (캐릭터로) -->
<line x1="140" y1="172" x2="140" y2="200" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<polygon points="134,200 140,214 146,200" fill="#171A20"/>
<line x1="340" y1="172" x2="340" y2="200" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<polygon points="334,200 340,214 346,200" fill="#171A20"/>
<!-- 캐릭터들 -->
<g transform="translate(140 230)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g transform="translate(340 230)"><circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- tkLeen 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
