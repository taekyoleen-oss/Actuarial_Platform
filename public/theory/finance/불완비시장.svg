<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 불완비시장: 완비격자 vs 불완비(빈 셀) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 왼쪽: 완비시장 격자 (모두 채워진) -->
<rect x="60" y="80" width="44" height="44" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<rect x="112" y="80" width="44" height="44" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<rect x="60" y="132" width="44" height="44" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<rect x="112" y="132" width="44" height="44" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<rect x="60" y="184" width="44" height="44" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<rect x="112" y="184" width="44" height="44" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<!-- 왼쪽 캐릭터 -->
<g transform="translate(108 258)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/></g>
<!-- 구분선 -->
<line x1="240" y1="70" x2="240" y2="240" stroke="#171A20" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round"/>
<!-- 오른쪽: 불완비시장 격자 (빈 셀 존재) -->
<rect x="264" y="80" width="44" height="44" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<rect x="316" y="80" width="44" height="44" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-dasharray="5,3"/>
<rect x="264" y="132" width="44" height="44" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-dasharray="5,3"/>
<rect x="316" y="132" width="44" height="44" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
<rect x="264" y="184" width="44" height="44" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<!-- 물음표 (빈 셀) -->
<text x="338" y="112" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="18" fill="#171A20" fill-opacity=".35">?</text>
<text x="286" y="160" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="18" fill="#171A20" fill-opacity=".35">?</text>
<!-- 오른쪽 캐릭터 (당황) -->
<g transform="translate(338 258)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- tkLeen 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
