<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 헤징과 위험관리: 델타헤지로 시장위험을 상쇄하는 보험사 ALM -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 위험 곡선 (Sky) -->
<line x1="72" y1="240" x2="408" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="240" x2="72" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<path d="M 100 180 Q 180 80 280 120 Q 350 148 400 90" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- 헤지 후 평탄화 점선 -->
<line x1="100" y1="150" x2="400" y2="150" stroke="#171A20" stroke-width="2.5" stroke-dasharray="8 5" stroke-linecap="round"/>
<!-- 라벨 -->
<text x="370" y="86" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">V(t)</text>
<text x="404" y="154" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">Δ=0</text>
<!-- 헤지 방향 화살 -->
<line x1="280" y1="120" x2="280" y2="148" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="276" y1="144" x2="280" y2="150" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="284" y1="144" x2="280" y2="150" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<!-- 캐릭터 (보호 포즈) -->
<g transform="translate(140 200)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- 방패 (헤지) -->
<path d="M 160 192 L 168 188 L 176 192 L 176 202 Q 168 208 160 202 Z" fill="#EAF2F9" stroke="#4A90C2" stroke-width="2"/>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
