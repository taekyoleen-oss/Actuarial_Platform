<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 변동성: 자산 수익률의 표준편차(σ)를 나타내는 정규분포 곡선 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="72" y1="230" x2="420" y2="230" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="230" x2="72" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 정규분포 곡선 Sky -->
  <path d="M 100 225 Q 150 220 190 185 Q 220 145 245 80 Q 270 145 300 185 Q 340 220 390 225" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 곡선 아래 채움 -->
  <path d="M 100 225 Q 150 220 190 185 Q 220 145 245 80 Q 270 145 300 185 Q 340 220 390 225 L 390 230 L 100 230 Z" fill="#EAF2F9" fill-opacity=".55"/>
  <!-- σ 범위 선 -->
  <line x1="175" y1="160" x2="175" y2="230" stroke="#171A20" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity=".4"/>
  <line x1="315" y1="160" x2="315" y2="230" stroke="#171A20" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity=".4"/>
  <!-- 평균 수직선 -->
  <line x1="245" y1="80" x2="245" y2="230" stroke="#4A90C2" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- σ 라벨 -->
  <text x="160" y="250" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">-σ</text>
  <text x="308" y="250" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">+σ</text>
  <text x="238" y="250" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">μ</text>
  <!-- 캐릭터: 정점에 -->
  <g transform="translate(245 66)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
