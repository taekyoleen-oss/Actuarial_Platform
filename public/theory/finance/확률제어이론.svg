<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 확률제어이론: HJB 방정식으로 최적 제어 정책을 찾는 동적 최적화 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 상태공간 격자 -->
<line x1="80" y1="248" x2="400" y2="248" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="80" y1="248" x2="80" y2="56" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="404" y="252" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
<text x="60" y="60" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">x</text>
<!-- 가치함수 곡면 등고선 (Sky) -->
<path d="M 120 200 Q 200 140 320 100 Q 370 86 400 88" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<path d="M 120 220 Q 200 170 320 140 Q 370 128 400 130" fill="none" stroke="#171A20" stroke-width="1.8" stroke-dasharray="6 4" stroke-linecap="round"/>
<!-- 최적 경로 화살표 -->
<path d="M 180 200 Q 260 160 360 108" fill="none" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
<line x1="348" y1="108" x2="360" y2="108" stroke="#4A90C2" stroke-width="2" stroke-linecap="round"/>
<line x1="356" y1="102" x2="360" y2="108" stroke="#4A90C2" stroke-width="2" stroke-linecap="round"/>
<line x1="356" y1="114" x2="360" y2="108" stroke="#4A90C2" stroke-width="2" stroke-linecap="round"/>
<!-- V*(t,x) 라벨 -->
<text x="330" y="82" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">V*</text>
<!-- HJB 라벨 -->
<text x="100" y="140" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">HJB</text>
<!-- 캐릭터 (조종) -->
<g transform="translate(150 230)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- 조종대 -->
<line x1="163" y1="220" x2="175" y2="210" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
