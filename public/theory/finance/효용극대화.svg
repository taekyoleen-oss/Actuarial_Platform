<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 효용극대화: 오목 효용함수와 최적 소비·투자 분기점 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="80" y1="248" x2="400" y2="248" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="80" y1="248" x2="80" y2="56" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="404" y="252" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">W</text>
<text x="60" y="60" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">U</text>
<!-- 오목 효용함수 (Sky) -->
<path d="M 100 230 Q 200 100 380 68" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- Sky Pastel 아래 면 -->
<path d="M 100 230 Q 200 100 380 68 L 380 248 L 100 248 Z" fill="#EAF2F9" fill-opacity="0.4"/>
<!-- 접선(한계효용=기회비용) -->
<line x1="180" y1="156" x2="310" y2="96" stroke="#171A20" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/>
<!-- 최적점 -->
<circle cx="240" cy="124" r="7" fill="#4A90C2"/>
<text x="248" y="122" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">W*</text>
<!-- U'=λ 라벨 -->
<text x="290" y="90" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">U'=λ</text>
<!-- 캐릭터 (기뻐하는 표정 — 활짝 웃음) -->
<g transform="translate(130 214)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20" stroke="none"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
