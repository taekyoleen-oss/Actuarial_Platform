<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 금융시장: 자금 공급자·수요자가 시장을 통해 연결되는 중개 흐름 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 시장 박스 (중앙) -->
  <rect x="188" y="120" width="104" height="60" rx="8" fill="#4A90C2" fill-opacity=".15" stroke="#4A90C2" stroke-width="3"/>
  <text x="240" y="155" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">Market</text>
  <!-- 자금 흐름 화살 (공급자→시장) Sky -->
  <path d="M 120 150 L 180 150" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <polygon points="178,144 190,150 178,156" fill="#4A90C2"/>
  <!-- 자금 흐름 화살 (시장→수요자) Ink 점선 -->
  <path d="M 300 150 L 360 150" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 5"/>
  <polygon points="358,144 370,150 358,156" fill="#171A20" fill-opacity=".5"/>
  <!-- 캐릭터: 공급자 (좌) -->
  <g transform="translate(98 150)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 캐릭터: 수요자 (우) -->
  <g transform="translate(382 150)">
    <circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <!-- 라벨 -->
  <text x="84" y="200" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">공급자</text>
  <text x="358" y="200" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">수요자</text>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
