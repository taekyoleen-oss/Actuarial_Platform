<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 금융경제학: 위험-수익 트레이드오프를 나타내는 효율적 프론티어 곡선 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="72" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="240" x2="72" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 효율적 프론티어 Sky 곡선 -->
  <path d="M 120 220 Q 160 175 220 135 Q 290 95 390 80" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 곡선 아래 채움 -->
  <path d="M 120 220 Q 160 175 220 135 Q 290 95 390 80 L 390 240 L 120 240 Z" fill="#EAF2F9" fill-opacity=".5"/>
  <!-- 최적 포트폴리오 점 -->
  <circle cx="248" cy="128" r="6" fill="#4A90C2"/>
  <circle cx="248" cy="128" r="3.5" fill="#FFFFFF"/>
  <!-- 캐릭터 2명 -->
  <g transform="translate(175 130)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(310 97)">
    <circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <!-- 라벨 -->
  <text x="56" y="64" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">E[r]</text>
  <text x="408" y="257" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">σ</text>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
