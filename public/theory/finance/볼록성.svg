<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 볼록성: 가격-금리 곡선이 듀레이션(접선) 위로 휘는 정도 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="70" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 접선(듀레이션 근사) -->
<line x1="96" y1="100" x2="360" y2="216" stroke="#171A20" stroke-width="2.5" stroke-dasharray="6 5" stroke-linecap="round"/>
<!-- 볼록한 가격곡선(Sky) -->
<path d="M 96 196 Q 200 90 372 86" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="120" y="120" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">P(y)</text>
<text x="300" y="208" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">duration</text>
<text x="396" y="250" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">금리 y</text>
<g transform="translate(232 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
