<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 확률최적화: 불확실 목적함수의 최솟값을 탐색하는 최적화 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="72" y1="248" x2="420" y2="248" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="248" x2="72" y2="52" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="424" y="252" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">x</text>
<text x="54" y="56" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">f</text>
<!-- 목적함수 곡선 (볼록 함수) -->
<path d="M 100 200 Q 240 48 380 200" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- Sky Pastel 아래 면 -->
<path d="M 100 200 Q 240 48 380 200 L 380 248 L 100 248 Z" fill="#EAF2F9" fill-opacity="0.45"/>
<!-- 최솟값 표시 -->
<circle cx="240" cy="88" r="7" fill="#4A90C2"/>
<line x1="240" y1="88" x2="240" y2="248" stroke="#171A20" stroke-width="1.8" stroke-dasharray="5 4" stroke-linecap="round"/>
<text x="244" y="85" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">x*</text>
<!-- 경사하강 화살표 -->
<line x1="160" y1="148" x2="190" y2="118" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="182" y1="118" x2="190" y2="118" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="190" y1="118" x2="190" y2="126" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<line x1="320" y1="148" x2="290" y2="118" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<!-- E[f] 라벨 -->
<text x="100" y="185" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">E[f]</text>
<!-- 캐릭터 -->
<g transform="translate(430 200)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
