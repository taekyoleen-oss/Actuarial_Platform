<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 대체위험전가(ART): 보험위험을 자본시장 투자자에게 다리 놓아 전가 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 보험사(왼쪽 건물) -->
<rect x="92" y="150" width="64" height="64" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<text x="124" y="234" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">보험사</text>
<!-- 자본시장(오른쪽 건물) -->
<rect x="324" y="150" width="64" height="64" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<text x="356" y="234" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">자본시장</text>
<!-- 다리(Sky, 위험전가 통로) -->
<path d="M 156 168 Q 240 110 324 168" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="240" y="120" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">위험 → / 자본 ←</text>
<!-- 건너는 사람 -->
<g transform="translate(240 138)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
