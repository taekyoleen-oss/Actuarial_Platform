<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 금융중개기관: 예금자·대출자 사이를 잇는 중개기관 브리지 구조 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 중개기관 기둥(다리 구조) -->
  <rect x="195" y="95" width="90" height="110" rx="6" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <text x="240" y="148" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">중개</text>
  <text x="240" y="163" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">기관</text>
  <!-- 다리 위 수평 빔 -->
  <rect x="80" y="90" width="320" height="14" rx="4" fill="#4A90C2"/>
  <!-- 왼쪽 기둥 -->
  <rect x="85" y="104" width="18" height="100" rx="3" fill="#4A90C2" fill-opacity=".4"/>
  <!-- 오른쪽 기둥 -->
  <rect x="377" y="104" width="18" height="100" rx="3" fill="#4A90C2" fill-opacity=".4"/>
  <!-- 자금 흐름 화살 (좌→중개) Sky -->
  <path d="M 110 165 L 187 165" fill="none" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
  <polygon points="185,159 197,165 185,171" fill="#4A90C2"/>
  <!-- 자금 흐름 화살 (중개→우) Ink 점선 -->
  <path d="M 293 165 L 368 165" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 5"/>
  <polygon points="366,159 378,165 366,171" fill="#171A20" fill-opacity=".5"/>
  <!-- 캐릭터 좌(예금자) -->
  <g transform="translate(90 215)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 캐릭터 우(차입자) -->
  <g transform="translate(390 215)">
    <circle r="13" fill="#ECFDF5" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
