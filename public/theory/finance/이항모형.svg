<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 이항모형: 이진 나무(상승/하락 격자) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 이항 나무 연결선 -->
<!-- 0단계 → 1단계 -->
<line x1="100" y1="150" x2="200" y2="100" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<line x1="100" y1="150" x2="200" y2="200" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 1단계 → 2단계 -->
<line x1="200" y1="100" x2="300" y2="65" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<line x1="200" y1="100" x2="300" y2="145" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="200" y1="200" x2="300" y2="145" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="200" y1="200" x2="300" y2="235" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 2단계 → 3단계 -->
<line x1="300" y1="65" x2="390" y2="45" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<line x1="300" y1="65" x2="390" y2="105" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<line x1="300" y1="145" x2="390" y2="105" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<line x1="300" y1="145" x2="390" y2="185" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<line x1="300" y1="235" x2="390" y2="185" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<line x1="300" y1="235" x2="390" y2="255" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<!-- 노드 원 -->
<circle cx="100" cy="150" r="14" fill="#4A90C2" stroke="#FAFAF7" stroke-width="2"/>
<circle cx="200" cy="100" r="12" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<circle cx="200" cy="200" r="12" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<circle cx="300" cy="65" r="10" fill="#EAF2F9" stroke="#171A20" stroke-width="2"/>
<circle cx="300" cy="145" r="10" fill="#EAF2F9" stroke="#171A20" stroke-width="2"/>
<circle cx="300" cy="235" r="10" fill="#EAF2F9" stroke="#171A20" stroke-width="2"/>
<!-- 레이블 -->
<text x="82" y="154" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#FFFFFF">S₀</text>
<text x="108" y="118" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2" fill-opacity=".9">u</text>
<text x="108" y="185" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".6">d</text>
<!-- 캐릭터 (최상단 노드 옆) -->
<g transform="translate(415 45)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/></g>
<!-- tkLeen 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
