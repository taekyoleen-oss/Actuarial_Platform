<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 보험의금융론적가격결정: 인수손익+투자수익=총수익(천칭) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 천칭 기둥 -->
<line x1="240" y1="90" x2="240" y2="220" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="210" y1="230" x2="270" y2="230" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 천칭 가로대 (기울어진: 왼쪽 낮음) -->
<line x1="120" y1="115" x2="360" y2="95" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- 왼쪽 접시줄 (인수) -->
<line x1="150" y1="116" x2="150" y2="148" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<ellipse cx="150" cy="152" rx="36" ry="8" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<!-- 오른쪽 접시줄 (투자) -->
<line x1="330" y1="96" x2="330" y2="118" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<ellipse cx="330" cy="122" rx="36" ry="8" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<!-- 왼쪽 캐릭터 (인수) -->
<g transform="translate(150 138)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- 오른쪽 캐릭터 (투자) -->
<g transform="translate(330 112)"><circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- 레이블 -->
<text x="150" y="180" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">UPM</text>
<text x="330" y="145" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">IR</text>
<text x="240" y="258" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">TRR</text>
<!-- tkLeen 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
