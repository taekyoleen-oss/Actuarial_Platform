<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 차익거래: 싼 시장에서 사서 비싼 시장에 파는 무위험 차익 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 시장 A 낮은 가격 -->
<rect x="120" y="176" width="56" height="56" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<text x="148" y="208" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">A 90</text>
<!-- 시장 B 높은 가격 -->
<rect x="304" y="120" width="56" height="112" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
<text x="332" y="182" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#FFFFFF">B 100</text>
<!-- 차익 화살표 -->
<path d="M 182 150 Q 254 100 298 142" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<path d="M 298 142 l -9 -4 l 3 9 z" fill="#171A20"/>
<text x="232" y="108" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">+10</text>
<!-- 웃는 거래자 -->
<g transform="translate(232 168)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20" stroke="#171A20" stroke-width="2.2" stroke-linejoin="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
