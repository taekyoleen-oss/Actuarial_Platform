<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 매칭: 자산 현금흐름이 부채 현금흐름에 정확히 겹쳐지는 완전 대응 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 시간축 -->
  <line x1="72" y1="200" x2="420" y2="200" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 부채 현금흐름 막대 (아래, Ink) -->
  <rect x="110" y="160" width="28" height="40" rx="3" fill="#171A20" fill-opacity=".18"/>
  <rect x="185" y="140" width="28" height="60" rx="3" fill="#171A20" fill-opacity=".18"/>
  <rect x="260" y="120" width="28" height="80" rx="3" fill="#171A20" fill-opacity=".18"/>
  <rect x="335" y="135" width="28" height="65" rx="3" fill="#171A20" fill-opacity=".18"/>
  <!-- 자산 현금흐름 막대 (위, Sky) — 정확히 겹침 -->
  <rect x="110" y="160" width="28" height="40" rx="3" fill="none" stroke="#4A90C2" stroke-width="3"/>
  <rect x="185" y="140" width="28" height="60" rx="3" fill="none" stroke="#4A90C2" stroke-width="3"/>
  <rect x="260" y="120" width="28" height="80" rx="3" fill="none" stroke="#4A90C2" stroke-width="3"/>
  <rect x="335" y="135" width="28" height="65" rx="3" fill="none" stroke="#4A90C2" stroke-width="3"/>
  <!-- 체크 표시: 매칭 완료 -->
  <path d="M 120 105 L 130 118 L 148 95" fill="none" stroke="#4A90C2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 캐릭터: 활짝 웃음 -->
  <g transform="translate(380 95)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <!-- 라벨 -->
  <text x="408" y="217" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
  <text x="100" y="85" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">CF_A</text>
  <text x="100" y="250" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".5">CF_L</text>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
