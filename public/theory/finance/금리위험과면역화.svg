<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 금리위험과면역화: 볼록한 채권 가격-금리 곡선 아래 면역화로 보호받는 구조 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="72" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="240" x2="72" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 채권 가격-금리 볼록 곡선 (Sky) -->
  <path d="M 100 82 Q 240 95 390 210" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 곡선 아래 채움 -->
  <path d="M 100 82 Q 240 95 390 210 L 390 240 L 100 240 Z" fill="#EAF2F9" fill-opacity=".6"/>
  <!-- 현재 금리 수직선 -->
  <line x1="240" y1="94" x2="240" y2="240" stroke="#171A20" stroke-width="2" stroke-dasharray="6 4" stroke-opacity=".45"/>
  <!-- 현재 금리 점 -->
  <circle cx="240" cy="94" r="6" fill="#4A90C2"/>
  <circle cx="240" cy="94" r="3.5" fill="#FFFFFF"/>
  <!-- 캐릭터: 면역화로 안심한 모습 -->
  <g transform="translate(200 78)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <!-- 활짝 웃는 입 -->
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <!-- 라벨 -->
  <text x="56" y="64" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">P</text>
  <text x="408" y="257" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">r</text>
  <text x="248" y="255" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">r*</text>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
