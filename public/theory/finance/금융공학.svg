    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 라벨 -->
  <text x="372" y="62" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">S↑↑</text>
  <text x="372" y="158" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">S↑↓</text>
  <text x="372" y="238" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".45">S↓↓</text>
