<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 금융공학: 파생상품 복제·헤지를 상징하는 이항 격자 트리 구조 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 이항 트리: 루트 노드 -->
  <circle cx="130" cy="155" r="16" fill="#4A90C2"/>
  <circle cx="130" cy="155" r="11" fill="#EAF2F9"/>
  <!-- 레벨 2 노드 -->
  <circle cx="245" cy="105" r="14" fill="#4A90C2"/>
  <circle cx="245" cy="105" r="9" fill="#EAF2F9"/>
  <circle cx="245" cy="205" r="14" fill="#171A20" fill-opacity=".12"/>
  <circle cx="245" cy="205" r="9" fill="#FAFAF7"/>
  <!-- 레벨 3 노드 -->
  <circle cx="360" cy="65" r="12" fill="#4A90C2"/>
  <circle cx="360" cy="65" r="7.5" fill="#EAF2F9"/>
  <circle cx="360" cy="155" r="12" fill="#171A20" fill-opacity=".12"/>
  <circle cx="360" cy="155" r="7.5" fill="#FAFAF7"/>
  <circle cx="360" cy="235" r="12" fill="#171A20" fill-opacity=".10"/>
  <circle cx="360" cy="235" r="7.5" fill="#FAFAF7"/>
  <!-- 연결 선 -->
  <line x1="144" y1="145" x2="231" y2="113" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
  <line x1="144" y1="165" x2="231" y2="197" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-opacity=".4"/>
  <line x1="257" y1="94" x2="348" y2="72" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
  <line x1="257" y1="116" x2="348" y2="148" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-opacity=".4"/>
  <line x1="257" y1="196" x2="348" y2="163" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-opacity=".4"/>
  <line x1="257" y1="214" x2="348" y2="228" stroke="#171A20" stroke-width="2" stroke-linecap="round" stroke-opacity=".4"/>
  <!-- 캐릭터 -->
  <g transform="translate(130 155)">
