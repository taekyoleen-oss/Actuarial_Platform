<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 스크리닝방법: 체/필터로 후보 선별 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 깔때기(필터) 상단 -->
<path d="M 130 80 L 350 80 L 270 180 L 210 180 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
<!-- 필터 메쉬 라인 -->
<line x1="165" y1="110" x2="315" y2="110" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
<line x1="185" y1="138" x2="295" y2="138" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
<line x1="205" y1="162" x2="275" y2="162" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
<!-- 깔때기 출구 -->
<rect x="210" y="180" width="60" height="30" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<!-- 선별 통과 캐릭터 (아래, 미소) -->
<g transform="translate(240 245)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/></g>
<!-- 탈락 캐릭터들 (좌우, 일자 입) -->
<g transform="translate(100 140)"><circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g transform="translate(380 140)"><circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<!-- 레이블 -->
<text x="240" y="75" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">screening</text>
<!-- tkLeen 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
