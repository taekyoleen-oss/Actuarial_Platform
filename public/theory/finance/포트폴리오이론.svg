<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 포트폴리오 이론: 평균-분산 효율적 프론티어와 최적 포트폴리오 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="80" y1="248" x2="420" y2="248" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="80" y1="248" x2="80" y2="52" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="424" y="252" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">σ</text>
<text x="62" y="52" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">E[r]</text>
<!-- 효율적 프론티어 곡선 (Sky) -->
<path d="M 140 220 Q 170 140 260 80 Q 340 50 400 68" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- 프론티어 아래 면적 (Sky Pastel) -->
<path d="M 140 220 Q 170 140 260 80 Q 340 50 400 68 L 400 248 L 140 248 Z" fill="#EAF2F9" fill-opacity="0.45"/>
<!-- 개별 자산 점 -->
<circle cx="200" cy="190" r="5" fill="#171A20"/>
<circle cx="310" cy="155" r="5" fill="#171A20"/>
<circle cx="370" cy="110" r="5" fill="#171A20"/>
<!-- 최적 포트폴리오 표시 -->
<circle cx="250" cy="100" r="8" fill="#EAF2F9" stroke="#4A90C2" stroke-width="2.5"/>
<text x="260" y="98" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">P*</text>
<!-- 캐릭터 -->
<g transform="translate(430 200)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
