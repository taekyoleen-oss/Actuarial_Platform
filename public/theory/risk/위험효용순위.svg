<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위험-효용 순위: 두 캐릭터가 위험 복권 중 어느 것이 더 나은지 비교 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 왼쪽 복권 카드 -->
<rect x="60" y="90" width="140" height="130" rx="8" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
<!-- 오른쪽 복권 카드 -->
<rect x="280" y="90" width="140" height="130" rx="8" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
<!-- 비교 화살표 -->
<line x1="215" y1="155" x2="275" y2="155" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
<polygon points="268,148 280,155 268,162" fill="#4A90C2"/>
<!-- 왼쪽 카드 기호 -->
<text x="130" y="148" font-family="ui-monospace,Consolas,monospace" font-size="22" fill="#171A20" fill-opacity=".6" text-anchor="middle">X</text>
<text x="130" y="175" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".4" text-anchor="middle">E[u(X)]</text>
<!-- 오른쪽 카드 기호 -->
<text x="350" y="148" font-family="ui-monospace,Consolas,monospace" font-size="22" fill="#4A90C2" text-anchor="middle">Y</text>
<text x="350" y="175" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2" fill-opacity=".7" text-anchor="middle">E[u(Y)]</text>
<!-- 캐릭터: 비교하며 고민하는 표정 -->
<g transform="translate(240 60)">
  <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
  <!-- 고민하는 일자 입 -->
  <path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
</g>
<!-- 우선순위 기호 -->
<text x="240" y="258" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".45" text-anchor="middle">≿ (순위)</text>
<!-- tkLeen 픽셀 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
