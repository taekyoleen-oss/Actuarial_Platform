<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 보험료 원리: 기대손해 E[X] 위에 안전할증을 얹어 가격표 π(X)가 된다 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <line x1="110" y1="238" x2="370" y2="238" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 기대손해 블록 -->
  <rect x="190" y="150" width="100" height="88" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <text x="240" y="198" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">E[X]</text>
  <!-- 안전할증 블록 (Sky) -->
  <rect x="190" y="116" width="100" height="34" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
  <text x="240" y="137" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#FFFFFF">+θ</text>
  <!-- 가격표 -->
  <path d="M 308 92 L 366 92 Q 372 92 372 98 L 372 116 Q 372 122 366 122 L 308 122 L 294 107 Z" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="306" cy="107" r="3" fill="none" stroke="#171A20" stroke-width="2"/>
  <text x="340" y="111" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">π(X)</text>
  <path d="M 294 107 Q 276 104 268 116" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <!-- 가격을 매기는 캐릭터 -->
  <g transform="translate(150 223)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
