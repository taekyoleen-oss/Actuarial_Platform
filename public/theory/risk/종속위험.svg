<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 종속위험: 두 위험이 한 끈으로 연결되어 함께 움직임(상관) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="100" y1="232" x2="392" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="100" y1="232" x2="100" y2="68" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 상관 산점도(타원형 추세) -->
<g fill="#171A20"><circle cx="150" cy="196" r="4"/><circle cx="178" cy="200" r="4"/><circle cx="196" cy="172" r="4"/><circle cx="224" cy="160" r="4"/><circle cx="252" cy="168" r="4"/><circle cx="276" cy="138" r="4"/><circle cx="300" cy="146" r="4"/><circle cx="328" cy="116" r="4"/></g>
<!-- 추세선(Sky) -->
<path d="M 140 200 Q 240 160 340 112" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- 두 위험을 잇는 끈 -->
<path d="M 180 110 Q 240 90 300 110" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="5 4"/>
<g transform="translate(180 96)"><circle r="11" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-3.6" cy="-2" r="1.5" fill="#171A20"/><circle cx="3.6" cy="-2" r="1.5" fill="#171A20"/><path d="M -4 4 Q 0 7.5 4 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<g transform="translate(300 96)"><circle r="11" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/><circle cx="-3.6" cy="-2" r="1.5" fill="#171A20"/><circle cx="3.6" cy="-2" r="1.5" fill="#171A20"/><path d="M -4 4 Q 0 7.5 4 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
