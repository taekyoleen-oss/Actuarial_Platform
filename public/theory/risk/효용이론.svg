<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 효용이론: 복권 두 장 중 기대효용이 높은 쪽을 고르는 의사결정자 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="70" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="70" y1="240" x2="70" y2="55" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 오목 효용함수 -->
<path d="M 85 210 Q 160 140 260 100 Q 340 72 400 65" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 아래 Sky Pastel 면 -->
<path d="M 85 210 Q 160 140 260 100 Q 340 72 400 65 L 400 240 L 85 240 Z" fill="#EAF2F9" fill-opacity=".45"/>
<!-- 의사결정자 캐릭터 -->
<g transform="translate(240 88)">
  <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
  <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
</g>
<!-- 수직 점선 (특정 부 w에서) -->
<line x1="200" y1="118" x2="200" y2="240" stroke="#171A20" stroke-width="1.8" stroke-dasharray="5 4" opacity=".4"/>
<line x1="320" y1="80" x2="320" y2="240" stroke="#171A20" stroke-width="1.8" stroke-dasharray="5 4" opacity=".4"/>
<!-- 기호 -->
<text x="195" y="255" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".45" text-anchor="middle">w₁</text>
<text x="320" y="255" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".45" text-anchor="middle">w₂</text>
<text x="405" y="62" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">u(w)</text>
<!-- 축 라벨 -->
<text x="425" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">w</text>
<text x="56" y="53" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">u</text>
<!-- tkLeen 픽셀 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
