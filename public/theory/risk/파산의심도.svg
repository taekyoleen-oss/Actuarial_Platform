<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 파산의 심도: 파산 시점 T에 0선 아래로 떨어진 깊이 |U(T)| -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축: 0선이 가운데 -->
  <line x1="72" y1="66" x2="72" y2="252" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="72" y1="186" x2="420" y2="186" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="56" y="128" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">u</text>
  <text x="82" y="60" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">U(t)</text>
  <!-- 잉여금 경로: 0선 아래로 추락 -->
  <path d="M 80 124 L 142 100 L 142 146 L 206 120 L 206 166 L 268 140 L 268 224"
        fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 파산 시점 T -->
  <circle cx="268" cy="186" r="4.5" fill="#171A20"/>
  <text x="262" y="174" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">T</text>
  <!-- 심도 브래킷 -->
  <g stroke="#171A20" stroke-width="2.5" stroke-linecap="round" opacity=".55">
    <line x1="292" y1="186" x2="292" y2="224"/>
    <line x1="286" y1="186" x2="298" y2="186"/>
    <line x1="286" y1="224" x2="298" y2="224"/>
  </g>
  <text x="306" y="210" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">|U(T)|</text>
  <!-- 0선 위에서 걱정하는 캐릭터 -->
  <g transform="translate(370 171)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -4.5 5.5 L 4.5 5.5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 17 -11 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#4A90C2"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
