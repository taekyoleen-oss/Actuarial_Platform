<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 암메터 과정: 구간마다 강도가 바뀌는 혼합포아송 클레임 발생 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="200" x2="408" y2="200" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="200" x2="72" y2="72" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 구간별 강도 λ (계단, Sky) -->
<path d="M 84 160 L 168 160 L 168 110 L 252 110 L 252 144 L 336 144 L 336 96 L 396 96" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="92" y="100" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">λ(구간)</text>
<!-- 클레임 발생 틱(강도 높을수록 촘촘) -->
<g stroke="#171A20" stroke-width="2.5" stroke-linecap="round">
<line x1="110" y1="200" x2="110" y2="186"/><line x1="150" y1="200" x2="150" y2="186"/>
<line x1="186" y1="200" x2="186" y2="186"/><line x1="206" y1="200" x2="206" y2="186"/><line x1="228" y1="200" x2="228" y2="186"/>
<line x1="280" y1="200" x2="280" y2="186"/>
<line x1="350" y1="200" x2="350" y2="186"/><line x1="366" y1="200" x2="366" y2="186"/><line x1="382" y1="200" x2="382" y2="186"/>
</g>
<text x="396" y="222" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
