<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 비크만 합성곱 공식: 생존확률을 기하·합성곱 층의 합으로 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 합성곱 층(파스텔 누적 막대) -->
<g stroke="#171A20" stroke-width="2.5">
<rect x="100" y="120" width="40" height="112" fill="#EAF2F9"/>
<rect x="156" y="150" width="40" height="82" fill="#EAF2F9"/>
<rect x="212" y="176" width="40" height="56" fill="#EAF2F9"/>
<rect x="268" y="196" width="40" height="36" fill="#EAF2F9"/>
<rect x="324" y="210" width="40" height="22" fill="#EAF2F9"/>
</g>
<!-- 합 = 생존확률 곡선(Sky) -->
<path d="M 100 116 Q 200 150 364 206" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="120" y="104" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">Σ 합성곱 층</text>
<text x="372" y="250" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">자본 u</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
