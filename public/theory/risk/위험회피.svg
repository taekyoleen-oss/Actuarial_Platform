<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위험회피: 오목 효용함수로 위험을 피하는 사람 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="70" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="70" y1="240" x2="70" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 오목 효용함수 곡선 u(w) -->
<path d="M 90 200 Q 180 100 380 70" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 곡선 아래 Sky Pastel 면 -->
<path d="M 90 200 Q 180 100 380 70 L 380 240 L 90 240 Z" fill="#EAF2F9" fill-opacity=".5"/>
<!-- 축 라벨 -->
<text x="428" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">w</text>
<text x="56" y="58" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">u</text>
<!-- E[u] 기대효용 수평 점선 -->
<line x1="70" y1="148" x2="220" y2="148" stroke="#171A20" stroke-width="1.8" stroke-dasharray="5 4" opacity=".5"/>
<!-- 캐릭터: 안도하는 표정으로 곡선 중간에 -->
<g transform="translate(230 115)">
  <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
  <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
</g>
<!-- 기호 라벨 -->
<text x="385" y="65" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2" fill-opacity=".8">u(w)</text>
<text x="74" y="145" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".5">E[u]</text>
<!-- tkLeen 픽셀 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
