<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 보험규제와감독: 가용자본과 요구자본의 균형을 재는 저울 위에 감독자 캐릭터가 서 있는 장면 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 저울 기둥 -->
  <line x1="240" y1="240" x2="240" y2="110" stroke="#171A20" stroke-width="4" stroke-linecap="round"/>
  <!-- 저울 수평대 (Sky) -->
  <line x1="130" y1="130" x2="350" y2="130" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 저울 받침 -->
  <path d="M 200 240 L 240 240 L 280 240" stroke="#171A20" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- 왼쪽 접시 — 가용자본 (무거운 쪽, 약간 내려감) -->
  <line x1="145" y1="130" x2="145" y2="168" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 110 168 Q 145 178 180 168" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <text x="124" y="165" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">AC</text>
  <!-- 오른쪽 접시 — 요구자본 (가벼운 쪽, 약간 올라감) -->
  <line x1="335" y1="130" x2="335" y2="148" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 300 148 Q 335 158 370 148" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <text x="319" y="145" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">RC</text>
  <!-- 저울 중심 피봇 -->
  <circle cx="240" cy="110" r="7" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
  <!-- 캐릭터: 기둥 위 감독자 -->
  <g transform="translate(240 88)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
