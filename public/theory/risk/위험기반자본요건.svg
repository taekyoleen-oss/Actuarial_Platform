<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위험기반자본요건: C1~C4 위험 모듈 블록들이 쌓여 RBC 합계를 이루는 적층 구조 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 지면 -->
  <line x1="90" y1="242" x2="390" y2="242" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- RBC 적층 블록 (아래→위) -->
  <!-- C1 자산위험 (Sky, 가장 큼) -->
  <rect x="155" y="190" width="170" height="52" rx="4" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
  <text x="218" y="221" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#FFFFFF">C1</text>
  <!-- C2 보험위험 (Sky Pastel) -->
  <rect x="165" y="148" width="150" height="42" rx="4" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
  <text x="228" y="175" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".7">C2</text>
  <!-- C3 금리위험 (White) -->
  <rect x="175" y="112" width="130" height="36" rx="4" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
  <text x="232" y="136" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".7">C3</text>
  <!-- C4 운영위험 (Sky Pastel, 가장 작음) -->
  <rect x="185" y="80" width="110" height="32" rx="4" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
  <text x="232" y="102" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".7">C4</text>
  <!-- 합계 화살표 오른쪽 -->
  <line x1="335" y1="161" x2="370" y2="161" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="370,161 360,155 360,167" fill="#171A20"/>
  <text x="374" y="158" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">RBC</text>
  <!-- 캐릭터: 블록 탑 위 -->
  <g transform="translate(240 62)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
