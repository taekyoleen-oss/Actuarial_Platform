<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위험과정: 보험료로 완만히 올라가다 클레임 충격에 계단식으로 내려오는 잉여금 U(t) 경로 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="70" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="240" x2="70" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="424" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t</text>
  <text x="56" y="62" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">U</text>
  <!-- U(t) 잉여금 경로: 보험료(올라감) + 클레임(내려감) 계단 -->
  <!-- 경로 (Sky 굵은 선) -->
  <polyline points="70,200 130,178 130,205 195,183 195,222 250,200 250,230 295,210 295,238 355,215 355,245 400,224"
            fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 경로 아래 Sky Pastel 면 -->
  <polygon points="70,200 130,178 130,205 195,183 195,222 250,200 250,230 295,210 295,238 355,215 355,240 70,240"
           fill="#EAF2F9" fill-opacity=".5"/>
  <!-- 초기값 레이블 -->
  <line x1="70" y1="200" x2="62" y2="200" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <text x="40" y="204" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">u</text>
  <!-- 캐릭터: 경로 시작점 위 -->
  <g transform="translate(70 180)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 클레임 기호 표시 (하향 화살표) -->
  <line x1="130" y1="178" x2="130" y2="205" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="195" y1="183" x2="195" y2="222" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="250" y1="200" x2="250" y2="230" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="295" y1="210" x2="295" y2="238" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="355" y1="215" x2="355" y2="245" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
