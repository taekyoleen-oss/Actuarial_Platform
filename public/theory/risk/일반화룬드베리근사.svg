<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 일반화 룬드베리 근사: 정확한 파산확률(점선)을 바짝 따라가는 근사 곡선 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <path d="M 72 70 L 72 238 L 420 238" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 정확한 값 (점선) -->
  <path d="M 80 96 C 160 142 240 184 300 206 C 350 220 390 228 410 231" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 6" opacity=".55"/>
  <!-- 근사 곡선 (Sky, 거의 겹침) -->
  <path d="M 80 104 C 160 148 240 188 300 209 C 350 222 390 229 410 232" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <text x="226" y="130" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">ψ(u) ≈ C·e^-Ru</text>
  <text x="398" y="258" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">u →</text>
  <!-- 돋보기로 확인하는 캐릭터 -->
  <g transform="translate(150 205)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="23" cy="-12" r="8" fill="none" stroke="#171A20" stroke-width="2.5"/>
    <line x1="17" y1="-5" x2="13" y2="0" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
