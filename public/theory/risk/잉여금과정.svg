<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 잉여금 과정: 보험료로 오르고 클레임으로 내리는 톱니형 잉여금 U(t) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="60" y="100" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">U(t)</text>
<!-- 초기자본 u -->
<line x1="68" y1="180" x2="76" y2="180" stroke="#171A20" stroke-width="2.5"/>
<!-- 톱니 잉여금 경로(Sky): 완만 상승 + 클레임 하락 -->
<path d="M 72 180 L 120 156 L 120 196 L 168 168 L 168 120 L 224 96 L 224 150 L 284 122 L 284 88 L 348 60 L 348 110 L 396 86" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
