<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위험측도: 손실분포 꼬리에서 VaR/TVaR를 읽는 계리사 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="60" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="60" y1="240" x2="60" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 손실분포 꼬리 곡선 (오른쪽 꼬리) -->
<path d="M 80 80 Q 160 82 220 150 Q 280 210 350 232 Q 390 238 410 240" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 꼬리 아래 Sky Pastel 면 -->
<path d="M 300 218 Q 340 232 380 238 L 390 240 L 300 240 Z" fill="#EAF2F9"/>
<!-- VaR 수직선 -->
<line x1="300" y1="218" x2="300" y2="240" stroke="#171A20" stroke-width="2.5" stroke-dasharray="5 4"/>
<text x="297" y="255" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55" text-anchor="middle">VaR</text>
<!-- 축 라벨 -->
<text x="425" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">X</text>
<text x="52" y="56" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">f</text>
<!-- 캐릭터: 곡선 왼쪽 위에 서 있는 계리사 -->
<g transform="translate(160 110)">
  <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
  <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
</g>
<!-- TVaR 라벨 (꼬리 안) -->
<text x="350" y="228" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2" fill-opacity=".85" text-anchor="middle">TVaR</text>
<!-- tkLeen 픽셀 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
