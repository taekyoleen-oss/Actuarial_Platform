<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 헤크만–마이어스 알고리즘: 특성함수(파동)를 역변환해 총손실분포를 복원 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 윗부분: 특성함수 파동(주파수 영역) -->
<line x1="72" y1="108" x2="408" y2="108" stroke="#171A20" stroke-width="2.5" stroke-opacity=".5" stroke-linecap="round"/>
<path d="M 84 108 Q 108 70 132 108 T 180 108 T 228 108 T 276 108 T 324 108 T 372 108" fill="none" stroke="#171A20" stroke-width="2.5" stroke-opacity=".55"/>
<text x="92" y="64" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">특성함수 φ(t)</text>
<!-- 역변환 화살표 -->
<path d="M 240 124 L 240 158" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
<path d="M 240 158 l -5 -8 l 10 0 z" fill="#171A20"/>
<text x="252" y="148" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">역변환</text>
<!-- 아랫부분: 복원된 총손실분포(Sky) -->
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<path d="M 84 232 Q 180 162 240 178 Q 300 196 396 226" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="150" y="200" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">총손실 S 분포</text>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
