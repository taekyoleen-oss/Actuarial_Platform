<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 변동준비금: 클레임 파도를 막아주는 완충 댐(변동준비금)과 넘쳐오는 풍년/흉년 물결 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 지면 -->
  <line x1="60" y1="240" x2="430" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 흉년 클레임 파도 (Sky) -->
  <path d="M 270 185 Q 305 158 340 185 Q 365 205 390 185 Q 410 170 425 180 L 425 240 L 270 240 Z"
        fill="#4A90C2" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 좋은 해 (Sky Pastel 낮은 파도) -->
  <path d="M 60 220 Q 100 208 140 220 Q 165 228 180 220 L 180 240 L 60 240 Z"
        fill="#EAF2F9" stroke="#171A20" stroke-width="2" stroke-linejoin="round"/>
  <!-- 변동준비금 댐 블록 -->
  <rect x="195" y="155" width="55" height="85" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <!-- 댐 내부 채움선 (완충 표시) -->
  <line x1="205" y1="175" x2="240" y2="175" stroke="#4A90C2" stroke-width="2" stroke-linecap="round"/>
  <line x1="205" y1="190" x2="240" y2="190" stroke="#4A90C2" stroke-width="2" stroke-linecap="round"/>
  <line x1="205" y1="205" x2="240" y2="205" stroke="#4A90C2" stroke-width="2" stroke-linecap="round"/>
  <line x1="205" y1="220" x2="240" y2="220" stroke="#4A90C2" stroke-width="2" stroke-linecap="round"/>
  <!-- 준비금 레이블 기호 -->
  <text x="205" y="150" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">FR</text>
  <!-- 캐릭터: 댐 위에 서 있음 -->
  <g transform="translate(222 140)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
