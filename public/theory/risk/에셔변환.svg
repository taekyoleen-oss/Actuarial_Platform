<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 에셔 변환: 분포를 지수가중으로 기울여(틸팅) 꼬리 쪽으로 이동 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="216" x2="408" y2="216" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="216" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 원래 분포(Ink) -->
<path d="M 84 216 Q 156 92 228 216" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<text x="120" y="118" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">원분포</text>
<!-- 틸팅된 분포(Sky, 오른쪽 이동) -->
<path d="M 168 216 Q 256 84 344 216" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="300" y="118" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">e^(θx) 틸팅</text>
<!-- 이동 화살표 -->
<path d="M 168 130 Q 210 116 252 130" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
<path d="M 252 130 l -9 -3 l 4 9 z" fill="#171A20"/>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
