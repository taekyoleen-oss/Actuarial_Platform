<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 조정계수 R: 파산확률을 e^(-Ru)로 누르는 감쇠율 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 파산확률 감쇠곡선(Sky) -->
<path d="M 72 84 Q 150 200 230 220 T 396 230" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="92" y="100" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">ψ(u) ≈ e^(-Ru)</text>
<text x="380" y="250" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">자본 u</text>
<!-- 감쇠율 R 표시(기울기) -->
<line x1="120" y1="150" x2="170" y2="186" stroke="#171A20" stroke-width="2.5" stroke-dasharray="5 4"/>
<text x="150" y="146" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".6">R</text>
<g transform="translate(120 118)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
