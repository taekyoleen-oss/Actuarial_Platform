<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — DFA동태적재무분석: 몬테카를로 시뮬레이션의 수천 경로가 하나의 초기점에서 부채·자산을 통합하며 퍼져나가는 fan chart -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="90" y1="240" x2="410" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="240" x2="90" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="415" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t</text>
  <text x="75" y="58" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">U</text>
  <!-- Fan chart: 여러 시뮬레이션 경로 (Sky) -->
  <path d="M 130 200 Q 220 180 310 140 Q 360 118 400 100" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 130 200 Q 220 195 310 175 Q 360 162 400 150" fill="none" stroke="#4A90C2" stroke-width="3" stroke-linecap="round" opacity=".7"/>
  <path d="M 130 200 Q 220 210 310 215 Q 360 218 400 210" fill="none" stroke="#4A90C2" stroke-width="3" stroke-linecap="round" opacity=".55"/>
  <path d="M 130 200 Q 220 222 310 230 Q 355 234 390 238" fill="none" stroke="#4A90C2" stroke-width="2" stroke-linecap="round" opacity=".35"/>
  <!-- 경로 사이 Sky Pastel 채움 -->
  <path d="M 130 200 Q 220 180 310 140 Q 360 118 400 100 L 400 210 Q 360 162 310 175 Q 220 195 130 200 Z" fill="#EAF2F9" fill-opacity=".5"/>
  <!-- 캐릭터: 분석가 -->
  <g transform="translate(130 200)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 축 눈금 -->
  <line x1="90" y1="200" x2="85" y2="200" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <text x="66" y="204" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">u₀</text>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
