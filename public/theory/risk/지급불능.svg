<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 지급불능: 잉여금이 0 아래로 떨어지는 순간 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="70" y1="170" x2="420" y2="170" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="70" y1="60" x2="70" y2="260" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 잉여금 과정 -->
<path d="M 90 120 Q 130 100 170 110 Q 210 120 250 105 Q 280 96 300 170 Q 310 195 340 210 Q 380 225 410 230" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- 0선 아래 Sky Pastel (지급불능 구간) -->
<path d="M 300 170 Q 310 195 340 210 Q 380 225 410 230 L 410 170 Z" fill="#EAF2F9"/>
<!-- 파산 시점 표시 -->
<line x1="300" y1="170" x2="300" y2="80" stroke="#171A20" stroke-width="2" stroke-dasharray="5 4" opacity=".5"/>
<text x="296" y="75" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".5" text-anchor="middle">τ</text>
<!-- 캐릭터: 놀란 표정 -->
<g transform="translate(190 90)">
  <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
  <!-- 놀란 입 O형 -->
  <circle cx="0" cy="5" r="3.5" fill="#171A20"/>
</g>
<!-- 축 라벨 -->
<text x="425" y="174" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
<text x="56" y="58" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">U</text>
<text x="74" y="166" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".45">0</text>
<!-- tkLeen 픽셀 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
