<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 운영 시간: 달력시간 t를 위험 노출량에 맞춰 다시 재는 시계 τ(t) -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 시계 -->
  <circle cx="142" cy="132" r="42" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <g stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".45">
    <line x1="142" y1="96" x2="142" y2="104"/>
    <line x1="142" y1="160" x2="142" y2="168"/>
    <line x1="106" y1="132" x2="114" y2="132"/>
    <line x1="170" y1="132" x2="178" y2="132"/>
  </g>
  <line x1="142" y1="132" x2="142" y2="104" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="142" y1="132" x2="162" y2="140" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
  <!-- 운영시간 곡선 (가속) -->
  <path d="M 240 230 C 300 224 340 188 360 140 C 368 120 372 106 376 96 L 376 238 L 240 238 Z" fill="#EAF2F9" stroke="none"/>
  <path d="M 232 86 L 232 238 L 414 238" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 240 230 C 300 224 340 188 360 140 C 368 120 372 106 376 96" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <text x="240" y="80" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">τ(t)</text>
  <text x="394" y="258" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t →</text>
  <!-- 곡선 위 캐릭터 -->
  <g transform="translate(338 168)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
