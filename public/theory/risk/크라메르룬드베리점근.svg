<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 크라메르–룬드베리 점근: 파산확률이 C·e^(-Ru)로 정밀 근사 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="64" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 실제 파산확률(Ink) -->
<path d="M 72 96 Q 150 196 230 218 T 396 228" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 점근 근사 C e^-Ru (Sky 점선, 거의 일치) -->
<path d="M 80 110 Q 156 200 232 220 T 396 230" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-dasharray="3 7"/>
<text x="96" y="110" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">C·e^(-Ru)</text>
<text x="120" y="170" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">ψ(u)</text>
<g transform="translate(360 196)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
