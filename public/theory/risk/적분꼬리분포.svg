<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 적분꼬리분포: 꼬리확률 적분로 만든 평형분포 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 좌표축 -->
<line x1="70" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="70" y1="240" x2="70" y2="55" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 원분포 꼬리 생존함수 F̄(x) -->
<path d="M 85 80 Q 150 85 230 160 Q 310 220 410 238" fill="none" stroke="#171A20" stroke-width="2.5" stroke-dasharray="6 4" stroke-linecap="round"/>
<!-- 적분꼬리 분포 Fe(x) — 더 완만한 곡선 -->
<path d="M 85 110 Q 160 115 250 170 Q 340 215 410 236" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Fe 아래 Sky Pastel 면 -->
<path d="M 85 110 Q 160 115 250 170 Q 340 215 410 236 L 410 240 L 85 240 Z" fill="#EAF2F9" fill-opacity=".55"/>
<!-- 라벨 -->
<text x="415" y="233" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2">Fe</text>
<text x="415" y="248" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">F̄</text>
<text x="426" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">x</text>
<text x="58" y="53" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">1</text>
<!-- 적분 기호 라벨 -->
<text x="180" y="75" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#4A90C2" fill-opacity=".75">∫F̄(t)dt/μ</text>
<!-- 캐릭터 -->
<g transform="translate(290 140)">
  <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
  <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
  <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
</g>
<!-- tkLeen 픽셀 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
