<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 배경위험: 보험 못 드는 배경 위험(구름)이 보장된 위험(우산) 뒤에 깔림 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 배경 위험(흐릿한 큰 구름) -->
<path d="M 150 120 Q 130 92 168 90 Q 178 64 220 78 Q 252 58 286 82 Q 330 78 322 112 Q 348 124 318 140 L 168 140 Q 138 138 150 120 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-opacity=".4"/>
<text x="238" y="108" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".4">배경위험(비보장)</text>
<!-- 전경: 우산 든 사람(보장된 위험) -->
<line x1="240" y1="168" x2="240" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<path d="M 198 170 Q 240 132 282 170 Z" fill="#4A90C2" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
<line x1="240" y1="160" x2="240" y2="170" stroke="#171A20" stroke-width="3"/>
<g transform="translate(240 204)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
