<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 공단조성: 완전 양의 종속 — 두 위험이 같은 방향으로 똑같이 움직임 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<line x1="100" y1="232" x2="392" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="100" y1="232" x2="100" y2="68" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 45도 완전종속 직선(Sky) -->
<line x1="112" y1="220" x2="368" y2="84" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- 점들이 정확히 직선 위에 -->
<g fill="#171A20"><circle cx="150" cy="199" r="4"/><circle cx="208" cy="168" r="4"/><circle cx="266" cy="137" r="4"/><circle cx="324" cy="106" r="4"/></g>
<text x="118" y="92" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">X↑ ⇒ Y↑</text>
<text x="384" y="252" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">X</text>
<text x="86" y="78" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">Y</text>
<!-- 손잡고 함께 오르는 두 사람 -->
<g transform="translate(248 130)"><circle r="12" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4" cy="-2" r="1.6" fill="#171A20"/><circle cx="4" cy="-2" r="1.6" fill="#171A20"/><path d="M -4.5 4 Q 0 8 4.5 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
