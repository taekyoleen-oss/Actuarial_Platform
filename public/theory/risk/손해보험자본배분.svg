<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 손해보험자본배분: 전체 자본 파이를 종목별 슬라이스로 배분하는 RORAC 장면 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 파이 차트 (원형 자본 배분) -->
  <!-- 슬라이스 1: 큰 조각 (Sky) -->
  <path d="M 210 155 L 210 85 A 70 70 0 0 1 273 119 Z" fill="#4A90C2" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 슬라이스 2: 중간 조각 (Sky Pastel) -->
  <path d="M 210 155 L 273 119 A 70 70 0 0 1 275 192 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 슬라이스 3: 조각 (White) -->
  <path d="M 210 155 L 275 192 A 70 70 0 0 1 210 225 Z" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 슬라이스 4: 나머지 큰 조각 -->
  <path d="M 210 155 L 210 225 A 70 70 0 1 1 210 85 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5" stroke-linejoin="round" fill-opacity=".6"/>
  <!-- 파이 중심 표시 -->
  <circle cx="210" cy="155" r="3" fill="#171A20"/>
  <!-- 배분 화살표 레이블 -->
  <line x1="283" y1="108" x2="330" y2="88" stroke="#171A20" stroke-width="1.8" stroke-linecap="round" opacity=".5"/>
  <text x="333" y="92" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">C₁</text>
  <line x1="285" y1="195" x2="330" y2="210" stroke="#171A20" stroke-width="1.8" stroke-linecap="round" opacity=".5"/>
  <text x="333" y="214" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">C₂</text>
  <line x1="210" y1="228" x2="210" y2="255" stroke="#171A20" stroke-width="1.8" stroke-linecap="round" opacity=".5"/>
  <text x="195" y="268" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">C₃</text>
  <!-- RORAC 레이블 -->
  <text x="100" y="148" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">RORAC</text>
  <!-- 캐릭터: 파이 왼쪽 -->
  <g transform="translate(115 155)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
