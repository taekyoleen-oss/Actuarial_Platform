<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위험가치: 손실분포의 오른쪽 꼬리에서 99.5% 신뢰수준 VaR 수직선이 경계를 나누는 장면 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="70" y1="230" x2="420" y2="230" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="230" x2="70" y2="60" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="422" y="234" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">L</text>
  <text x="58" y="58" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">f</text>
  <!-- 손실 분포 곡선 (Sky) -->
  <path d="M 80 228 Q 130 220 180 160 Q 210 110 240 95 Q 265 82 290 100 Q 320 122 350 160 Q 375 200 400 225 L 400 230 L 80 230 Z"
        fill="#EAF2F9" stroke="none"/>
  <path d="M 80 228 Q 130 220 180 160 Q 210 110 240 95 Q 265 82 290 100 Q 320 122 350 160 Q 375 200 400 225"
        fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- VaR 수직선 (경계) -->
  <line x1="355" y1="155" x2="355" y2="230" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-dasharray="6,4"/>
  <!-- 꼬리 영역 강조 (오른쪽) -->
  <path d="M 355 155 Q 375 200 400 225 L 400 230 L 355 230 Z" fill="#4A90C2" fill-opacity=".25"/>
  <!-- VaR 레이블 -->
  <text x="340" y="148" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">VaR</text>
  <text x="295" y="250" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" opacity=".45">99.5%</text>
  <!-- 캐릭터 (분포 중앙 위) -->
  <g transform="translate(240 72)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
