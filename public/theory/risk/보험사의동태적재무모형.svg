<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 보험사의동태적재무모형: 자산 탑과 부채 탑을 Sky 다리로 연결한 통합 모형사무소(model office) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 지면 -->
  <line x1="70" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 자산 탑 (왼쪽) -->
  <rect x="95" y="140" width="90" height="100" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <rect x="105" y="150" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <rect x="145" y="150" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <rect x="105" y="182" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <rect x="145" y="182" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <text x="117" y="136" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">Asset</text>
  <!-- 부채 탑 (오른쪽) -->
  <rect x="295" y="120" width="90" height="120" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <rect x="305" y="130" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <rect x="345" y="130" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <rect x="305" y="162" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <rect x="345" y="162" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <rect x="305" y="194" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <rect x="345" y="194" width="28" height="20" fill="#FAFAF7" stroke="#171A20" stroke-width="2"/>
  <text x="313" y="116" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">Liab.</text>
  <!-- Sky 연결 다리 -->
  <path d="M 185 170 Q 240 130 295 150" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 다리 위 캐릭터 -->
  <g transform="translate(240 148)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
