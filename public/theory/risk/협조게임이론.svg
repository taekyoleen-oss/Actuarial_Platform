<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 협조게임이론: 세 참가자가 섀플리 값으로 이익을 나누는 장면 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 연합 원 (Sky) -->
<circle cx="240" cy="150" r="90" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
<!-- 내부 분할선 -->
<line x1="240" y1="60" x2="240" y2="240" stroke="#171A20" stroke-width="2" stroke-dasharray="5 4" opacity=".4"/>
<line x1="162" y1="105" x2="318" y2="195" stroke="#171A20" stroke-width="2" stroke-dasharray="5 4" opacity=".4"/>
<line x1="162" y1="195" x2="318" y2="105" stroke="#171A20" stroke-width="2" stroke-dasharray="5 4" opacity=".4"/>
<!-- 세 참가자 캐릭터 -->
<g transform="translate(240 80)">
  <circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/>
  <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
  <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
</g>
<g transform="translate(170 195)">
  <circle r="13" fill="#ECFDF5" stroke="#171A20" stroke-width="3"/>
  <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
  <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
</g>
<g transform="translate(310 195)">
  <circle r="13" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/>
  <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
  <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
</g>
<!-- 섀플리 라벨 -->
<text x="240" y="155" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#4A90C2" fill-opacity=".8" text-anchor="middle">φ(v)</text>
<!-- 외부 라벨 -->
<text x="240" y="270" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".4" text-anchor="middle">Shapley value</text>
<!-- tkLeen 픽셀 시그니처 -->
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
