<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 보르치 정리: 위험을 두 당사자가 파레토 최적으로 분담(원을 나눔) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 위험을 나누는 원(파이) -->
<circle cx="240" cy="150" r="76" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
<path d="M 240 150 L 240 74 A 76 76 0 0 1 240 226 Z" fill="#EAF2F9"/>
<path d="M 240 150 L 240 226 A 76 76 0 0 1 240 74 Z" fill="#4A90C2" fill-opacity=".25"/>
<line x1="240" y1="74" x2="240" y2="226" stroke="#171A20" stroke-width="3" stroke-dasharray="6 5"/>
<text x="290" y="155" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">보험사</text>
<text x="150" y="155" text-anchor="end" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">재보험사</text>
<!-- 합의하는 두 사람 -->
<g transform="translate(150 96)"><circle r="12" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-4" cy="-2" r="1.6" fill="#171A20"/><circle cx="4" cy="-2" r="1.6" fill="#171A20"/><path d="M -4.5 4 Q 0 8 4.5 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<g transform="translate(330 96)"><circle r="12" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/><circle cx="-4" cy="-2" r="1.6" fill="#171A20"/><circle cx="4" cy="-2" r="1.6" fill="#171A20"/><path d="M -4.5 4 Q 0 8 4.5 4" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
