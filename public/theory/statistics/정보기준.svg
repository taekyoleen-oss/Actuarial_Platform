<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 정보기준: 적합도와 모수 수를 양팔저울에 다는 AIC의 균형 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 저울 기둥과 바닥 -->
  <path d="M 240 100 L 240 232 M 196 244 L 284 244" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <path d="M 222 232 L 258 232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 저울대 (Sky, 살짝 기울어짐) -->
  <path d="M 130 118 L 350 92" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <circle cx="240" cy="104" r="7" fill="#4A90C2"/>
  <!-- 왼쪽 접시: 적합도(우도 곡선) -->
  <path d="M 130 118 L 130 150" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 96 150 Q 130 178 164 150" fill="#EAF2F9" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 110 146 C 118 130 126 126 132 130 C 140 136 148 144 154 146" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <text x="96" y="200" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">log L</text>
  <!-- 오른쪽 접시: 모수 벌점(추 κ) -->
  <path d="M 350 92 L 350 124" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 316 124 Q 350 152 384 124" fill="#EAF2F9" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <rect x="336" y="102" width="28" height="20" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
  <text x="340" y="174" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">2κ</text>
  <text x="206" y="76" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">AIC</text>
  <!-- 저울을 읽는 캐릭터 -->
  <g transform="translate(108 244)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-2.5" cy="-3" r="1.8" fill="#171A20"/><circle cx="6" cy="-3" r="1.8" fill="#171A20"/>
    <path d="M -4 5 Q 0.5 8.5 5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
