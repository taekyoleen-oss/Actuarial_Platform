<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 수치알고리즘: 이분법으로 함수의 근을 좁혀가는 수렴 수열 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="60" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="60" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="425" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">x</text>
  <text x="48" y="56" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">f</text>
  <!-- f(x) 곡선 (Sky) -->
  <path d="M 80 210 C 150 80 260 80 380 230" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 곡선 아래 Sky Pastel 면 -->
  <path d="M 80 210 C 150 80 260 80 380 230 L 380 240 L 80 240 Z" fill="#EAF2F9" fill-opacity=".7"/>
  <!-- 이분법 수렴 구간 (Ink 수직선) -->
  <line x1="200" y1="200" x2="200" y2="240" stroke="#171A20" stroke-width="2" stroke-dasharray="5 4" opacity=".5"/>
  <line x1="320" y1="218" x2="320" y2="240" stroke="#171A20" stroke-width="2" stroke-dasharray="5 4" opacity=".5"/>
  <line x1="260" y1="149" x2="260" y2="240" stroke="#171A20" stroke-width="2.5" opacity=".7"/>
  <!-- 근 표시 -->
  <circle cx="260" cy="148" r="5" fill="#4A90C2"/>
  <text x="262" y="135" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">f(x*)=0</text>
  <!-- 캐릭터 -->
  <g transform="translate(370 120)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
