<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 측도변환: P에서 Q로 무게중심을 이동하는 라돈-니코딤 저울 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 저울 막대 (중심 균형) -->
  <path d="M 148 155 L 332 155" fill="none" stroke="#171A20" stroke-width="4" stroke-linecap="round"/>
  <!-- 저울 기둥 -->
  <path d="M 240 155 L 240 220" fill="none" stroke="#171A20" stroke-width="4" stroke-linecap="round"/>
  <!-- 받침 삼각형 -->
  <polygon points="220,220 260,220 240,248" fill="#171A20" opacity=".8"/>
  <!-- 왼쪽 접시(P) -->
  <ellipse cx="150" cy="172" rx="32" ry="9" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
  <path d="M 118 163 L 150 172 L 182 163" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <text x="150" y="154" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#171A20" opacity=".65">P</text>
  <!-- 오른쪽 접시(Q) -->
  <ellipse cx="330" cy="168" rx="32" ry="9" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
  <path d="M 298 159 L 330 168 L 362 159" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <text x="330" y="150" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#4A90C2">Q</text>
  <!-- 화살표 (P→Q 변환) -->
  <path d="M 194 125 Q 240 100 286 125" fill="none" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
  <polygon points="282,118 294,130 278,132" fill="#4A90C2"/>
  <!-- dQ/dP 라벨 -->
  <text x="240" y="92" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">dQ/dP</text>
  <!-- 캐릭터 (저울 옆) -->
  <g transform="translate(390 168)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
