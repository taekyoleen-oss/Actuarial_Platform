<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 연속다변량분포: 이변량 밀도 등고선과 두 확률변수 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="60" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="60" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="426" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">X&#x2081;</text>
  <text x="44" y="56" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">X&#x2082;</text>
  <!-- 등고선 3겹 -->
  <ellipse cx="240" cy="155" rx="120" ry="75" fill="#EAF2F9" stroke="#171A20" stroke-width="2" opacity=".5"/>
  <ellipse cx="240" cy="155" rx="80" ry="50" fill="#EAF2F9" stroke="#171A20" stroke-width="2" opacity=".7"/>
  <ellipse cx="240" cy="155" rx="38" ry="24" fill="#EAF2F9" stroke="#4A90C2" stroke-width="5"/>
  <!-- 중심점 -->
  <circle cx="240" cy="155" r="4" fill="#4A90C2"/>
  <text x="244" y="150" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">&#x3bc;</text>
  <!-- 캐릭터 2명 -->
  <g transform="translate(160 222)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(320 222)">
    <circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
