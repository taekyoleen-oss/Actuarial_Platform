<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 파산이론: 초기잉여금 u의 둑이 클레임의 파도를 막아내는 장면 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 지면 -->
  <line x1="80" y1="238" x2="420" y2="238" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 파도 (클레임, Sky) -->
  <path d="M 252 196 Q 282 172 312 196 Q 342 220 372 196 Q 396 178 416 190 L 416 238 L 252 238 Z"
        fill="#4A90C2" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <g fill="#4A90C2" stroke="#171A20" stroke-width="2">
    <circle cx="262" cy="160" r="4"/>
    <circle cx="278" cy="146" r="3"/>
  </g>
  <!-- 둑 (초기잉여금 u) -->
  <path d="M 196 238 L 214 146 L 244 146 L 252 238 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <g stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".55">
    <line x1="184" y1="146" x2="184" y2="238"/>
    <line x1="179" y1="146" x2="189" y2="146"/>
    <line x1="179" y1="238" x2="189" y2="238"/>
  </g>
  <text x="158" y="196" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">u</text>
  <!-- 둑 위에서 지키는 캐릭터 -->
  <g transform="translate(229 131)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
