<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — TITLE: 다변량통계 MOTIF: 세 축 위에 분포한 점들과 두 캐릭터가 각각 다른 축을 가리키는 다차원 산점도 -->
  <defs><pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern></defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 3 axis lines from center (240, 180) -->
  <!-- x-axis: right -->
  <line x1="240" y1="180" x2="390" y2="130" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- y-axis: right-down -->
  <line x1="240" y1="180" x2="390" y2="240" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- z-axis: left -->
  <line x1="240" y1="180" x2="90" y2="180" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- axis labels monospace -->
  <text x="392" y="127" font-family="monospace" font-size="13" fill="#171A20">x</text>
  <text x="392" y="245" font-family="monospace" font-size="13" fill="#171A20">y</text>
  <text x="74" y="184" font-family="monospace" font-size="13" fill="#171A20">z</text>
  <!-- Ink dots scattered -->
  <circle cx="290" cy="155" r="3" fill="#171A20"/>
  <circle cx="330" cy="140" r="3" fill="#171A20"/>
  <circle cx="310" cy="165" r="3" fill="#171A20"/>
  <circle cx="350" cy="145" r="3" fill="#171A20"/>
  <circle cx="270" cy="195" r="3" fill="#171A20"/>
  <circle cx="320" cy="210" r="3" fill="#171A20"/>
  <circle cx="355" cy="225" r="3" fill="#171A20"/>
  <!-- Sky dots scattered -->
  <circle cx="180" cy="178" r="3.5" fill="#4A90C2"/>
  <circle cx="150" cy="181" r="3.5" fill="#4A90C2"/>
  <circle cx="120" cy="179" r="3.5" fill="#4A90C2"/>
  <circle cx="160" cy="174" r="3.5" fill="#4A90C2"/>
  <circle cx="200" cy="176" r="3.5" fill="#4A90C2"/>
  <!-- character 1 (left side, pointing left toward z-axis) -->
  <g transform="translate(110 230)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <!-- pointing arm left -->
    <line x1="-13" y1="0" x2="-28" y2="-8" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- character 2 (right side, pointing toward x-axis) -->
  <g transform="translate(370 240)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <!-- pointing arm up-left toward x-axis -->
    <line x1="-13" y1="-5" x2="-28" y2="-18" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
