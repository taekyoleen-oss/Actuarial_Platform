<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 준지수분포: 빨리 죽는 가벼운 꼬리(점선) vs 길게 끌리는 두꺼운 꼬리(Sky) -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 두꺼운 꼬리 영역 강조 -->
  <path d="M 260 200 C 330 222 390 228 412 228 L 412 238 L 260 238 Z" fill="#EAF2F9"/>
  <path d="M 72 70 L 72 238 L 420 238" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 가벼운 꼬리 (점선, 빠른 소멸) -->
  <path d="M 80 90 C 130 152 180 212 240 232 C 270 237 290 238 310 238" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 6" opacity=".5"/>
  <!-- 두꺼운 꼬리 (Sky, 오래 남음) -->
  <path d="M 80 90 C 140 142 200 178 260 200 C 330 222 390 228 412 228" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <text x="82" y="64" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">F̄(x)</text>
  <text x="398" y="258" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">x →</text>
  <!-- 끝나지 않는 꼬리에 놀란 캐릭터 -->
  <g transform="translate(388 207)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-3" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-3" r="1.8" fill="#171A20"/>
    <circle cx="0" cy="5" r="2.6" fill="none" stroke="#171A20" stroke-width="2"/>
    <path d="M 17 -11 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#4A90C2"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
