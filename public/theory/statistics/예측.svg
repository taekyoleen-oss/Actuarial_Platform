<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 예측: 진전삼각형에서 미래 칸을 예측(Sky 채색)하는 준비금 산출 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 진전삼각형 격자 관측 칸 (흰 배경) -->
  <rect x="100" y="60" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="152" y="60" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="204" y="60" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="256" y="60" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="308" y="60" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="100" y="100" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="152" y="100" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="204" y="100" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="256" y="100" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="100" y="140" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="152" y="140" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="204" y="140" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="100" y="180" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="152" y="180" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <rect x="100" y="220" width="52" height="40" fill="#FFFFFF" stroke="#171A20" stroke-width="2"/>
  <!-- 미래 예측 칸 (Sky Pastel + Sky 테두리) -->
  <rect x="308" y="100" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="256" y="140" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="308" y="140" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="204" y="180" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="256" y="180" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="308" y="180" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="152" y="220" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="204" y="220" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="256" y="220" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="308" y="220" width="52" height="40" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <!-- 캐릭터 -->
  <g transform="translate(396 110)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <text x="374" y="72" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">&#x176;</text>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
