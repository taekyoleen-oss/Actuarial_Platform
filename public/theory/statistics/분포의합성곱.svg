<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — TITLE: 분포의합성곱 MOTIF: 두 좁은 분포 합성곱→넓은 분포 -->
  <defs><pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern></defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>

  <!-- x-axis -->
  <line x1="30" y1="230" x2="450" y2="230" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>

  <!-- Left narrow bell (X distribution) centered at x=100 -->
  <path d="M 60 230 C 70 229 80 220 90 195 C 95 180 100 170 105 165 C 110 170 115 180 120 195 C 130 220 140 229 150 230" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "+" symbol between left bells -->
  <text x="163" y="210" font-family="monospace" font-size="20" fill="#171A20" text-anchor="middle">+</text>

  <!-- Right narrow bell (Y distribution) centered at x=225 -->
  <path d="M 185 230 C 195 229 205 220 215 195 C 220 180 225 170 230 165 C 235 170 240 180 245 195 C 255 220 265 229 275 230" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sky arrows pointing right toward center-right -->
  <line x1="285" y1="200" x2="318" y2="200" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
  <polygon points="318,194 330,200 318,206" fill="#4A90C2"/>

  <!-- "*" convolution operator label -->
  <text x="350" y="165" font-family="monospace" font-size="13" fill="#4A90C2" text-anchor="middle">*</text>

  <!-- Wide center-right bell (S = X+Y distribution) centered at x=380, wider -->
  <!-- Sky Pastel fill -->
  <path d="M 315 230 C 330 228 345 215 358 195 C 366 180 373 165 380 155 C 387 165 394 180 402 195 C 415 215 430 228 445 230 Z" fill="#EAF2F9"/>
  <!-- Sky stroke -->
  <path d="M 315 230 C 330 228 345 215 358 195 C 366 180 373 165 380 155 C 387 165 394 180 402 195 C 415 215 430 228 445 230" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S=X+Y label -->
  <text x="365" y="242" font-family="monospace" font-size="12" fill="#171A20" text-anchor="middle">S=X+Y</text>

  <!-- character atop the wide center-right bell (~x=380, y=143) -->
  <g transform="translate(380 143)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- tkLeen sky pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
