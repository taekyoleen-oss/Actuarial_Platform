<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 커플링: 두 확률 체인이 한 점에서 만나(커플) 이후 같이 움직임 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 시간 축 -->
  <path d="M 70 250 L 420 250" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="416,244 428,250 416,256" fill="#171A20"/>
  <text x="396" y="270" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t</text>
  <!-- 체인 X (위에서 접근) — 커플 이전 -->
  <path d="M 80 110 Q 130 120 180 140 Q 210 150 240 165" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".6"/>
  <!-- 체인 Y (아래서 접근) — 커플 이전 -->
  <path d="M 80 218 Q 130 210 180 195 Q 210 185 240 165" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".6"/>
  <!-- 커플 지점 -->
  <circle cx="240" cy="165" r="10" fill="#4A90C2" stroke="#FAFAF7" stroke-width="2.5"/>
  <!-- 커플 이후 공통 경로 -->
  <path d="M 240 165 Q 290 140 340 130 Q 380 122 420 118" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- X/Y 라벨 -->
  <text x="60" y="108" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" opacity=".6">X</text>
  <text x="60" y="222" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" opacity=".6">Y</text>
  <!-- T_c 라벨 -->
  <text x="234" y="148" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">T_c</text>
  <!-- 캐릭터 1 (X 체인 위) -->
  <g transform="translate(140 98)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 캐릭터 2 (Y 체인 아래, 파스텔 얼굴) -->
  <g transform="translate(140 232)">
    <circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
