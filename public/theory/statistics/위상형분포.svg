<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위상형분포: 마르코프 생성행렬 T가 만드는 혼합 위상 밀도 곡선 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="80" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="60" x2="80" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="426" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
  <text x="58" y="56" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">f(t)</text>
  <!-- 밀도 곡선 (Sky) -->
  <path d="M 80 240 L 100 100 C 130 70 180 110 240 160 C 300 200 370 230 400 238" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <path d="M 80 240 L 100 100 C 130 70 180 110 240 160 C 300 200 370 230 400 238 L 400 240 Z" fill="#EAF2F9" fill-opacity=".7"/>
  <!-- T 행렬 박스 -->
  <rect x="285" y="75" width="110" height="55" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5" rx="4"/>
  <text x="308" y="98" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".7">T matrix</text>
  <text x="292" y="117" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#171A20" fill-opacity=".55">f=&#x3c0;e^{Tt}(-T1)</text>
  <!-- 캐릭터 -->
  <g transform="translate(200 90)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
