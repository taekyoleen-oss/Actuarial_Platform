<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 척도분포: cX로 늘려도 같은 분포족 — 작은 곡선이 큰 곡선으로 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 70 250 L 420 250 M 70 250 L 70 70" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 원래 분포 (Ink, 좁고 높음) -->
  <path d="M 84 248 C 102 140 126 118 144 124 C 168 134 188 220 212 244" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 척도 c배 분포 (Sky, 넓고 낮음 — 같은 모양) -->
  <path d="M 96 249 C 140 184 186 170 226 174 C 282 182 330 232 396 246 L 396 250 L 96 250 Z" fill="#EAF2F9"/>
  <path d="M 96 249 C 140 184 186 170 226 174 C 282 182 330 232 396 246" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 변환 화살표 -->
  <path d="M 170 108 C 220 84 268 92 300 124" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 7" opacity=".55"/>
  <path d="M 300 100 L 302 126 L 278 118" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity=".55"/>
  <text x="222" y="74" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">Y=cX</text>
  <text x="330" y="160" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">θ*=cθ</text>
  <!-- 늘어난 곡선 위의 캐릭터 -->
  <g transform="translate(258 150)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
