<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 자료분석을위한회귀모형: 산점도와 최소제곱 회귀직선 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="60" y1="250" x2="430" y2="250" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="50" x2="60" y2="250" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="436" y="254" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">x</text>
  <text x="42" y="48" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">y</text>
  <!-- 회귀직선 (Sky) -->
  <line x1="80" y1="220" x2="400" y2="80" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 산점도 -->
  <circle cx="110" cy="205" r="5.5" fill="#171A20" fill-opacity=".5"/>
  <circle cx="155" cy="190" r="5.5" fill="#171A20" fill-opacity=".5"/>
  <circle cx="185" cy="175" r="5.5" fill="#171A20" fill-opacity=".5"/>
  <circle cx="215" cy="162" r="5.5" fill="#171A20" fill-opacity=".5"/>
  <circle cx="250" cy="145" r="5.5" fill="#171A20" fill-opacity=".5"/>
  <circle cx="280" cy="135" r="5.5" fill="#171A20" fill-opacity=".5"/>
  <circle cx="320" cy="118" r="5.5" fill="#171A20" fill-opacity=".5"/>
  <circle cx="360" cy="106" r="5.5" fill="#171A20" fill-opacity=".5"/>
  <!-- 잔차 점선 -->
  <line x1="155" y1="182" x2="155" y2="190" stroke="#171A20" stroke-width="1.5" stroke-dasharray="3 3" opacity=".5"/>
  <line x1="250" y1="137" x2="250" y2="145" stroke="#171A20" stroke-width="1.5" stroke-dasharray="3 3" opacity=".5"/>
  <line x1="320" y1="118" x2="320" y2="126" stroke="#171A20" stroke-width="1.5" stroke-dasharray="3 3" opacity=".5"/>
  <!-- 수식 라벨 -->
  <text x="330" y="78" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">&#x177;=&#x3b2;&#x2080;+&#x3b2;&#x2081;x</text>
  <!-- 캐릭터 -->
  <g transform="translate(110 130)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
