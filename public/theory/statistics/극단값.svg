<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 극단값: 평범한 클레임들 사이에 솟은 단 하나의 최댓값을 올려다보는 캐릭터 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 바닥축 -->
  <path d="M 60 252 L 420 252" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 평범한 관측 막대들 (Ink) -->
  <g stroke="#171A20" stroke-width="3" stroke-linecap="round">
    <path d="M 95 252 L 95 216"/><path d="M 130 252 L 130 226"/><path d="M 165 252 L 165 210"/>
    <path d="M 200 252 L 200 222"/><path d="M 235 252 L 235 214"/><path d="M 305 252 L 305 220"/>
    <path d="M 340 252 L 340 208"/><path d="M 375 252 L 375 224"/>
  </g>
  <!-- 최댓값 막대 (Sky) -->
  <path d="M 270 252 L 270 76" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <circle cx="270" cy="70" r="6" fill="#4A90C2"/>
  <text x="284" y="74" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">Xn,n</text>
  <!-- 올려다보는 캐릭터 (땀방울) -->
  <g transform="translate(228 230)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-2.5" cy="-4" r="1.8" fill="#171A20"/><circle cx="6" cy="-4" r="1.8" fill="#171A20"/>
    <path d="M -3 5 Q 1.5 7.5 6 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 17 -11 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#4A90C2"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
