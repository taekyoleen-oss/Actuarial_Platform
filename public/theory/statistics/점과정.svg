<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 점 과정: 시간선 위에 무작위로 찍히는 사건의 점들 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 시간선 -->
  <line x1="76" y1="180" x2="412" y2="180" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <path d="M 412 174 L 424 180 L 412 186 Z" fill="#171A20"/>
  <!-- 사건 점들 (무작위 간격, 군집 포함) -->
  <g fill="#4A90C2" stroke="#171A20" stroke-width="2.5">
    <circle cx="116" cy="180" r="7"/>
    <circle cx="170" cy="180" r="7"/>
    <circle cx="236" cy="180" r="7"/>
    <circle cx="258" cy="180" r="7"/>
    <circle cx="330" cy="180" r="7"/>
    <circle cx="382" cy="180" r="7"/>
  </g>
  <!-- 도착 표시 틱 -->
  <g stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".4">
    <line x1="116" y1="166" x2="116" y2="152"/>
    <line x1="170" y1="166" x2="170" y2="152"/>
    <line x1="236" y1="166" x2="236" y2="152"/>
    <line x1="258" y1="166" x2="258" y2="152"/>
    <line x1="330" y1="166" x2="330" y2="152"/>
    <line x1="382" y1="166" x2="382" y2="152"/>
  </g>
  <text x="106" y="212" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t₁</text>
  <text x="160" y="212" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t₂</text>
  <text x="398" y="212" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t →</text>
  <!-- 다음 점을 기다리는 캐릭터 -->
  <g transform="translate(86 138)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
