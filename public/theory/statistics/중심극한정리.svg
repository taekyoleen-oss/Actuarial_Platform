<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 중심극한정리: 다양한 분포 표본들이 n→∞에서 정규곡선으로 수렴 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <path d="M 78 60 L 78 248 L 426 248" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 정규 벨 곡선 (Sky) -->
  <path d="M 100 242 Q 160 240 200 200 Q 230 160 252 90 Q 274 160 296 200 Q 336 240 380 242" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 곡선 아래 면 -->
  <path d="M 100 242 Q 160 240 200 200 Q 230 160 252 90 Q 274 160 296 200 Q 336 240 380 242 L 380 248 L 100 248 Z" fill="#EAF2F9" fill-opacity=".6"/>
  <!-- 좌측 작은 이상분포 암시(점선 스텝) -->
  <path d="M 92 242 L 92 195 L 115 195 L 115 215 L 138 215 L 138 190 L 160 190 L 160 215 L 180 215 L 180 240" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round" opacity=".35"/>
  <!-- 화살표 수렴 암시 -->
  <path d="M 178 200 L 200 200" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".45"/>
  <polygon points="198,195 210,200 198,205" fill="#171A20" opacity=".45"/>
  <!-- n→∞ 라벨 -->
  <text x="84" y="56" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">f(x̄)</text>
  <text x="392" y="268" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">x̄</text>
  <text x="252" y="76" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">n→∞</text>
  <!-- 캐릭터 (곡선 꼭대기 근처) -->
  <g transform="translate(330 168)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
