<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 조합론: 서로 다른 원소들을 순서 있게 나열하는 순열 도해 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 세 개의 원소 원 (Ink) -->
  <circle cx="140" cy="150" r="34" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <circle cx="240" cy="150" r="34" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <circle cx="340" cy="150" r="34" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <!-- 원소 라벨 -->
  <text x="140" y="156" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="18" fill="#171A20" opacity=".7">A</text>
  <text x="240" y="156" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="18" fill="#4A90C2">B</text>
  <text x="340" y="156" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="18" fill="#171A20" opacity=".7">C</text>
  <!-- 화살표 A→B -->
  <path d="M 176 150 L 202 150" fill="none" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
  <polygon points="202,144 214,150 202,156" fill="#4A90C2"/>
  <!-- 화살표 B→C -->
  <path d="M 276 150 L 302 150" fill="none" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
  <polygon points="302,144 314,150 302,156" fill="#4A90C2"/>
  <!-- 수식 라벨 -->
  <text x="240" y="218" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" opacity=".55">n! / (n-r)!</text>
  <!-- 캐릭터 (위 왼편) -->
  <g transform="translate(140 82)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
