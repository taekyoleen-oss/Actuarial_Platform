<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 혼합분포: 두 성분 분포(작은 봉우리 둘)가 가중 합쳐져 하나의 혼합 곡선 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <path d="M 70 58 L 70 248 L 430 248" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 성분 1 (점선, 작은 봉우리) -->
  <path d="M 90 244 Q 140 240 170 180 Q 190 130 210 180 Q 230 220 270 242" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round" opacity=".4"/>
  <!-- 성분 2 (점선, 오른쪽 봉우리) -->
  <path d="M 220 244 Q 260 238 290 170 Q 310 120 330 170 Q 350 220 380 244" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round" opacity=".4"/>
  <!-- 혼합 곡선 (Sky, 두 봉우리 합) -->
  <path d="M 90 244 Q 140 240 170 195 Q 195 148 210 175 Q 230 210 270 185 Q 300 160 320 175 Q 350 200 380 235 Q 400 242 420 244" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 면 -->
  <path d="M 90 244 Q 140 240 170 195 Q 195 148 210 175 Q 230 210 270 185 Q 300 160 320 175 Q 350 200 380 235 Q 400 242 420 244 L 420 248 L 90 248 Z" fill="#EAF2F9" fill-opacity=".55"/>
  <!-- 라벨 -->
  <text x="76" y="54" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">f(x)</text>
  <text x="152" y="170" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".45">p·f₁</text>
  <text x="290" y="148" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".45">(1-p)·f₂</text>
  <!-- 캐릭터 -->
  <g transform="translate(370 172)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
