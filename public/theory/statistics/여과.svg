<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 여과: 시간이 흐를수록 커지는 정보(σ-대수) 탑 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 시간 축 -->
  <line x1="60" y1="250" x2="420" y2="250" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="426" y="254" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
  <!-- F0 작은 사각형 -->
  <rect x="80" y="210" width="40" height="40" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
  <text x="86" y="234" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">&#x2131;&#x2080;</text>
  <!-- Ft 중간 사각형 -->
  <rect x="180" y="180" width="70" height="70" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <text x="196" y="218" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".55">&#x2131;&#x209c;</text>
  <!-- FT 큰 사각형 (Sky 테두리) -->
  <rect x="300" y="140" width="100" height="110" fill="#EAF2F9" stroke="#4A90C2" stroke-width="5"/>
  <text x="328" y="198" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">&#x2131;_T</text>
  <!-- 화살표 -->
  <line x1="122" y1="230" x2="178" y2="220" stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".6"/>
  <line x1="252" y1="215" x2="298" y2="200" stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".6"/>
  <!-- 캐릭터 -->
  <g transform="translate(110 160)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
