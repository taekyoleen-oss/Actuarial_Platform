<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 안정성: 모수 섭동에도 출력이 좁은 띠 안에 머무르는 안정 모형 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="60" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="60" y2="240" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <text x="426" y="244" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
  <!-- 안정 띠 (Sky Pastel) -->
  <path d="M 80 145 C 180 135 280 145 400 140 L 400 165 C 280 168 180 158 80 168 Z" fill="#EAF2F9"/>
  <!-- 기준 출력 곡선 (Sky) -->
  <path d="M 80 155 C 180 145 280 155 400 150" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 섭동 출력 (Ink 점선) -->
  <path d="M 80 148 C 180 138 280 150 400 143" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="6 5" opacity=".45"/>
  <path d="M 80 163 C 180 155 280 162 400 158" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="6 5" opacity=".45"/>
  <!-- 라벨 -->
  <text x="180" y="122" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">&#x3b4;&#x3b8; &#x2192; &#x3b4;f(&#x3b8;) small</text>
  <!-- 캐릭터 -->
  <g transform="translate(370 100)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
