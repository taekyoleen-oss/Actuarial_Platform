<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 일반화선형모형: 직선이 안 맞는 산점도를 로그링크의 지수 곡선이 통과한다 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 70 250 L 420 250 M 70 250 L 70 60" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 분산이 커지는 산점 (평균에서 멀어질수록 흩어짐) -->
  <g fill="#171A20">
    <circle cx="105" cy="226" r="4"/><circle cx="135" cy="218" r="4"/><circle cx="165" cy="222" r="4"/>
    <circle cx="195" cy="204" r="4"/><circle cx="225" cy="212" r="4"/><circle cx="255" cy="186" r="4"/>
    <circle cx="285" cy="196" r="4"/><circle cx="310" cy="156" r="4"/><circle cx="335" cy="176" r="4"/>
    <circle cx="355" cy="118" r="4"/><circle cx="380" cy="148" r="4"/><circle cx="395" cy="96" r="4"/>
  </g>
  <!-- 보통 회귀 직선(점선, 안 맞음) -->
  <path d="M 90 238 L 410 154" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="7 7" opacity=".4"/>
  <!-- 로그링크 지수 곡선 (Sky) -->
  <path d="M 90 234 C 200 222 300 196 410 100" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <text x="306" y="78" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">g(μ)=xᵀβ</text>
  <!-- 곡선을 타는 캐릭터 -->
  <g transform="translate(228 196)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
