<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위험통계: 손실분포의 나쁜 쪽 꼬리를 가르는 VaR 선 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 70 250 L 420 250 M 70 250 L 70 70" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 꼬리 영역 (Sky Pastel) -->
  <path d="M 318 197 C 345 220 375 238 408 245 L 408 250 L 318 250 Z" fill="#EAF2F9" stroke="#4A90C2" stroke-width="2"/>
  <!-- 손실 밀도곡선 (Ink) -->
  <path d="M 90 240 C 130 120 170 96 205 102 C 255 112 290 178 318 197 C 345 220 375 238 408 245" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- VaR 수직선 (Sky) -->
  <path d="M 318 250 L 318 130" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <text x="296" y="114" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">VaR99.5</text>
  <text x="352" y="226" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">0.5%</text>
  <!-- 꼬리를 가리키는 캐릭터 -->
  <g transform="translate(250 156)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-2.5" cy="-3" r="1.8" fill="#171A20"/><circle cx="6" cy="-3" r="1.8" fill="#171A20"/>
    <path d="M -4 5 L 5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
