<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 중도절단분포: 관측 타임라인 위에 절단 지점(C)에서 끊기는 생존 관측선들 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 시간 축 -->
  <path d="M 80 250 L 420 250" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <polygon points="416,244 428,250 416,256" fill="#171A20"/>
  <text x="388" y="270" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">t</text>
  <!-- 절단 수직선 -->
  <path d="M 300 90 L 300 260" fill="none" stroke="#4A90C2" stroke-width="3" stroke-dasharray="7 5" stroke-linecap="round"/>
  <text x="304" y="84" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#4A90C2" opacity=".85">C</text>
  <!-- 관측선 1: 완전 (사건 발생, X표) -->
  <path d="M 80 160 L 240 160" fill="none" stroke="#171A20" stroke-width="3.5" stroke-linecap="round"/>
  <text x="248" y="165" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#171A20" opacity=".75">×</text>
  <!-- 관측선 2: 절단 (C에서 끊김, 원 표시) -->
  <path d="M 80 200 L 300 200" fill="none" stroke="#171A20" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="300" cy="200" r="6" fill="#EAF2F9" stroke="#4A90C2" stroke-width="2.5"/>
  <!-- 관측선 3: 절단 (더 이르게) -->
  <path d="M 80 126 L 180 126" fill="none" stroke="#171A20" stroke-width="3.5" stroke-linecap="round"/>
  <text x="188" y="131" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#171A20" opacity=".75">×</text>
  <!-- 캐릭터 관찰자 -->
  <g transform="translate(360 190)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
