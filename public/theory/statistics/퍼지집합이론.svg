<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 퍼지집합이론: 0/1 계단(고전 집합) 대신 비탈로 오르는 소속함수, 경계 위의 캐릭터 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 + 1·0 안내선 -->
  <path d="M 70 250 L 420 250 M 70 250 L 70 70" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 70 100 L 414 100" stroke="#171A20" stroke-width="2" stroke-dasharray="6 7" opacity=".3"/>
  <text x="48" y="105" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">1</text>
  <text x="48" y="255" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">0</text>
  <!-- 고전 집합의 0/1 계단 (Ink 점선) -->
  <path d="M 80 250 L 230 250 L 230 100 L 410 100" fill="none" stroke="#171A20" stroke-width="2.5" stroke-dasharray="7 7" opacity=".45" stroke-linejoin="round"/>
  <!-- 퍼지 소속함수 사다리꼴 비탈 (Sky) + 비탈 아래 면 -->
  <path d="M 150 250 L 290 100 L 410 100 L 410 250 Z" fill="#EAF2F9" opacity=".8"/>
  <path d="M 80 250 L 150 250 L 290 100 L 410 100" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="318" y="86" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">μ(x)</text>
  <!-- 부분 소속(0.5 지점) 경계 위의 캐릭터 -->
  <g transform="translate(220 158)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M 2.8 -2.5 L 6.2 -2.5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <text x="196" y="196" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">0.5</text>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
