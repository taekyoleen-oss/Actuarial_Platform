<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 계절성: 반복 사인 파형 -->
  <defs><pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern></defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="50" y1="40" x2="50" y2="240" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="160" x2="440" y2="160" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <!-- 파형 아래 Sky Pastel 채움 (사인 곡선 아래 기준선까지) -->
  <path d="M 60 160 C 90 160 105 80 130 80 C 155 80 170 160 200 160 C 230 160 245 80 270 80 C 295 80 310 160 340 160 C 370 160 385 80 410 80 C 420 80 430 100 430 160 L 430 160 L 60 160 Z"
        fill="#EAF2F9"/>
  <!-- 사인 파형 (Sky) -->
  <path d="M 60 160 C 90 160 105 80 130 80 C 155 80 170 160 200 160 C 230 160 245 80 270 80 C 295 80 310 160 340 160 C 370 160 385 80 410 80 C 425 80 435 120 440 160"
        fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 캐릭터: 첫 번째 파 정점 위 (x=130, y=80 → 캐릭터 y=55) -->
  <g transform="translate(240 55)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen sky pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
