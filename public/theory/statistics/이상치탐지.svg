<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 이상치탐지: 군집에서 벗어난 이상치 한 점을 발견하는 장면 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="60" y1="250" x2="420" y2="250" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="50" x2="60" y2="250" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 정상 군집 점들 -->
  <circle cx="160" cy="200" r="6" fill="#171A20" fill-opacity=".4"/>
  <circle cx="185" cy="190" r="6" fill="#171A20" fill-opacity=".4"/>
  <circle cx="175" cy="215" r="6" fill="#171A20" fill-opacity=".4"/>
  <circle cx="200" cy="205" r="6" fill="#171A20" fill-opacity=".4"/>
  <circle cx="210" cy="185" r="6" fill="#171A20" fill-opacity=".4"/>
  <circle cx="220" cy="210" r="6" fill="#171A20" fill-opacity=".4"/>
  <circle cx="240" cy="195" r="6" fill="#171A20" fill-opacity=".4"/>
  <circle cx="255" cy="180" r="6" fill="#171A20" fill-opacity=".4"/>
  <circle cx="230" cy="222" r="6" fill="#171A20" fill-opacity=".4"/>
  <!-- 군집 타원 경계 -->
  <ellipse cx="205" cy="200" rx="65" ry="42" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="6 4" opacity=".4"/>
  <!-- 이상치 (Sky, 강조) -->
  <circle cx="358" cy="88" r="10" fill="#4A90C2" stroke="#171A20" stroke-width="2.5"/>
  <!-- 포인팅 화살표 -->
  <path d="M 308 143 L 352 96" stroke="#4A90C2" stroke-width="4" stroke-linecap="round"/>
  <polygon points="352,96 338,104 347,116" fill="#4A90C2"/>
  <text x="368" y="83" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".6">outlier</text>
  <!-- 캐릭터 (놀란 표정) -->
  <g transform="translate(308 170)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="0" cy="5" r="3.5" fill="none" stroke="#171A20" stroke-width="2"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
