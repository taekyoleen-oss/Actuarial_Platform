<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 가우스과정: 평활 공분산 곡선 -->
  <defs><pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern></defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <line x1="60" y1="40" x2="60" y2="240" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="240" x2="420" y2="240" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <!-- GP 신뢰띠 (Sky Pastel 채움) -->
  <path d="M 80 200 C 130 180 160 110 200 120 C 240 130 280 90 320 100 C 360 110 390 130 410 145
           L 410 185 C 390 170 360 150 320 140 C 280 130 240 170 200 160 C 160 150 130 220 80 240 Z"
        fill="#EAF2F9"/>
  <!-- GP 평균 곡선 (Sky) -->
  <path d="M 80 220 C 130 200 160 130 200 140 C 240 150 280 110 320 120 C 360 130 390 150 410 165"
        fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- f(x) 라벨 (monospace) -->
  <text x="380" y="100" font-family="monospace" font-size="18" fill="#171A20" font-weight="bold">f(x)</text>
  <!-- 캐릭터: GP 곡선 정점 부근 (x=320, y=120 → 캐릭터 위치 y=95) -->
  <g transform="translate(320 95)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen sky pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
