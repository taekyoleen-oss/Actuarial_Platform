<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 집합위험 모형: 빈도 N과 심도 X가 합성되어 총손실 S가 되는 구조 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- N 박스: 클레임 건수(점들) -->
  <rect x="92" y="84" width="100" height="74" rx="8" fill="#EEF4FF" stroke="#171A20" stroke-width="2.5"/>
  <text x="102" y="102" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">N</text>
  <g fill="#171A20">
    <circle cx="126" cy="118" r="3"/><circle cx="152" cy="108" r="3"/><circle cx="172" cy="124" r="3"/>
    <circle cx="118" cy="140" r="3"/><circle cx="146" cy="136" r="3"/><circle cx="170" cy="146" r="3"/>
  </g>
  <!-- X 박스: 클레임 크기(막대들) -->
  <rect x="92" y="172" width="100" height="74" rx="8" fill="#FFF7ED" stroke="#171A20" stroke-width="2.5"/>
  <text x="102" y="190" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">X</text>
  <g fill="#FFFFFF" stroke="#171A20" stroke-width="2">
    <rect x="116" y="216" width="13" height="20"/>
    <rect x="139" y="202" width="13" height="34"/>
    <rect x="162" y="210" width="13" height="26"/>
  </g>
  <!-- 합성 화살표 -->
  <g fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round">
    <path d="M 196 121 C 244 121 256 150 284 160"/>
    <path d="M 196 209 C 244 209 256 180 284 170"/>
    <path d="M 292 165 L 316 165"/>
  </g>
  <path d="M 318 159 L 330 165 L 318 171 Z" fill="#171A20"/>
  <!-- S 박스 (Sky) -->
  <rect x="336" y="128" width="104" height="74" rx="8" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
  <text x="388" y="170" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#FFFFFF">S = ΣX</text>
  <!-- 관찰 캐릭터 -->
  <g transform="translate(388 240)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
