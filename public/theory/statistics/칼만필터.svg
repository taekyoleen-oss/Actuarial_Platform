<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 칼만필터: 잡음 섞인 관측을 예측·갱신으로 평활한 상태추정 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 축 -->
<line x1="72" y1="232" x2="408" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="72" y1="232" x2="72" y2="68" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 잡음 관측(지그재그 점) -->
<g fill="#171A20" fill-opacity=".45"><circle cx="104" cy="170" r="3.5"/><circle cx="140" cy="138" r="3.5"/><circle cx="176" cy="176" r="3.5"/><circle cx="212" cy="126" r="3.5"/><circle cx="248" cy="150" r="3.5"/><circle cx="284" cy="110" r="3.5"/><circle cx="320" cy="134" r="3.5"/><circle cx="356" cy="96" r="3.5"/></g>
<!-- 필터된 상태추정(Sky 평활선) -->
<path d="M 104 168 Q 176 150 212 140 T 320 112 T 372 92" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<text x="120" y="120" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">x̂</text>
<!-- 따라가며 추정하는 사람 -->
<g transform="translate(384 84)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
