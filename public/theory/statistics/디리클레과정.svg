<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — TITLE: 디리클레과정 MOTIF: 중국 음식점 과정 — 세 테이블에 캐릭터들이 앉고 새 손님이 빈 테이블로 향하는 장면 -->
  <defs><pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern></defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- G₀ label monospace -->
  <text x="210" y="55" font-family="monospace" font-size="16" fill="#171A20">G&#x2080;</text>
  <!-- table 1 (x=120, y=160, r=22) -->
  <circle cx="120" cy="160" r="22" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <!-- table 2 (x=240, y=160, r=22) -->
  <circle cx="240" cy="160" r="22" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <!-- table 3 dashed (x=360, y=160, r=16) -->
  <circle cx="360" cy="160" r="16" fill="#FAFAF7" stroke="#4A90C2" stroke-width="3" stroke-dasharray="6 4"/>
  <!-- character at table1 seat 1 -->
  <g transform="translate(108 148)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- character at table1 seat 2 -->
  <g transform="translate(132 148)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- character at table2 -->
  <g transform="translate(240 147)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- new guest character walking toward table3 -->
  <g transform="translate(300 220)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- arrow from new guest toward table3 -->
  <line x1="315" y1="210" x2="344" y2="177" stroke="#4A90C2" stroke-width="3" stroke-linecap="round"/>
  <polygon points="344,177 334,182 340,170" fill="#4A90C2"/>
  <!-- pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
