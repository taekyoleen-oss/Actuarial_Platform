<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 이산모수분포: 0,1,2,…에만 확률이 놓이는 계수분포의 막대들 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 70 250 L 420 250 M 70 250 L 70 70" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- pmf 롤리팝 (Sky 줄기 + Sky 원, 최빈값 강조) -->
  <g stroke="#4A90C2" stroke-width="5" stroke-linecap="round">
    <path d="M 110 250 L 110 168"/><path d="M 165 250 L 165 112"/><path d="M 220 250 L 220 136"/>
    <path d="M 275 250 L 275 184"/><path d="M 330 250 L 330 216"/><path d="M 385 250 L 385 236"/>
  </g>
  <g fill="#4A90C2">
    <circle cx="110" cy="162" r="6"/><circle cx="165" cy="106" r="6"/><circle cx="220" cy="130" r="6"/>
    <circle cx="275" cy="178" r="6"/><circle cx="330" cy="210" r="6"/><circle cx="385" cy="230" r="6"/>
  </g>
  <!-- x축 눈금 라벨 -->
  <g font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55" text-anchor="middle">
    <text x="110" y="270">0</text><text x="165" y="270">1</text><text x="220" y="270">2</text>
    <text x="275" y="270">3</text><text x="330" y="270">4</text><text x="385" y="270">5</text>
  </g>
  <text x="84" y="88" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">pk</text>
  <!-- 건수를 세는 캐릭터 -->
  <g transform="translate(370 124)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
