<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위험의 순서화: 위험들을 크기 순서로 줄 세우기 (X₁ ≼ X₂ ≼ X₃) -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <line x1="90" y1="238" x2="400" y2="238" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 작은 위험 -->
  <circle cx="140" cy="222" r="16" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/>
  <circle cx="135" cy="219" r="1.6" fill="#171A20"/><circle cx="145" cy="219" r="1.6" fill="#171A20"/>
  <path d="M 136 226 Q 140 229.5 144 226" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <!-- 중간 위험 -->
  <circle cx="240" cy="214" r="24" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/>
  <circle cx="233" cy="210" r="2" fill="#171A20"/><circle cx="247" cy="210" r="2" fill="#171A20"/>
  <path d="M 234 220 L 246 220" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  <!-- 큰 위험 (Sky) -->
  <circle cx="352" cy="204" r="34" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
  <circle cx="342" cy="198" r="2.5" fill="#FFFFFF"/><circle cx="362" cy="198" r="2.5" fill="#FFFFFF"/>
  <path d="M 343 212 Q 352 206 361 212" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 순서 기호 -->
  <text x="178" y="222" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#171A20" opacity=".55">≼</text>
  <text x="288" y="214" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#171A20" opacity=".55">≼</text>
  <text x="120" y="262" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">X₁</text>
  <text x="226" y="262" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">X₂</text>
  <text x="340" y="262" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">X₃</text>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
