<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — TITLE: 과소·과대산포 MOTIF: 포아송 기준선과 위아래로 벌어진·수렴한 세 종형 분포 -->
  <defs><pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern></defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- coordinate axes -->
  <line x1="80" y1="215" x2="400" y2="215" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <line x1="80" y1="215" x2="80" y2="60" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <!-- overdispersed bell (wide flat, Sky Pastel fill + Sky stroke) -->
  <path d="M 100 213 Q 140 212 160 205 Q 180 196 200 188 Q 220 180 240 178 Q 260 180 280 188 Q 300 196 320 205 Q 340 212 380 213" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Poisson reference bell (medium, Ink dashed) -->
  <path d="M 140 213 Q 165 212 185 200 Q 205 182 240 155 Q 275 182 295 200 Q 315 212 340 213" fill="none" stroke="#171A20" stroke-width="2.5" stroke-dasharray="7 4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- overdispersed fill close to baseline -->
  <path d="M 140 213 Q 165 212 185 200 Q 205 182 240 155 Q 275 182 295 200 Q 315 212 340 213" fill="none"/>
  <!-- narrow tall bell (over-concentrated, Sky stroke) -->
  <path d="M 200 213 Q 215 212 225 200 Q 232 180 240 110 Q 248 180 255 200 Q 265 212 280 213" fill="#FFFFFF" stroke="#4A90C2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- label Var=μ monospace -->
  <text x="90" y="100" font-family="monospace" font-size="13" fill="#171A20">Var=μ</text>
  <!-- character with surprised wide eyes between curves -->
  <g transform="translate(370 165)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="2.2" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="2.2" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
