<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 경험분포: 관측 하나에 1/n씩 오르는 계단함수를 오르는 캐릭터 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 + 상한 1 점선 -->
  <path d="M 75 252 L 420 252 M 75 252 L 75 60" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 75 84 L 415 84" stroke="#171A20" stroke-width="2" stroke-dasharray="6 7" opacity=".35"/>
  <text x="52" y="89" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">1</text>
  <!-- ECDF 계단 (Sky) -->
  <path d="M 75 252 L 115 252 L 115 224 L 160 224 L 160 196 L 215 196 L 215 168 L 255 168 L 255 140 L 320 140 L 320 112 L 380 112 L 380 84 L 415 84" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 점프 지점의 관측 점 -->
  <g fill="#171A20">
    <circle cx="115" cy="252" r="3.5"/><circle cx="160" cy="252" r="3.5"/><circle cx="215" cy="252" r="3.5"/>
    <circle cx="255" cy="252" r="3.5"/><circle cx="320" cy="252" r="3.5"/><circle cx="380" cy="252" r="3.5"/>
  </g>
  <text x="345" y="70" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">F̂n(x)</text>
  <!-- 계단을 오르는 캐릭터 -->
  <g transform="translate(236 151)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
