<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 재표본추출: 표본 항아리에서 복원추출을 B번 반복하는 부트스트랩 순환 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 원 표본 항아리 -->
  <path d="M 100 130 L 110 232 Q 145 244 180 232 L 190 130" fill="#FFFFFF" stroke="#171A20" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 94 130 L 196 130" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <!-- 항아리 속 표본 공 -->
  <g fill="#EAF2F9" stroke="#171A20" stroke-width="2">
    <circle cx="126" cy="160" r="9"/><circle cx="152" cy="152" r="9"/><circle cx="170" cy="172" r="9"/>
    <circle cx="132" cy="192" r="9"/><circle cx="160" cy="204" r="9"/>
  </g>
  <!-- 복원추출 순환 화살표 (Sky) -->
  <path d="M 200 150 C 250 96 320 96 362 138" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <path d="M 352 116 L 364 140 L 338 138" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 348 230 C 300 268 230 262 196 222" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 7" opacity=".5"/>
  <text x="252" y="84" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">×B</text>
  <!-- 재표본 묶음 (파스텔 공 3개) -->
  <g stroke="#171A20" stroke-width="2">
    <circle cx="372" cy="172" r="9" fill="#EEF4FF"/><circle cx="396" cy="186" r="9" fill="#ECFDF5"/><circle cx="374" cy="202" r="9" fill="#FFF7ED"/>
  </g>
  <text x="356" y="232" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">θ̂*₁…θ̂*B</text>
  <!-- 추첨하는 캐릭터 -->
  <g transform="translate(248 186)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
