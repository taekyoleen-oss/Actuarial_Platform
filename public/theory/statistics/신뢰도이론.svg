<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 신뢰도이론: 개별경험과 전체평균을 Z로 가중평균 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 가중평균 막대(슬라이더) -->
<line x1="96" y1="160" x2="384" y2="160" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 왼쪽: 개별경험 X -->
<circle cx="96" cy="160" r="9" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<text x="96" y="138" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">X</text>
<!-- 오른쪽: 전체평균 μ -->
<circle cx="384" cy="160" r="9" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<text x="384" y="138" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">μ</text>
<!-- 추정치 위치(Sky, Z만큼 X쪽) -->
<circle cx="208" cy="160" r="13" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
<text x="208" y="196" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">Z·X+(1-Z)·μ</text>
<!-- 위에서 균형 잡는 사람 -->
<g transform="translate(208 120)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20" stroke="#171A20" stroke-width="2.2" stroke-linejoin="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
