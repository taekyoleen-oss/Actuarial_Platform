<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 장기기억의존성: ACF가 쌍곡선형으로 느리게 감소하는 자기상관 그래프 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <path d="M 90 60 L 90 240 L 420 240" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 빠른 감소 기준선(점선) -->
  <path d="M 90 120 Q 180 170 260 220 Q 320 235 420 238" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="6 5" stroke-linecap="round" opacity=".35"/>
  <!-- 느린 쌍곡선 ACF 곡선 (장기기억) -->
  <path d="M 90 120 Q 180 140 260 170 Q 340 195 420 210" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 곡선 아래 면 -->
  <path d="M 90 120 Q 180 140 260 170 Q 340 195 420 210 L 420 240 L 90 240 Z" fill="#EAF2F9" fill-opacity=".55"/>
  <!-- 축 라벨 -->
  <text x="96" y="56" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">ρ(k)</text>
  <text x="396" y="260" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">k</text>
  <!-- 캐릭터 — 연구원 (곡선 위) -->
  <g transform="translate(296 148)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
