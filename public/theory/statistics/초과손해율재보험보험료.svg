<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 초과손해율 재보험 보험료: 꼬리 면적 E[(S−d)+]가 보험료 동전이 된다 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <text x="120" y="84" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">π = E[(S−d)+]</text>
  <!-- 분포와 꼬리 -->
  <path d="M 80 230 C 105 140 140 118 175 130 C 215 144 240 168 264 196 L 264 238 L 80 238 Z" fill="#EAF2F9"/>
  <path d="M 264 196 C 296 214 330 224 360 228 L 360 238 L 264 238 Z" fill="#4A90C2"/>
  <path d="M 80 230 C 105 140 140 118 175 130 C 230 150 300 206 360 228" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 72 70 L 72 238 L 420 238" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="264" y1="120" x2="264" y2="238" stroke="#171A20" stroke-width="2.5" stroke-dasharray="7 6" opacity=".55"/>
  <text x="258" y="258" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">d</text>
  <!-- 꼬리 → 보험료 동전 -->
  <path d="M 322 198 C 348 178 360 162 372 150" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" opacity=".5"/>
  <path d="M 369 144 L 380 142 L 376 153 Z" fill="#171A20" opacity=".5"/>
  <circle cx="392" cy="128" r="17" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
  <text x="392" y="133" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#FFFFFF">π</text>
  <!-- 가격을 계산한 캐릭터 -->
  <g transform="translate(110 217)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
