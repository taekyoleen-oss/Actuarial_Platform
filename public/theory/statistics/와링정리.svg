<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 와링정리: n개 사건 중 정확히 r개가 일어날 확률의 포함-배제 합 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 세 원 벤 다이어그램 -->
  <circle cx="200" cy="160" r="85" fill="#EAF2F9" stroke="#171A20" stroke-width="3" opacity=".7"/>
  <circle cx="280" cy="160" r="85" fill="#EAF2F9" stroke="#171A20" stroke-width="3" opacity=".7"/>
  <circle cx="240" cy="100" r="85" fill="#EAF2F9" stroke="#171A20" stroke-width="3" opacity=".7"/>
  <!-- 중앙 교집합 (Sky) -->
  <ellipse cx="240" cy="145" rx="30" ry="22" fill="#4A90C2" fill-opacity=".35" stroke="#4A90C2" stroke-width="4"/>
  <!-- 수식 라벨 -->
  <text x="222" y="150" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".7">P[r]</text>
  <!-- 집합 라벨 -->
  <text x="138" y="195" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">A&#x2081;</text>
  <text x="316" y="195" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">A&#x2082;</text>
  <text x="234" y="62" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">A&#x2083;</text>
  <!-- 캐릭터 -->
  <g transform="translate(408 200)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
