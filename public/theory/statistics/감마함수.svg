<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 감마함수: 정수의 계승 점들을 매끄럽게 잇는 감마 곡선 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 80 250 L 420 250 M 80 250 L 80 60" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 곡선 아래 면 -->
  <path d="M 110 214 C 200 208 290 180 380 78 L 380 250 L 110 250 Z" fill="#EAF2F9"/>
  <!-- 감마 곡선 (계승 점들을 잇는 매끄러운 보간) -->
  <path d="M 110 214 C 200 208 290 180 380 78" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 정수 계승 점 -->
  <circle cx="140" cy="212" r="4" fill="#171A20"/>
  <circle cx="220" cy="201" r="4" fill="#171A20"/>
  <circle cx="300" cy="166" r="4" fill="#171A20"/>
  <circle cx="368" cy="92" r="4" fill="#171A20"/>
  <text x="392" y="70" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">Γ(α)</text>
  <text x="430" y="266" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">α</text>
  <!-- 점들 사이(비정수)를 걷는 캐릭터 -->
  <g transform="translate(260 165)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
