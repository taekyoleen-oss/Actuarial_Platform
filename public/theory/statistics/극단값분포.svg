<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 극단값분포: 검벨·프레셰·와이불 세 갈래 꼬리 — 두꺼운 꼬리(Sky)가 핵심 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 70 250 L 420 250 M 70 250 L 70 60" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 프레셰형 두꺼운 꼬리 면 -->
  <path d="M 150 250 C 170 130 200 96 226 96 C 270 96 330 180 410 222 L 410 250 Z" fill="#EAF2F9"/>
  <!-- 와이불형(유한 끝점, Ink 가는 선) -->
  <path d="M 130 250 C 150 140 180 120 205 120 C 235 120 262 190 280 250" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" opacity=".5"/>
  <!-- 검벨형(중간, Ink) -->
  <path d="M 140 250 C 160 134 192 106 218 106 C 252 106 295 210 345 244" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" opacity=".75"/>
  <!-- 프레셰형(두꺼운 꼬리, Sky) -->
  <path d="M 150 250 C 170 130 200 96 226 96 C 270 96 330 180 410 222" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <text x="376" y="206" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">γ&gt;0</text>
  <text x="84" y="76" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">GEV</text>
  <!-- 꼬리 위의 캐릭터 -->
  <g transform="translate(332 162)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
