<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 확률변수: 표본공간 ω에서 실직선 X(ω)로의 사상(함수 화살표) -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 표본공간 타원 (왼쪽) -->
  <ellipse cx="148" cy="155" rx="74" ry="100" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <text x="148" y="68" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#171A20" opacity=".65">Ω</text>
  <!-- 표본점들 -->
  <circle cx="130" cy="130" r="5" fill="#171A20" opacity=".5"/>
  <circle cx="160" cy="155" r="5" fill="#171A20" opacity=".5"/>
  <circle cx="138" cy="185" r="5" fill="#171A20" opacity=".5"/>
  <text x="90" y="132" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">ω₁</text>
  <text x="90" y="157" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".55">ω₂</text>
  <!-- 실직선 (오른쪽) -->
  <path d="M 290 155 L 430 155" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
  <polygon points="426,149 438,155 426,161" fill="#171A20"/>
  <!-- 실직선 눈금 -->
  <path d="M 320 148 L 320 162" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <path d="M 360 148 L 360 162" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <path d="M 400 148 L 400 162" fill="none" stroke="#171A20" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <text x="313" y="175" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".5">x₁</text>
  <text x="354" y="175" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" opacity=".5">x₂</text>
  <text x="290" y="143" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">ℝ</text>
  <!-- 사상 화살표 X: Ω → ℝ -->
  <path d="M 222 130 Q 256 108 306 148" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <polygon points="302,140 316,152 300,158" fill="#4A90C2"/>
  <path d="M 222 180 Q 256 202 316 160" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <polygon points="312,152 326,164 310,170" fill="#4A90C2"/>
  <!-- X 함수 라벨 -->
  <text x="238" y="100" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" opacity=".55">X(ω)</text>
  <!-- 캐릭터 -->
  <g transform="translate(148 265)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
