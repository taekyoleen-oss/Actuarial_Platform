<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 위상법: 지수분포 단계들이 연결된 마르코프 위상형 구조 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 상태 원들 -->
  <circle cx="100" cy="150" r="32" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <circle cx="220" cy="150" r="32" fill="#EAF2F9" stroke="#4A90C2" stroke-width="5"/>
  <circle cx="340" cy="150" r="32" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
  <!-- 흡수 상태 (이중원) -->
  <circle cx="420" cy="150" r="22" fill="#FFFFFF" stroke="#171A20" stroke-width="2.5"/>
  <circle cx="420" cy="150" r="14" fill="#171A20" fill-opacity=".12" stroke="#171A20" stroke-width="2"/>
  <!-- 전이 화살표 -->
  <line x1="133" y1="150" x2="183" y2="150" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="183,145 194,150 183,155" fill="#171A20"/>
  <line x1="253" y1="150" x2="303" y2="150" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="303,145 314,150 303,155" fill="#171A20"/>
  <line x1="373" y1="150" x2="396" y2="150" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="396,145 407,150 396,155" fill="#171A20"/>
  <!-- 전이율 라벨 (Sky) -->
  <text x="148" y="140" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">&#x3bb;&#x2081;</text>
  <text x="268" y="140" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">&#x3bb;&#x2082;</text>
  <text x="378" y="140" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4A90C2">&#x3bb;&#x2083;</text>
  <!-- 상태 라벨 -->
  <text x="90" y="155" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".7">S&#x2081;</text>
  <text x="210" y="155" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".7">S&#x2082;</text>
  <text x="330" y="155" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".7">S&#x2083;</text>
  <text x="411" y="155" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#171A20" fill-opacity=".6">abs</text>
  <!-- 캐릭터 -->
  <g transform="translate(220 230)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
