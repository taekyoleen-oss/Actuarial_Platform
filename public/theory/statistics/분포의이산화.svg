<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 분포의이산화: 매끄러운 밀도곡선을 폭 h의 격자 막대로 바꾸는 장면 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 70 250 L 420 250 M 70 250 L 70 70" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 이산화된 막대 (Sky Pastel 면 + Ink 윤곽) -->
  <g fill="#EAF2F9" stroke="#171A20" stroke-width="2">
    <rect x="100" y="194" width="38" height="56"/>
    <rect x="138" y="142" width="38" height="108"/>
    <rect x="176" y="118" width="38" height="132"/>
    <rect x="214" y="138" width="38" height="112"/>
    <rect x="252" y="178" width="38" height="72"/>
    <rect x="290" y="212" width="38" height="38"/>
    <rect x="328" y="232" width="38" height="18"/>
  </g>
  <!-- 원래의 연속 밀도곡선 (Sky) -->
  <path d="M 92 232 C 130 130 170 104 200 110 C 250 122 300 210 386 242" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <!-- 격자 폭 표시 h -->
  <path d="M 176 264 L 214 264" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <path d="M 176 259 L 176 269 M 214 259 L 214 269" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <text x="190" y="282" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">h</text>
  <!-- 도장 찍는 캐릭터 -->
  <g transform="translate(372 196)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
