<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 일반화이산분포: 표준 모형의 예측(점선)을 벗어나 수정된 0의 확률 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 70 250 L 420 250 M 70 250 L 70 70" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 0의 막대: 수정(영과잉) Sky, 표준 예측은 점선 윤곽 -->
  <rect x="96" y="96" width="34" height="154" fill="#EAF2F9" stroke="#4A90C2" stroke-width="3"/>
  <rect x="96" y="158" width="34" height="92" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="6 6" opacity=".5"/>
  <!-- 1 이상의 막대 (Ink 윤곽) -->
  <g fill="#FFFFFF" stroke="#171A20" stroke-width="2.5">
    <rect x="166" y="150" width="34" height="100"/>
    <rect x="236" y="178" width="34" height="72"/>
    <rect x="306" y="206" width="34" height="44"/>
    <rect x="376" y="228" width="34" height="22"/>
  </g>
  <!-- x축 라벨 -->
  <g font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55" text-anchor="middle">
    <text x="113" y="270">0</text><text x="183" y="270">1</text><text x="253" y="270">2</text>
    <text x="323" y="270">3</text><text x="393" y="270">4</text>
  </g>
  <text x="86" y="84" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">p₀ᴹ</text>
  <!-- 0의 막대를 살피는 캐릭터 -->
  <g transform="translate(206 110)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-6" cy="-3" r="1.8" fill="#171A20"/><circle cx="2.5" cy="-3" r="1.8" fill="#171A20"/>
    <path d="M -5.5 5 L 3.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
