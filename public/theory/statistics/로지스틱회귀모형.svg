<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — TITLE: 로지스틱회귀모형 MOTIF: S자형 로지스틱 함수 곡선 -->
  <defs><pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern></defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>

  <!-- x-axis -->
  <line x1="60" y1="220" x2="420" y2="220" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
  <!-- y-axis -->
  <line x1="80" y1="240" x2="80" y2="60" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>

  <!-- Sky Pastel fill under S-curve above 0.5 midline (approx upper half of curve) -->
  <path d="M 80 220 C 100 220 130 218 160 210 C 190 200 210 185 240 150 C 270 115 290 95 320 82 C 350 72 380 68 420 67 L 420 220 Z" fill="#EAF2F9"/>

  <!-- S-curve logistic function: rises from near 220 (p≈0) to near 67 (p≈1) through midpoint at x=240,y=150 -->
  <path d="M 60 222 C 80 221 110 218 140 210 C 170 200 205 185 240 150 C 275 115 310 95 340 80 C 370 70 395 67 430 66" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 0.5 threshold dashed line -->
  <line x1="80" y1="150" x2="240" y2="150" stroke="#171A20" stroke-width="1.2" stroke-dasharray="4,4"/>
  <line x1="240" y1="150" x2="240" y2="220" stroke="#171A20" stroke-width="1.2" stroke-dasharray="4,4"/>

  <!-- p(x) label -->
  <text x="90" y="75" font-family="monospace" font-size="14" fill="#171A20">p(x)</text>

  <!-- 1 label on y-axis -->
  <text x="60" y="70" font-family="monospace" font-size="11" fill="#171A20" text-anchor="end">1</text>
  <!-- 0.5 label -->
  <text x="60" y="154" font-family="monospace" font-size="11" fill="#171A20" text-anchor="end">0.5</text>
  <!-- 0 label -->
  <text x="60" y="225" font-family="monospace" font-size="11" fill="#171A20" text-anchor="end">0</text>

  <!-- character at midpoint (240, 138) — sitting on the curve at p=0.5 -->
  <g transform="translate(240 138)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/>
    <circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- tkLeen sky pixel signature -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
