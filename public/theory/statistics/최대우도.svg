<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 최대우도: 우도함수 L(θ) 곡선 꼭대기에 MLE 깃발을 꽂는 캐릭터 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 좌표축 -->
  <path d="M 80 58 L 80 248 L 430 248" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 우도 곡선 -->
  <path d="M 110 240 Q 180 230 240 120 Q 280 60 310 100 Q 340 150 380 220 Q 400 235 420 240" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 곡선 아래 면 -->
  <path d="M 110 240 Q 180 230 240 120 Q 280 60 310 100 Q 340 150 380 220 Q 400 235 420 240 L 420 248 L 110 248 Z" fill="#EAF2F9" fill-opacity=".5"/>
  <!-- MLE 수직선 -->
  <path d="M 252 248 L 252 100" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="6 5" stroke-linecap="round" opacity=".4"/>
  <!-- 축 라벨 -->
  <text x="86" y="54" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">L(θ)</text>
  <text x="400" y="268" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" opacity=".55">θ</text>
  <text x="244" y="274" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#4A90C2" opacity=".85">θ̂</text>
  <!-- 깃발 -->
  <path d="M 252 100 L 252 68" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="252,68 280,78 252,88" fill="#4A90C2"/>
  <!-- 캐릭터 (꼭대기 위) -->
  <g transform="translate(252 48)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20"/>
  </g>
  <!-- tkLeen 픽셀 시그니처 -->
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
