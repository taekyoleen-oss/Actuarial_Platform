<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 그래프방법: 시계열 그림 속 급등(그란트의 전염병)을 한눈에 발견하는 캐릭터 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 70 250 L 420 250 M 70 250 L 70 60" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 잔잔한 시계열 (Ink) -->
  <path d="M 70 206 L 105 200 L 140 208 L 175 198 L 210 204" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 290 200 L 325 206 L 360 196 L 400 202" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 급등 구간 (Sky) -->
  <path d="M 210 204 L 235 110 L 250 92 L 268 128 L 290 200" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="222" y="74" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">1625?</text>
  <text x="382" y="268" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">t</text>
  <!-- 발견하는 캐릭터 (놀란 눈, 땀방울) -->
  <g transform="translate(340 150)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="2.3" fill="#171A20"/><circle cx="4.5" cy="-2" r="2.3" fill="#171A20"/>
    <path d="M -3.5 5.5 Q 0 3.5 3.5 5.5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 17 -11 q 3.5 4.5 0 7 q -3.5 -2.5 0 -7" fill="#4A90C2"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
