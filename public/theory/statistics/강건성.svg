<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
  <!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 강건성: 이상치에 끌려가는 점선 적합 vs 흔들리지 않는 강건 적합선 -->
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#FAFAF7"/>
  <rect width="480" height="300" fill="url(#dots)"/>
  <!-- 축 -->
  <path d="M 70 252 L 420 252 M 70 252 L 70 60" fill="none" stroke="#171A20" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 정상 데이터 점 -->
  <g fill="#171A20">
    <circle cx="110" cy="208" r="4"/><circle cx="150" cy="198" r="4"/><circle cx="190" cy="204" r="4"/>
    <circle cx="230" cy="190" r="4"/><circle cx="270" cy="196" r="4"/><circle cx="310" cy="184" r="4"/><circle cx="350" cy="190" r="4"/>
  </g>
  <!-- 이상치 -->
  <circle cx="330" cy="84" r="5" fill="#171A20"/>
  <!-- 이상치에 끌려간 최소제곱 적합(점선) -->
  <path d="M 95 226 L 400 140" fill="none" stroke="#171A20" stroke-width="2" stroke-dasharray="7 7" stroke-linecap="round" opacity=".45"/>
  <!-- 강건 적합선 -->
  <path d="M 95 212 L 400 182" fill="none" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
  <text x="356" y="80" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">outlier</text>
  <!-- 강건선 위에서 태연한 캐릭터 (이상치를 흘긋) -->
  <g transform="translate(170 186)">
    <circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
    <circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
    <path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
