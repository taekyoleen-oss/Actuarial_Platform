<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 연금제도: 3층 노후소득보장(공적·퇴직·개인)을 떠받치는 세 기둥 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 지면 -->
<line x1="70" y1="232" x2="410" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 3개의 기둥(1·2·3층) 점점 높아짐 -->
<rect x="108" y="176" width="56" height="56" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<rect x="196" y="140" width="56" height="92" fill="#EAF2F9" stroke="#171A20" stroke-width="3"/>
<rect x="284" y="104" width="56" height="128" fill="#4A90C2" stroke="#171A20" stroke-width="3"/>
<text x="136" y="210" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".55">1</text>
<text x="224" y="192" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#171A20" fill-opacity=".55">2</text>
<text x="312" y="176" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="13" fill="#FFFFFF">3</text>
<!-- 받침 화살표(시간 축) -->
<path d="M 70 250 L 410 250" stroke="#171A20" stroke-width="2" stroke-opacity=".3" stroke-linecap="round"/>
<!-- 기둥 위 사람(노후 안정) -->
<g transform="translate(312 86)">
<circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/>
<circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/>
<path d="M -5 3 Q 0 9.5 5 3 Z" fill="#171A20" stroke="#171A20" stroke-width="2.2" stroke-linejoin="round"/>
<path d="M 15 14 L 15 0 Q 15 -6 10 -6" fill="none" stroke="#171A20" stroke-width="2.5" stroke-linecap="round"/>
</g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
