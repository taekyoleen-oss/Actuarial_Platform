<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 사회보장: 사회 구성원을 함께 받치는 안전망(Sky) -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 안전망(해먹 형태) -->
<path d="M 96 120 Q 240 236 384 120" fill="#EAF2F9" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<!-- 망의 기둥 -->
<line x1="96" y1="96" x2="96" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="384" y1="96" x2="384" y2="232" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="96" y1="120" x2="384" y2="120" stroke="#171A20" stroke-width="2.5" stroke-opacity=".4" stroke-linecap="round"/>
<!-- 망 위에 안긴 세 사람 -->
<g transform="translate(176 150)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g transform="translate(240 168)"><circle r="13" fill="#EEF4FF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -4.5 5 L 4.5 5" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g transform="translate(304 150)"><circle r="13" fill="#FFF7ED" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
