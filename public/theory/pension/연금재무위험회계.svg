<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300">
<!-- tkLeen 이론 사전 커버 · 플랫 카툰 v1 — 연금 재무·위험·회계: 자산과 부채를 저울에 올린 적립 균형 -->
<defs>
<pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="14" cy="14" r="1.3" fill="#171A20" fill-opacity=".05"/></pattern>
</defs>
<rect width="480" height="300" fill="#FAFAF7"/>
<rect width="480" height="300" fill="url(#dots)"/>
<!-- 저울 기둥 -->
<line x1="240" y1="92" x2="240" y2="236" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<line x1="180" y1="236" x2="300" y2="236" stroke="#171A20" stroke-width="3" stroke-linecap="round"/>
<!-- 저울 빔(Sky) 약간 기울어 균형 점검 -->
<line x1="146" y1="104" x2="334" y2="92" stroke="#4A90C2" stroke-width="5" stroke-linecap="round"/>
<circle cx="240" cy="98" r="5" fill="#4A90C2"/>
<!-- 왼쪽 접시: 자산 A -->
<path d="M 116 104 L 176 104" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<path d="M 120 104 Q 146 150 172 104 Z" fill="#EAF2F9" stroke="#171A20" stroke-width="2.5"/>
<text x="146" y="134" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">A</text>
<!-- 오른쪽 접시: 부채 L -->
<path d="M 304 92 L 364 92" stroke="#171A20" stroke-width="2" stroke-linecap="round"/>
<path d="M 308 92 Q 334 138 360 92 Z" fill="#4A90C2" fill-opacity=".25" stroke="#171A20" stroke-width="2.5"/>
<text x="334" y="122" text-anchor="middle" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#171A20" fill-opacity=".55">L</text>
<!-- 점검하는 사람 -->
<g transform="translate(240 196)"><circle r="13" fill="#FFFFFF" stroke="#171A20" stroke-width="3"/><circle cx="-4.5" cy="-2" r="1.8" fill="#171A20"/><circle cx="4.5" cy="-2" r="1.8" fill="#171A20"/><path d="M -5 4 Q 0 8.5 5 4" fill="none" stroke="#171A20" stroke-width="2.2" stroke-linecap="round"/></g>
<g fill="#4A90C2"><rect x="446" y="272" width="8" height="8"/><rect x="454" y="264" width="8" height="8"/><rect x="462" y="256" width="8" height="8"/></g>
</svg>
